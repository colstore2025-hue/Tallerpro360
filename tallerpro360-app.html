<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TallerPRO360 - Dashboard PRO</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, updateDoc, doc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_DOMINIO",
  projectId: "TU_PROJECT_ID",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let ordenes=[], clientes=[];
let chart;

const empresaId = localStorage.getItem("empresaId");
const sucursalId = localStorage.getItem("sucursalId");
const uid = localStorage.getItem("uid");
const rol = localStorage.getItem("rol");

// ================= AUTH =================
onAuthStateChanged(auth,user=>{
  if(!user) window.location.href="./index.html";
  else iniciarDashboard();
});

// ================= INICIO =================
function iniciarDashboard(){

  const ref = collection(db,"empresas",empresaId,"sucursales",sucursalId,"ordenes");
  const q = query(ref, orderBy("creadoEn","desc"));

  onSnapshot(q,snap=>{
    ordenes=[];
    snap.forEach(d=>{
      let data={id:d.id,...d.data()};
      if(rol==="mecanico" && data.mecanicoId!==uid) return;
      ordenes.push(data);
    });
    renderOrdenes();
    renderMetricas();
    renderGrafico();
  });

  const clientesRef = collection(db,"empresas",empresaId,"clientes");
  onSnapshot(clientesRef,snap=>{
    clientes=[];
    snap.forEach(d=>clientes.push({id:d.id,...d.data()}));
  });
}

// ================= CREAR ORDEN =================
window.crearOrden = async function(){
  const cliente=document.getElementById("cliente").value;
  const placa=document.getElementById("placa").value;
  const vehiculo=document.getElementById("vehiculo").value;
  const total=parseFloat(document.getElementById("total").value)||0;

  if(!cliente||!placa) return alert("Campos obligatorios");

  await addDoc(collection(db,"empresas",empresaId,"sucursales",sucursalId,"ordenes"),{
    cliente,
    placa,
    vehiculo,
    totalOrden:total,
    pagado:0,
    estado:"activa",
    mecanicoId: rol==="mecanico"?uid:null,
    creadoPor:uid,
    creadoEn:serverTimestamp()
  });

  document.getElementById("formOrden").reset();
};

// ================= METRICAS =================
function renderMetricas(){
  const total=ordenes.length;
  const ingresos=ordenes.reduce((a,o)=>a+(o.pagado||0),0);
  const pendientes=ordenes.reduce((a,o)=>a+((o.totalOrden||0)-(o.pagado||0)),0);

  document.getElementById("metricas").innerHTML=`
    <div class="bg-green-600 p-4 rounded">Órdenes<br><b>${total}</b></div>
    <div class="bg-blue-600 p-4 rounded">Ingresos<br><b>$${ingresos}</b></div>
    <div class="bg-yellow-500 p-4 rounded">Pendientes<br><b>$${pendientes}</b></div>
  `;
}

// ================= ORDENES =================
function renderOrdenes(){
  const cont=document.getElementById("ordenesLista");
  cont.innerHTML="";
  ordenes.forEach(o=>{
    cont.innerHTML+=`
    <div class="bg-gray-800 p-3 rounded mb-2">
      <b>${o.placa}</b> - ${o.vehiculo}<br>
      Cliente: ${o.cliente}<br>
      Total: $${o.totalOrden}<br>
      Estado: ${o.estado}
    </div>`;
  });
}

// ================= GRAFICO =================
function renderGrafico(){
  const meses={};
  ordenes.forEach(o=>{
    if(!o.creadoEn?.seconds) return;
    const d=new Date(o.creadoEn.seconds*1000);
    const mes=d.getMonth()+1;
    meses[mes]=(meses[mes]||0)+(o.pagado||0);
  });

  const labels=Object.keys(meses);
  const data=Object.values(meses);

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("grafico"),{
    type:"bar",
    data:{labels,datasets:[{label:"Ingresos",data}]}
  });
}

// ================= LOGOUT =================
window.logout=async function(){
  await signOut(auth);
  localStorage.clear();
  window.location.href="./index.html";
}
</script>
</head>

<body class="bg-gray-900 text-white p-4">

<h1 class="text-3xl font-bold mb-6">TallerPRO360 Dashboard</h1>

<div id="metricas" class="grid grid-cols-3 gap-4 mb-6"></div>

<div class="bg-gray-800 p-4 rounded mb-6">
<h3>Nueva Orden</h3>
<form id="formOrden" onsubmit="event.preventDefault(); crearOrden();">
<input id="cliente" placeholder="Cliente" class="p-2 m-1 text-black">
<input id="placa" placeholder="Placa" class="p-2 m-1 text-black">
<input id="vehiculo" placeholder="Vehículo" class="p-2 m-1 text-black">
<input id="total" type="number" placeholder="Total" class="p-2 m-1 text-black">
<button class="bg-green-600 p-2 rounded">Crear</button>
</form>
</div>

<div class="bg-gray-800 p-4 rounded mb-6">
<h3>Órdenes</h3>
<div id="ordenesLista"></div>
</div>

<div class="bg-gray-800 p-4 rounded">
<h3>Ingresos Mensuales</h3>
<canvas id="grafico"></canvas>
</div>

<button onclick="logout()" class="mt-6 bg-red-600 p-2 rounded">Cerrar sesión</button>

</body>
</html>
