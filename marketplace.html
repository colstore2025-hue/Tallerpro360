<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus-X MarketX | Terminal de Suministros</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #06b6d4; --dark-bg: #010409; --panel: #0d1117; }
        body { 
            background-color: var(--dark-bg); 
            font-family: 'Outfit', sans-serif; color: white; 
            background-image: 
                radial-gradient(circle at 2px 2px, rgba(255,255,255,0.02) 1px, transparent 0);
            background-size: 40px 40px;
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        
        /* Efecto Escáner de Radar */
        .radar-sweep {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: conic-gradient(from 0deg at 50% 50%, rgba(6, 182, 212, 0.08) 0deg, transparent 90deg);
            animation: rotate 10s linear infinite; z-index: -1; pointer-events: none;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .glass-panel { background: var(--panel); border: 1px solid rgba(255,255,255,0.05); }
        
        .card-nexus { 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            background: linear-gradient(180deg, #0d1117 0%, #010409 100%);
            border: 1px solid rgba(255,255,255,0.03);
        }
        .card-nexus:hover { 
            transform: translateY(-8px);
            border-color: var(--cyan);
            box-shadow: 0 20px 40px rgba(6, 182, 212, 0.15);
        }

        /* Scanline Animado en Imagen */
        .scan-effect::after {
            content: ""; position: absolute; width: 100%; height: 1px;
            background: var(--cyan); top: 0; left: 0; animation: scanning 2.5s linear infinite;
            box-shadow: 0 0 8px var(--cyan); z-index: 10;
        }
        @keyframes scanning { 0% { top: 0%; } 100% { top: 100%; } }

        .import-badge {
            background: linear-gradient(90deg, #1e40af, #b91c1c);
            box-shadow: 0 0 10px rgba(185, 28, 28, 0.4);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="radar-sweep"></div>

    <header class="max-w-7xl mx-auto mb-16">
        <div class="flex flex-col lg:flex-row justify-between items-start lg:items-end gap-10">
            <div class="relative pl-8">
                <div class="absolute left-0 top-0 h-full w-1.5 bg-cyan-500 shadow-[0_0_20px_#06b6d4]"></div>
                <div class="flex items-center gap-3 mb-4">
                    <span class="px-3 py-1 bg-white/5 border border-white/10 rounded-full text-[8px] orbitron font-black text-slate-400 tracking-widest">ECOSISTEMA NEXUS-X</span>
                    <span class="text-[8px] orbitron text-cyan-500 animate-pulse font-bold uppercase tracking-widest">Terminal Activa</span>
                </div>
                <h1 class="orbitron text-5xl md:text-6xl font-black italic uppercase tracking-tighter">
                    MARKET<span class="text-cyan-400">X</span>
                </h1>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.4em] mt-3 italic flex items-center">
                    LOGÍSTICA: <span class="text-white mx-2">USA</span> <i class="fas fa-random text-cyan-500 mx-2"></i> <span class="text-white">LATAM</span>
                </p>
            </div>

            <div class="relative w-full lg:w-2/5 group">
                <i class="fas fa-bullseye absolute left-6 top-1/2 -translate-y-1/2 text-cyan-500 group-hover:scale-125 transition-transform"></i>
                <input type="text" id="nexusSearch" placeholder="IDENTIFICAR SKU O REFERENCIA..." 
                       class="w-full bg-black/40 border border-white/5 rounded-[2rem] py-6 pl-16 pr-8 text-[11px] font-black orbitron uppercase tracking-widest focus:border-cyan-500/50 outline-none transition-all placeholder:text-slate-800">
            </div>

            <div class="flex items-center gap-4">
                <button onclick="location.hash='#publish'" class="px-10 py-5 bg-white text-black orbitron text-[10px] font-black rounded-2xl uppercase hover:bg-cyan-500 hover:text-white transition-all shadow-xl shadow-white/5">
                    <i class="fas fa-upload mr-3"></i> Publicar Activo
                </button>
            </div>
        </div>
    </header>

    <nav class="max-w-7xl mx-auto flex gap-4 overflow-x-auto pb-12 no-scrollbar scroll-smooth">
        <button class="px-8 py-4 bg-cyan-500 text-black text-[9px] font-black rounded-xl uppercase flex-shrink-0 orbitron tracking-[0.2em] shadow-lg shadow-cyan-500/20">All Systems</button>
        <button class="px-8 py-4 glass-panel text-[9px] font-black text-slate-400 rounded-xl uppercase flex-shrink-0 hover:border-cyan-500/30 hover:text-white transition-all border border-white/5 tracking-[0.2em] italic">Transmisiones</button>
        <button class="px-8 py-4 glass-panel text-[9px] font-black text-slate-400 rounded-xl uppercase flex-shrink-0 hover:border-cyan-500/30 hover:text-white transition-all border border-white/5 tracking-[0.2em] italic">Turbocargadores</button>
        <button class="px-8 py-4 glass-panel text-[9px] font-black text-slate-400 rounded-xl uppercase flex-shrink-0 hover:border-cyan-500/30 hover:text-white transition-all border border-white/5 tracking-[0.2em] italic">Ecus & Software</button>
        <button class="px-8 py-4 glass-panel text-[9px] font-black text-slate-400 rounded-xl uppercase flex-shrink-0 hover:border-cyan-500/30 hover:text-white transition-all border border-white/5 tracking-[0.2em] italic">Heavy Duty Tools</button>
    </nav>

    <main id="productGrid" class="max-w-7xl mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 xl:grid-cols-5 gap-8 pb-32">
        </main>

    <script type="module">
        import { db } from "../core/firebase-config.js";
        import { collection, query, onSnapshot, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        
        const grid = document.getElementById('productGrid');
        const q = query(collection(db, "marketplace"), orderBy("creadoEn", "desc"));

        onSnapshot(q, (snapshot) => {
            const items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderProducts(items);
        });

        function renderProducts(items) {
            if(items.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-40 text-center orbitron text-slate-800 uppercase tracking-[1em] italic">Buscando señales comerciales...</div>`;
                return;
            }

            grid.innerHTML = items.map(p => {
                const isImport = p.logisticaType === 'usa';
                return `
                <div class="card-nexus p-6 rounded-[2.5rem] flex flex-col group relative overflow-hidden">
                    ${isImport ? `
                        <div class="absolute top-4 right-4 z-20 import-badge px-3 py-1 rounded-full flex items-center gap-2">
                            <i class="fas fa-plane-arrival text-[8px] text-white"></i>
                            <span class="text-[7px] orbitron font-black text-white uppercase tracking-tighter">Import USA</span>
                        </div>
                    ` : ''}

                    <div class="aspect-square bg-black rounded-[2rem] mb-6 overflow-hidden relative border border-white/5 scan-effect">
                        <img src="${p.imgUrl || 'https://via.placeholder.com/400?text=Nexus-X+Part'}" class="w-full h-full object-cover group-hover:scale-110 transition-all duration-[1s] opacity-80 group-hover:opacity-100">
                    </div>
                    
                    <div class="space-y-2 mb-6">
                        <span class="text-[7px] orbitron font-bold text-cyan-500 uppercase tracking-[0.3em]">${p.categoria || 'Repuesto Certificado'}</span>
                        <h3 class="text-[14px] font-black text-white uppercase tracking-tighter leading-tight italic">${p.nombre}</h3>
                        <p class="text-[9px] text-slate-600 line-clamp-1 italic">${p.descripcion || 'Sin descripción técnica disponible.'}</p>
                    </div>

                    <div class="mt-auto flex items-center justify-between bg-white/5 p-5 rounded-[1.5rem] border border-white/5 group-hover:border-cyan-500/30 transition-all">
                        <div>
                            <p class="text-[7px] text-slate-500 font-black uppercase tracking-widest mb-1">Inversión Nexus</p>
                            <p class="text-white font-black text-xl orbitron tracking-tighter italic">${p.precio}</p>
                        </div>
                        <button onclick="contactarVendedor('${p.nombre}')" class="w-12 h-12 bg-white text-black rounded-2xl flex items-center justify-center hover:bg-cyan-500 hover:text-white transition-all shadow-lg hover:shadow-cyan-500/20">
                            <i class="fas fa-crosshairs text-lg"></i>
                        </button>
                    </div>
                </div>
            `}).join('');
        }

        window.contactarVendedor = (item) => {
            const msg = `SISTEMA NEXUS-X: Interés detectado en el activo [${item.toUpperCase()}]. Solicito telemetría de precio y tiempo de entrega.`;
            window.open(`https://wa.me/17049419163?text=${encodeURIComponent(msg)}`);
        };
    </script>
</body>
</html>
