<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus-X Marketplace | Elite Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;900&family=Orbitron:wght@700;900&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #06b6d4; --dark: #020617; --slate-900: #0f172a; --emerald: #10b981; }
        body { font-family: 'Outfit', sans-serif; background: var(--dark); color: white; overflow-x: hidden; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }

        /* Fondo dinámico de Radar */
        .radar-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(6, 182, 212, 0.05) 0%, transparent 80%);
            z-index: -1; pointer-events: none;
        }
        
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.05); }
        
        .card-elite { 
            transition: all 0.5s cubic-bezier(0.2, 1, 0.2, 1); 
            border: 1px solid rgba(255,255,255,0.03);
            background: linear-gradient(145deg, rgba(15, 23, 42, 0.8), rgba(2, 6, 23, 1));
        }
        
        .card-elite:hover { 
            transform: scale(1.03) translateY(-10px);
            border-color: var(--cyan);
            box-shadow: 0 25px 50px -12px rgba(6, 182, 212, 0.3);
        }

        /* Badge Animado para Importaciones */
        .badge-import {
            background: linear-gradient(90deg, #1e40af, #b91c1c);
            animation: pulse-border 2s infinite;
        }
        @keyframes pulse-border { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Animación de escaneo láser en las fotos */
        .scan-overlay::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: var(--cyan); opacity: 0.5; animation: laser 3s linear infinite;
        }
        @keyframes laser { 0% { top: 0%; } 100% { top: 100%; } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="radar-bg"></div>

    <header class="max-w-7xl mx-auto mb-12">
        <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-8">
            <div>
                <div class="flex items-center gap-3 mb-2">
                    <div class="px-3 py-1 bg-purple-600/20 border border-purple-500/50 rounded-full">
                        <span class="text-[8px] orbitron font-black text-purple-400 tracking-widest uppercase">Elite Access Enabled</span>
                    </div>
                    <span class="text-[8px] mono text-cyan-500/50 uppercase tracking-widest">Protocolo: 0xNexus-Market</span>
                </div>
                <h1 class="orbitron text-5xl font-black italic uppercase tracking-tighter">
                    MARKET<span class="text-cyan-400">X</span> <span class="text-white/20 font-light">TERMINAL</span>
                </h1>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.4em] mt-2 italic flex items-center">
                    <span class="w-2 h-2 bg-emerald-500 rounded-full mr-3 animate-ping"></span>
                    Enlace Satelital Activo: Charlotte (USA) <i class="fas fa-arrows-left-right mx-2 text-cyan-500"></i> Ibagué (COL)
                </p>
            </div>

            <div class="relative w-full lg:w-1/3 group">
                <div class="absolute inset-y-0 left-6 flex items-center">
                    <i class="fas fa-satellite text-cyan-500 group-hover:rotate-45 transition-transform"></i>
                </div>
                <input type="text" id="nexusSearch" placeholder="Escanear pieza, referencia o SKU..." 
                       class="w-full bg-slate-900/50 border border-white/10 rounded-2xl py-5 pl-16 pr-8 text-[11px] font-bold uppercase tracking-widest focus:border-cyan-500 outline-none transition-all placeholder:text-slate-600">
            </div>

            <div class="flex items-center gap-4">
                <button onclick="location.href='publish.html'" class="px-8 py-4 bg-cyan-500 text-black orbitron text-[10px] font-black rounded-xl uppercase hover:scale-105 transition-all shadow-xl shadow-cyan-500/20">
                    <i class="fas fa-plus-square mr-2"></i> Nuevo Despliegue
                </button>
                <div class="flex glass p-1.5 rounded-xl border border-white/10">
                    <button class="w-11 h-11 flex items-center justify-center text-cyan-400 hover:bg-white/5 rounded-lg transition"><i class="fas fa-shopping-cart"></i></button>
                    <button class="w-11 h-11 flex items-center justify-center text-slate-400 hover:bg-white/5 rounded-lg transition"><i class="fas fa-sliders"></i></button>
                </div>
            </div>
        </div>
    </header>

    <nav class="max-w-7xl mx-auto flex gap-4 overflow-x-auto pb-10 no-scrollbar scroll-smooth">
        <button class="px-8 py-3 bg-cyan-500 text-black text-[9px] font-black rounded-lg uppercase flex-shrink-0 orbitron tracking-widest shadow-lg shadow-cyan-500/30">Todo el Sistema</button>
        <button class="px-8 py-3 glass text-[9px] font-black rounded-lg uppercase flex-shrink-0 hover:border-cyan-500/50 transition-all border border-white/5 tracking-widest"><i class="fas fa-microchip mr-2"></i> ECU & Sensores</button>
        <button class="px-8 py-3 glass text-[9px] font-black rounded-lg uppercase flex-shrink-0 hover:border-cyan-500/50 transition-all border border-white/5 tracking-widest"><i class="fas fa-fan mr-2"></i> Turbo / Aspiración</button>
        <button class="px-8 py-3 glass text-[9px] font-black rounded-lg uppercase flex-shrink-0 hover:border-cyan-500/50 transition-all border border-white/5 tracking-widest"><i class="fas fa-wrench mr-2"></i> Herramientas Pro</button>
        <button class="px-8 py-3 glass text-[9px] font-black rounded-lg uppercase flex-shrink-0 hover:border-cyan-500/50 transition-all border border-white/5 tracking-widest"><i class="fas fa-bolt mr-2"></i> Sistemas Eléctricos</button>
    </nav>

    <main id="productGrid" class="max-w-7xl mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 xl:grid-cols-5 gap-6">
        </main>

    <script type="module">
    import { getFirestore, collection, query, onSnapshot, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    
    // 1. Conexión a la base de datos
    const db = getFirestore();
    const grid = document.getElementById('productGrid');

    // 2. Escuchar la "Nube" en tiempo real
    const q = query(collection(db, "marketplace"), orderBy("creadoEn", "desc"));

    onSnapshot(q, (snapshot) => {
        const items = [];
        snapshot.forEach((doc) => {
            items.push({ id: doc.id, ...doc.data() });
        });
        renderProducts(items);
    });

    // 3. Renderizado Dinámico
    function renderProducts(items) {
        if(items.length === 0) {
            grid.innerHTML = `<div class="col-span-full py-20 text-center orbitron text-slate-500 uppercase tracking-widest opacity-30">No hay misiones comerciales activas...</div>`;
            return;
        }

        grid.innerHTML = items.map(p => `
            <div class="card-elite p-5 rounded-[2rem] flex flex-col group relative overflow-hidden">
                <div class="aspect-square bg-slate-900 rounded-[1.5rem] mb-5 overflow-hidden relative border border-white/5 scan-overlay">
                    <img src="${p.imgUrl || 'https://via.placeholder.com/400?text=Nexus-X+Image'}" class="w-full h-full object-cover group-hover:scale-110 transition-all duration-700">
                </div>
                
                <div class="space-y-1">
                    <span class="text-[8px] mono text-cyan-400 uppercase tracking-widest">${p.categoria || 'Repuesto'}</span>
                    <h3 class="text-[13px] font-black text-white uppercase tracking-tighter leading-tight h-10 overflow-hidden">${p.nombre}</h3>
                </div>

                <div class="mt-6 flex items-center justify-between bg-black/40 p-4 rounded-2xl border border-white/5">
                    <div>
                        <p class="text-[7px] text-slate-500 font-black uppercase tracking-widest">Valor Nexus-X</p>
                        <p class="text-white font-black text-lg orbitron tracking-tighter italic">${p.precio}</p>
                    </div>
                    <button onclick="contactarVendedor('${p.nombre}')" class="w-10 h-10 bg-cyan-500 text-black rounded-xl flex items-center justify-center hover:bg-white transition-all shadow-lg">
                        <i class="fas fa-crosshairs"></i>
                    </button>
                </div>
            </div>
        `).join('');
    }

    window.contactarVendedor = (item) => {
        const msg = `Hola Nexus-X, me interesa el activo: ${item}. Solicito enlace logístico.`;
        window.open(`https://wa.me/17049419163?text=${encodeURIComponent(msg)}`);
    };
</script>
</body>
</html>
