<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace | TallerPRO360</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #06b6d4; --dark: #020617; }
        body { font-family: 'Outfit', sans-serif; background: var(--dark); color: white; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .card-item { transition: 0.3s; border: 1px solid rgba(255,255,255,0.05); }
        .card-item:hover { border-color: var(--cyan); background: rgba(6,182,212,0.02); }
    </style>
</head>
<body class="p-6">

    <div class="max-w-7xl mx-auto mb-12">
        <div class="flex flex-col md:flex-row justify-between items-center gap-6">
            <h2 class="orbitron text-2xl font-black italic uppercase italic tracking-tighter">Market<span class="text-cyan-400">PRO</span></h2>
            <div class="relative w-full md:w-1/2">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                <input type="text" placeholder="BUSCAR REPUESTOS, MARCAS O PROVEEDORES..." class="w-full bg-slate-900 border border-white/10 rounded-full py-4 pl-12 pr-6 text-[10px] font-black uppercase tracking-widest focus:border-cyan-500 outline-none">
            </div>
            <div class="flex gap-4">
                <button class="w-12 h-12 glass rounded-full flex items-center justify-center text-cyan-400"><i class="fas fa-shopping-cart"></i></button>
                <button class="w-12 h-12 glass rounded-full flex items-center justify-center text-slate-400"><i class="fas fa-filter"></i></button>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto flex gap-4 overflow-x-auto pb-8 no-scrollbar">
        <button class="px-8 py-3 bg-cyan-500 text-black text-[10px] font-black rounded-full uppercase flex-shrink-0 shadow-lg shadow-cyan-500/20">Todos</button>
        <button class="px-8 py-3 glass text-[10px] font-black rounded-full uppercase flex-shrink-0 hover:bg-white/5">Aceites y Lubricantes</button>
        <button class="px-8 py-3 glass text-[10px] font-black rounded-full uppercase flex-shrink-0 hover:bg-white/5">Frenos</button>
        <button class="px-8 py-3 glass text-[10px] font-black rounded-full uppercase flex-shrink-0 hover:bg-white/5">Suspensión</button>
        <button class="px-8 py-3 glass text-[10px] font-black rounded-full uppercase flex-shrink-0 hover:bg-white/5">Llantas</button>
    </div>

    <div class="max-w-7xl mx-auto grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
        
        <div class="card-item glass p-4 rounded-3xl flex flex-col">
            <div class="aspect-square bg-white/5 rounded-2xl mb-4 overflow-hidden relative">
                <span class="absolute top-2 left-2 bg-emerald-500 text-black text-[8px] font-black px-2 py-0.5 rounded-full uppercase">En Stock</span>
                <img src="https://via.placeholder.com/200" alt="producto" class="w-full h-full object-cover opacity-50">
            </div>
            <span class="text-[8px] font-black text-slate-500 uppercase tracking-widest">Castrol Magnatec</span>
            <h3 class="text-xs font-black mb-2 uppercase tracking-tighter">Aceite 10W-30 (4L)</h3>
            <p class="text-cyan-400 font-black text-sm mb-4">$185.000 <span class="text-[8px] text-slate-500 italic">COP</span></p>
            <button class="w-full py-3 bg-white/5 border border-white/5 hover:border-cyan-500/50 hover:bg-cyan-500 hover:text-black rounded-xl text-[9px] font-black uppercase transition-all">Añadir</button>
        </div>

        <script>
            // Aquí luego inyectaremos el JSON de Firebase
        </script>

    </div>

</body>
</html>
