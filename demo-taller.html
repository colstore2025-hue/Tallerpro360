<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TallerPRO360 | Demo Interactivo</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
background:#020617;
color:white;
font-family:system-ui;
}

.card{
background:#0f172a;
border:1px solid #1e293b;
border-radius:14px;
padding:20px;
}

.panel{
background:#020617;
border-right:1px solid #1e293b;
}

</style>

</head>

<body class="flex min-h-screen">

<!-- SIDEBAR DEMO -->

<div class="panel w-64 p-6">

<h1 class="text-2xl font-black text-emerald-400 mb-8">
TallerPRO360
</h1>

<div class="space-y-4">

<button onclick="mostrar('orden')" class="w-full text-left">
<i class="fa-solid fa-car"></i> Nueva Orden
</button>

<button onclick="mostrar('diagnostico')" class="w-full text-left">
<i class="fa-solid fa-brain"></i> Diagnóstico IA
</button>

<button onclick="mostrar('finanzas')" class="w-full text-left">
<i class="fa-solid fa-chart-line"></i> Finanzas
</button>

<button onclick="mostrar('clientes')" class="w-full text-left">
<i class="fa-solid fa-users"></i> Clientes
</button>

</div>

</div>


<!-- CONTENIDO -->

<div class="flex-1 p-10">

<h2 class="text-3xl font-bold mb-6">
Simulación del Taller
</h2>

<div id="contenido">

<div class="card">

<h3 class="text-xl font-bold">
Bienvenido a la demo
</h3>

<p class="text-slate-400 mt-2">
Explora cómo funciona el sistema de gestión del taller.
</p>

</div>

</div>

</div>



<script>

/* ===========================
SIMULADOR DE MODULOS
=========================== */

function mostrar(modulo){

const cont=document.getElementById("contenido");

if(modulo==="orden"){

cont.innerHTML=`

<div class="card">

<h3 class="text-xl font-bold">Nueva Orden</h3>

<p class="text-slate-400 mt-2">

Vehículo registrado: Toyota Corolla

</p>

<p class="text-slate-400">

Cliente: Juan Pérez

</p>

<p class="text-emerald-400 mt-4">

✔ Orden creada correctamente

</p>

</div>

`;

}

if(modulo==="diagnostico"){

cont.innerHTML=`

<div class="card">

<h3 class="text-xl font-bold">

IA Mecánica Analizando

</h3>

<p class="text-slate-400 mt-3">

Síntoma detectado: pérdida de aceite

</p>

<p class="text-emerald-400 mt-3">

Diagnóstico sugerido:

Retén principal desgastado

</p>

</div>

`;

}

if(modulo==="finanzas"){

cont.innerHTML=`

<div class="card">

<h3 class="text-xl font-bold">

Ingresos del día

</h3>

<p class="text-emerald-400 text-2xl mt-3">

$1.250.000

</p>

<p class="text-slate-400">

5 órdenes completadas

</p>

</div>

`;

}

if(modulo==="clientes"){

cont.innerHTML=`

<div class="card">

<h3 class="text-xl font-bold">

Clientes recientes

</h3>

<ul class="mt-3 text-slate-400">

<li>Juan Pérez</li>
<li>Carlos Rodríguez</li>
<li>Andrés Gómez</li>

</ul>

</div>

`;

}

}

</script>

</body>
</html>
