<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TallerPRO360 | Nexus-X Starlink</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #06b6d4; --dark: #020617; }
        body { font-family: 'Outfit', sans-serif; background: var(--dark); color: white; overflow-x: hidden; scroll-behavior: smooth; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .stars-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%); z-index: -2; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(6, 182, 212, 0.2); }
        .card-nexus { background: linear-gradient(145deg, rgba(15, 23, 42, 0.9), rgba(2, 6, 23, 0.9)); border: 1px solid rgba(255,255,255,0.05); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden; height: 100%; }
        .card-nexus:hover { border-color: var(--cyan); transform: translateY(-5px); box-shadow: 0 0 30px rgba(6,182,212,0.2); }
    </style>
</head>
<body>
    <div class="stars-bg"></div>

    <nav class="fixed w-full z-[100] glass py-4 px-8 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-cyan-500 rounded-lg flex items-center justify-center shadow-[0_0_20px_rgba(6,182,212,0.5)]">
                <i class="fas fa-satellite-dish text-black text-xl"></i>
            </div>
            <span class="orbitron text-xl font-black italic uppercase tracking-tighter text-white">Taller<span class="text-cyan-400">PRO360</span></span>
        </div>
        <button onclick="window.location.href='#planes'" class="bg-white text-black px-6 py-2.5 rounded-full orbitron text-[10px] font-black hover:bg-cyan-400 transition-all uppercase">Activar Nodo</button>
    </nav>

    <header class="pt-56 pb-20 px-6 text-center max-w-6xl mx-auto">
        <h1 class="text-6xl md:text-9xl font-black mb-8 leading-none tracking-tighter uppercase italic">NEXUS-<span class="text-cyan-400">X</span></h1>
        <p class="text-slate-400 text-lg md:text-2xl max-w-3xl mx-auto italic mb-12 uppercase tracking-widest font-light">Ecosistema Aeroespacial para <span class="text-white font-bold">Talleres 360</span></p>
    </header>

    <section id="planes" class="py-20 px-4 max-w-[1700px] mx-auto grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
        <div class="card-nexus p-8 rounded-[2.5rem] flex flex-col justify-between">
            <div>
                <h3 class="orbitron text-xl font-black italic mb-2 uppercase text-white">Básico</h3>
                <div class="text-3xl font-black mb-6 text-emerald-400">$49.900 <span class="text-xs text-slate-500">COP/MES</span></div>
            </div>
            <button onclick="abrirModalLegal('basico')" class="w-full py-5 bg-emerald-600 text-black rounded-2xl orbitron text-[10px] font-black hover:bg-emerald-400 transition uppercase italic">Suscribir</button>
        </div>

        <div class="card-nexus p-8 rounded-[2.5rem] border-2 border-cyan-500 bg-cyan-900/20 flex flex-col justify-between scale-105 shadow-2xl">
            <div>
                <h3 class="orbitron text-2xl font-black italic text-cyan-400 mb-2 uppercase">Elite Nexus</h3>
                <div class="text-4xl font-black mb-6 text-white">$129.000 <span class="text-xs text-slate-500">COP/MES</span></div>
            </div>
            <button onclick="abrirModalLegal('elite')" class="w-full py-6 bg-cyan-500 text-black rounded-2xl orbitron text-[11px] font-black hover:bg-white transition uppercase italic shadow-lg">Dominar Mercado</button>
        </div>

        <div class="card-nexus p-8 rounded-[2.5rem] border border-white/5 flex flex-col justify-between">
            <h3 class="orbitron text-xl font-black italic mb-2 uppercase text-slate-400">Demo</h3>
            <button onclick="window.location.href='/demos/index.html'" class="w-full py-5 border border-white/20 text-white rounded-2xl orbitron text-[10px] font-black hover:bg-white hover:text-black transition uppercase italic">Probar Ecosistema</button>
        </div>
    </section>

    <div id="modalLegal" class="fixed inset-0 bg-black/95 z-[200] hidden flex items-center justify-center p-6 backdrop-blur-2xl">
        <div class="bg-[#0b111e] max-w-md w-full rounded-[3rem] border border-cyan-500/40 p-10 relative">
            <div class="text-center mb-8">
                <i class="fas fa-shield-check text-cyan-400 text-4xl mb-4"></i>
                <h3 class="orbitron text-xl font-black uppercase italic text-white">Seguridad Nexus-X</h3>
            </div>
            <div class="space-y-4 mb-10">
                <label class="flex items-start gap-4 cursor-pointer">
                    <input type="checkbox" id="checkLegal" class="mt-1 w-5 h-5 accent-cyan-500">
                    <span class="text-[10px] text-slate-400 uppercase font-bold tracking-widest italic">Acepto Términos, Condiciones y Habeas Data (Ley 1581)</span>
                </label>
            </div>
            <button id="btnConfirmarPago" disabled class="w-full py-5 bg-cyan-500 text-black font-black rounded-2xl text-[11px] uppercase orbitron italic opacity-20 transition-all">Sincronizar con Bold</button>
            <button onclick="cerrarModal()" class="w-full mt-6 text-slate-600 text-[9px] font-black uppercase hover:text-white">Cancelar</button>
        </div>
    </div>

    <script type="module">
        let planActivo = null;

        window.abrirModalLegal = (planId) => {
            planActivo = planId;
            document.getElementById('modalLegal').classList.remove('hidden');
        };

        window.cerrarModal = () => {
            document.getElementById('modalLegal').classList.add('hidden');
        };

        const check = document.getElementById('checkLegal');
        const btn = document.getElementById('btnConfirmarPago');

        check.onchange = () => {
            btn.disabled = !check.checked;
            btn.style.opacity = check.checked ? "1" : "0.2";
        };

        btn.onclick = async () => {
            btn.innerText = "⚡ ESTABLECIENDO ENLACE BOLD...";
            btn.disabled = true;

            try {
                // William, aquí está la conexión exacta con tu create-payment.js
                const response = await fetch('/api/create-payment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        planId: planActivo,
                        months: 1, // Por defecto 1 mes
                        empresaId: "NX-" + Math.floor(Math.random() * 9999),
                        userEmail: "pago@tallerpro360.com" // Esto se puede capturar de un input
                    })
                });

                const data = await response.json();

                if (data.url) {
                    window.location.href = data.url; // Redirección al checkout de Bold
                } else {
                    throw new Error(data.error || "Error en respuesta de Bold");
                }
            } catch (error) {
                console.error("ERROR_NEXUS:", error);
                alert("CONEXIÓN FALLIDA: " + error.message);
                btn.innerText = "REINTENTAR SINCRONIZACIÓN";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
