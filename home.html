<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TallerPRO360 | Ecosistema Nexus-X Starlink</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { --cyan: #06b6d4; --emerald: #10b981; --purple: #a855f7; --dark: #020617; }
        body { font-family: 'Outfit', sans-serif; background: var(--dark); color: white; overflow-x: hidden; scroll-behavior: smooth; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .stars-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%); z-index: -2; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(6, 182, 212, 0.2); }
        .card-nexus { background: linear-gradient(145deg, rgba(15, 23, 42, 0.9), rgba(2, 6, 23, 0.9)); border: 1px solid rgba(255,255,255,0.05); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .card-nexus:hover { border-color: var(--cyan); transform: translateY(-10px); box-shadow: 0 30px 60px rgba(6,182,212,0.15); }
        .tech-list li { font-size: 10px; margin-bottom: 12px; text-transform: uppercase; font-weight: 700; color: #94a3b8; display: flex; align-items: start; gap: 10px; }
        .badge-tech { font-size: 8px; font-weight: 900; padding: 4px 12px; border-radius: 99px; text-transform: uppercase; letter-spacing: 2px; }
        @keyframes scan { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }
        .scanner-line { position: absolute; width: 100%; height: 2px; background: var(--cyan); box-shadow: 0 0 15px var(--cyan); animation: scan 3s infinite linear; opacity: 0.3; }
        .modal-glow { box-shadow: 0 0 100px rgba(6, 182, 212, 0.2); }
    </style>
</head>
<body>
    <div class="stars-bg"></div>

    <nav class="fixed w-full z-[100] glass py-4 px-8 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-cyan-500 rounded-lg flex items-center justify-center shadow-[0_0_20px_rgba(6,182,212,0.5)]">
                <i class="fas fa-satellite-dish text-black text-xl animate-pulse"></i>
            </div>
            <span class="orbitron text-xl font-black italic uppercase tracking-tighter">Taller<span class="text-cyan-400">PRO360</span></span>
        </div>
        <div class="flex items-center gap-6">
            <a href="#planes" class="hidden md:block text-[10px] orbitron font-black hover:text-cyan-400 tracking-widest uppercase italic transition">Suscripciones</a>
            <a href="#demos" class="hidden md:block text-[10px] orbitron font-black hover:text-cyan-400 tracking-widest uppercase italic transition">Demos</a>
            <button id="btnNavTrial" class="bg-white text-black px-6 py-2.5 rounded-full orbitron text-[10px] font-black hover:bg-cyan-400 transition-all duration-300">Prueba Gratis</button>
        </div>
    </nav>

    <header class="pt-56 pb-20 px-6 text-center max-w-6xl mx-auto">
        <h1 class="text-6xl md:text-9xl font-black mb-8 leading-none tracking-tighter uppercase italic">NEXUS-<span class="text-cyan-400">X</span></h1>
        <p class="text-slate-400 text-lg md:text-2xl max-w-3xl mx-auto italic mb-12">Gestión Automotriz de Grado Aeroespacial.</p>
    </header>

    <section id="planes" class="py-32 px-4 max-w-[1700px] mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-6">
            <div class="card-nexus p-8 rounded-[2.5rem]">
                <h3 class="orbitron text-xl font-black mb-2 uppercase italic">Trial</h3>
                <div class="text-4xl font-black mb-8">$0</div>
                <button data-action="trial" class="btn-nexus mt-10 w-full py-5 border border-white/10 rounded-2xl orbitron text-[10px] font-black hover:bg-white hover:text-black transition uppercase italic">Activar Nodo</button>
            </div>
            <div class="card-nexus p-8 rounded-[2.5rem] border-2 border-cyan-500 scale-110 z-10 bg-cyan-900/20">
                <h3 class="orbitron text-2xl font-black text-cyan-400 mb-2 uppercase italic">Elite Nexus</h3>
                <div class="text-4xl font-black mb-8">$129.000</div>
                <button data-action="pay" data-plan="ELITE" data-price="129000" class="btn-nexus mt-10 w-full py-6 bg-cyan-500 text-black rounded-2xl orbitron text-[11px] font-black hover:shadow-lg transition uppercase italic">Dominar Mercado</button>
            </div>
            </div>
    </section>

    <section id="demos" class="py-32 px-6 max-w-6xl mx-auto">
        <div class="text-center mb-16">
            <h2 class="orbitron text-4xl font-black uppercase italic">Ecosistema de Demos</h2>
        </div>
        <div id="demoContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="card-nexus p-8 rounded-3xl text-center group">
                <i class="fas fa-layer-group text-cyan-400 text-4xl mb-4 group-hover:scale-110 transition"></i>
                <h3 class="orbitron font-black uppercase text-sm mb-4">Ver Todos los Nodos</h3>
                <button id="btnOpenDemoCloud" class="w-full py-3 border border-cyan-500/50 text-cyan-400 rounded-xl orbitron text-[10px] font-black hover:bg-cyan-500 hover:text-black transition uppercase">Lanzar Cloud</button>
            </div>
        </div>
    </section>

    <footer class="py-20 text-center glass">
        <div class="flex justify-center gap-12 mb-12">
            <a href="#" id="social-fb" class="text-slate-600 text-2xl hover:text-cyan-400 transition"><i class="fab fa-facebook-f"></i></a>
            <a href="#" id="social-ig" class="text-slate-600 text-2xl hover:text-pink-500 transition"><i class="fab fa-instagram"></i></a>
            <a href="#" id="social-wa" class="text-slate-600 text-2xl hover:text-emerald-500 transition"><i class="fab fa-whatsapp"></i></a>
        </div>
        <div class="flex justify-center gap-6 text-[8px] orbitron text-slate-500 uppercase">
            <a href="/politicas.html">Privacidad</a>
            <a href="/terminos.html">Términos</a>
            <a href="/manual-operacion.html">SLA</a>
        </div>
    </footer>

    <div id="modalLegal" class="fixed inset-0 bg-black/95 z-[200] hidden flex items-center justify-center p-6 backdrop-blur-2xl">
        <div class="bg-[#0b111e] max-w-md w-full rounded-[3rem] border border-cyan-500/40 p-10 modal-glow">
            <h3 class="orbitron text-xl font-black text-center text-white mb-8">PROTOCOLOS LEGALES</h3>
            <div class="space-y-6 mb-10">
                <label class="flex items-center gap-4 cursor-pointer"><input type="checkbox" id="checkT" class="w-5 h-5 accent-cyan-500"> <span class="text-[10px] uppercase font-bold tracking-widest italic">Términos Nexus-X</span></label>
                <label class="flex items-center gap-4 cursor-pointer"><input type="checkbox" id="checkP" class="w-5 h-5 accent-cyan-500"> <span class="text-[10px] uppercase font-bold tracking-widest italic">Habeas Data</span></label>
            </div>
            <button id="btnConfirmBold" disabled class="w-full py-5 bg-cyan-500 text-black font-black rounded-2xl text-[11px] uppercase opacity-20 transition-all">Sincronizar Bold</button>
            <button id="btnCloseLegal" class="w-full mt-6 text-slate-600 text-[9px] uppercase tracking-widest hover:text-white transition">Cancelar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { firebaseConfig } from "/app/js/core/firebase-config.js";
        
        // Importación de tus módulos reformados
        import { procesarSuscripcionBold } from "./app/planManager.js";
        import { iniciarTrial } from "./app/activar-trial.js";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Variables de estado
        let selectedPlan = { id: null, price: 0 };

        // 1. MOTOR DE VINCULACIÓN (BINDING)
        const NexusCore = {
            init() {
                this.bindUI();
                this.bindSocial();
                console.log("🛰️ Nexus-X Core: Online");
            },

            bindUI() {
                // Trial de la Navegación
                document.getElementById('btnNavTrial').onclick = () => iniciarTrial();

                // Botones de Planes Dinámicos
                document.querySelectorAll('.btn-nexus').forEach(btn => {
                    btn.onclick = (e) => {
                        const action = btn.dataset.action;
                        if(action === 'trial') iniciarTrial();
                        if(action === 'pay') {
                            selectedPlan = { id: btn.dataset.plan, price: btn.dataset.price };
                            document.getElementById('modalLegal').classList.remove('hidden');
                        }
                    };
                });

                // Control Legal Checkboxes
                const cT = document.getElementById('checkT');
                const cP = document.getElementById('checkP');
                const cBtn = document.getElementById('btnConfirmBold');
                
                [cT, cP].forEach(el => el.onchange = () => {
                    const ready = cT.checked && cP.checked;
                    cBtn.disabled = !ready;
                    cBtn.classList.toggle('opacity-20', !ready);
                    cBtn.classList.toggle('shadow-[0_0_20px_#06b6d4]', ready);
                });

                // Acción Final Bold
                cBtn.onclick = async () => {
                    const user = auth.currentUser;
                    if(!user) return alert("Error: Debe iniciar sesión.");
                    cBtn.innerText = "PROCESANDO...";
                    await procesarSuscripcionBold(selectedPlan.id, 'mensual', user.uid, user.email);
                };

                document.getElementById('btnCloseLegal').onclick = () => {
                    document.getElementById('modalLegal').classList.add('hidden');
                };

                // Botón Demos Cloud
                document.getElementById('btnOpenDemoCloud').onclick = () => this.launchDemoCloud();
            },

            bindSocial() {
                // URLs configurables
                document.getElementById('social-fb').href = "https://facebook.com/tallerpro360";
                document.getElementById('social-wa').href = "https://wa.me/573XXXXXXXXX?text=Nexus-X%20Support";
            },

            async launchDemoCloud() {
                // Carga el componente que creaste de último
                try {
                    const resp = await fetch('/app/components/demos-section.html');
                    const html = await resp.text();
                    const container = document.createElement('div');
                    container.id = "demoCloudOverlay";
                    container.className = "fixed inset-0 z-[500] bg-black/90 backdrop-blur-xl overflow-y-auto p-10";
                    container.innerHTML = `
                        <div class="flex justify-end mb-8"><button id="closeCloud" class="text-white text-4xl">&times;</button></div>
                        ${html}
                    `;
                    document.body.appendChild(container);
                    document.getElementById('closeCloud').onclick = () => container.remove();
                } catch (e) {
                    // Fallback: Selector manual si el componente falla
                    window.location.href = "/demos/demo15-diagnostico-ai.html";
                }
            }
        };

        // 2. MONITOREO DE USUARIO
        onAuthStateChanged(auth, (user) => {
            if (user) {
                console.log("🛰️ Nodo Usuario: Conectado (" + user.email + ")");
                document.getElementById('btnNavTrial').innerText = "Panel Control";
                document.getElementById('btnNavTrial').onclick = () => window.location.href = "/app/dashboard.html";
            }
        });

        // 3. LANZAMIENTO
        document.addEventListener('DOMContentLoaded', () => NexusCore.init());
        // Forzar inicialización si el evento ya pasó
        if (document.readyState === "complete" || document.readyState === "interactive") {
            NexusCore.init();
        }
    </script>
</body>
</html>
