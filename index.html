<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TallerPRO360</title>
</head>
<body style="background: #0b1220; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif;">

    <div style="text-align: center;">
        <p>Cargando TallerPRO360...</p>
    </div>

    <script type="module">
        // Miramos si hay una sesión activa en el navegador
        const uid = localStorage.getItem("uid");

        if (uid) {
            // 🚀 Si ya entraste antes, te mando directo a la App
            window.location.replace("/app/index.html");
        } else {
            // 📢 Si eres un visitante nuevo, te mando a ver la Landing Page
            window.location.replace("/home.html");
        }
    </script>
</body>
</html>
