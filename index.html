<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TallerPRO360 | Login ERP Inteligente</title>
<meta name="description" content="Accede a TallerPRO360 ERP Inteligente para Talleres Automotrices">
<meta name="theme-color" content="#16a34a">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/assets/logo-192.png">
<link rel="apple-touch-icon" href="/assets/logo-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TallerPRO360">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Inter',sans-serif; background:#f9fafb; color:#111827; display:flex; justify-content:center; align-items:center; height:100vh; }
.container { max-width:400px; width:100%; background:white; padding:40px; border-radius:16px; box-shadow:0 15px 40px rgba(0,0,0,0.08); }
h1 { font-size:28px; font-weight:900; margin-bottom:20px; text-align:center; }
input { width:100%; padding:14px 16px; margin-bottom:16px; border:1px solid #ccc; border-radius:8px; font-size:16px; }
button { width:100%; padding:14px; background:#16a34a; color:white; border:none; border-radius:12px; font-weight:700; cursor:pointer; font-size:16px; transition:.3s; }
button:hover { transform:translateY(-2px); box-shadow:0 10px 20px rgba(0,0,0,0.2); }
.text-center { text-align:center; margin-top:12px; font-size:14px; }
.text-link { color:#16a34a; cursor:pointer; text-decoration:underline; }
</style>

</head>
<body>

<div class="container">
  <img src="/assets/logo-192.png" width="80" style="display:block; margin:0 auto 20px;">
  <h1>Ingresar a TallerPRO360</h1>

  <input type="email" id="email" placeholder="Correo electrónico" required>
  <input type="password" id="password" placeholder="Contraseña" required>

  <button id="btnLogin">Ingresar</button>

  <div class="text-center">
    <span class="text-link" onclick="activarTrial()">Probar 7 días gratis</span>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// Configuración Firebase (rellenar con tu config)
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_DOMINIO.firebaseapp.com",
  projectId: "TU_PROJECT_ID",
  storageBucket: "TU_BUCKET.appspot.com",
  messagingSenderId: "TU_MESSAGING_ID",
  appId: "TU_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Login
document.getElementById("btnLogin").addEventListener("click", async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (!email || !password) {
    alert("Complete ambos campos");
    return;
  }

  try {
    const userCredential = await signInWithEmailAndPassword(auth, email, password);
    localStorage.setItem("uid", userCredential.user.uid);
    // Redirigir a app panel
    window.location.href = "/app/index.html";
  } catch (err) {
    alert("Error de login: " + err.message);
  }
});

// Activar trial
async function activarTrial(){
  try{
    const res = await fetch("/api/activar-trial", { method:"POST" });
    if(res.ok){
      alert("Trial activado por 7 días");
      window.location.href = "/app/index.html";
    } else {
      alert("No se pudo activar el trial");
    }
  } catch(e){
    console.error(e);
    alert("Error activando trial");
  }
}

// PWA: registrar service worker
if("serviceWorker" in navigator){
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/service-worker.js")
    .then(() => console.log("Service Worker registrado"))
    .catch(e => console.error("SW error:", e));
  });
}
</script>

</body>
</html>
