<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS_X | DOCUMENTO OFICIAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #05070a; color: #e2e8f0; font-family: 'Rajdhani', sans-serif; margin: 0; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .paper { background: white; color: #1a1a1a; min-height: 29.7cm; width: 100%; max-width: 21cm; margin: auto; padding: 1.5cm; position: relative; }
        .theme-cotizacion { border-top: 15px solid #fbbf24; } 
        .theme-diagnostico { border-top: 15px solid #22d3ee; } 
        .theme-factura { border-top: 15px solid #22c55e; }    
        .theme-entregado { border-top: 15px solid #6366f1; }
        .watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-45deg); font-size: 8rem; opacity: 0.03; font-family: 'Orbitron'; pointer-events: none; }
    </style>
</head>
<body>

    <div id="loader" class="text-center py-40 orbitron animate-pulse text-cyan-400">
        🛰️ ENLAZANDO TELEMETRÍA NEXUS_X...
    </div>

    <div id="main-doc" class="paper shadow-2xl hidden">
        <div class="watermark orbitron" id="bg-watermark">NEXUS_X</div>

        <div class="flex justify-between items-start border-b-2 pb-6">
            <div>
                <img src="assets/favicon.png" alt="Logo" class="w-16 h-16 mb-2">
                <h1 id="taller-nombre" class="orbitron text-2xl font-black uppercase text-gray-800">---</h1>
                <p id="taller-nit" class="text-xs font-bold text-gray-500">NIT: ---</p>
            </div>
            <div class="text-right">
                <h2 id="doc-titulo" class="orbitron text-xl font-bold italic text-cyan-600">---</h2>
                <p id="doc-id" class="text-xs font-mono font-bold bg-gray-100 px-2 py-1 inline-block mt-1">ID: ---</p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-8 my-8 bg-gray-50 p-6 border rounded-lg">
            <div>
                <label class="text-[9px] font-bold text-cyan-700 block orbitron">CLIENTE</label>
                <p id="v-cliente" class="text-lg font-bold uppercase">---</p>
            </div>
            <div class="text-right border-l-2 pl-6">
                <label class="text-[9px] font-bold text-cyan-700 block orbitron">PLACA</label>
                <p id="v-placa" class="text-4xl font-black orbitron">---</p>
            </div>
        </div>

        <div class="mb-8 p-4 bg-slate-900 text-cyan-100 border-l-4 border-cyan-400 font-mono text-[11px]">
            <span class="block mb-2 font-bold text-cyan-400 opacity-70 uppercase tracking-tighter">/ LOG_IA_SISTEMA:</span>
            <p id="v-bitacora">---</p>
        </div>

        <div class="mb-10">
            <table class="w-full text-sm">
                <thead class="bg-gray-800 orbitron text-[10px] text-white">
                    <tr>
                        <th class="p-3 text-left">DESCRIPCIÓN</th>
                        <th class="p-3 text-right">CANT</th>
                        <th class="p-3 text-right">SUBTOTAL</th>
                    </tr>
                </thead>
                <tbody id="tabla-items" class="text-[12px] text-gray-700"></tbody>
            </table>
        </div>

        <div class="flex justify-end mt-10">
            <div class="w-72 space-y-3 border-t-4 border-gray-900 pt-6">
                <div class="flex justify-between text-2xl orbitron font-black bg-gray-900 text-white p-3 rounded">
                    <span>TOTAL:</span>
                    <span id="f-total">$ 0</span>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAdk-s-OXu57MiobzRGBRu-TlF2KYeicWQ",
            authDomain: "tallerpro360.firebaseapp.com",
            projectId: "tallerpro360",
            storageBucket: "tallerpro360.firebasestorage.app",
            messagingSenderId: "636224778184",
            appId: "1:636224778184:web:9bd7351b6458a1ef625afd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");
        const tipo = (params.get("tipo") || "diagnostico").toLowerCase();

        async function init() {
            if (!id) return;
            try {
                const snap = await getDoc(doc(db, "ordenes", id));
                if (snap.exists()) {
                    const orden = snap.data();
                    
                    // Intentar buscar empresa, si falla usa datos por defecto
                    let empresa = {};
                    try {
                        const empSnap = await getDoc(doc(db, "empresas", orden.empresaId || "taller_001"));
                        if(empSnap.exists()) empresa = empSnap.data();
                    } catch(e) { console.log("Empresa no encontrada"); }

                    render(orden, empresa);
                } else {
                    document.getElementById("loader").innerText = "🚨 ORDEN NO ENCONTRADA";
                }
            } catch (e) {
                console.error(e);
                document.getElementById("loader").innerText = "🚨 ERROR DE TELEMETRÍA: " + e.message;
            }
        }

        function render(o, e) {
            document.getElementById("loader").style.display = "none";
            document.getElementById("main-doc").classList.remove("hidden");
            document.getElementById("main-doc").className = `paper shadow-2xl theme-${tipo}`;
            
            document.getElementById("taller-nombre").innerText = e.nombre || o.empresa_nombre || "TALLER AFILIADO";
            document.getElementById("taller-nit").innerText = "NIT: " + (e.nit || "900.000.000-1");
            document.getElementById("doc-titulo").innerText = tipo.toUpperCase() + "_OFICIAL";
            document.getElementById("v-cliente").innerText = (o.cliente || "---").toUpperCase();
            document.getElementById("v-placa").innerText = (o.placa || "---").toUpperCase();
            document.getElementById("v-bitacora").innerText = o.bitacora_ia || "SIN REGISTROS TÉCNICOS.";
            document.getElementById("doc-id").innerText = "ID: " + id;
            document.getElementById("bg-watermark").innerText = tipo.toUpperCase();

            // Tabla robusta: busca en 'servicios', 'repuestos' o usa el total directo
            const tbody = document.getElementById("tabla-items");
            const items = [...(o.servicios || []), ...(o.repuestos || [])];
            
            if (items.length > 0) {
                items.forEach(i => {
                    tbody.innerHTML += `<tr class="border-b"><td class="p-3">${i.descripcion || i.nombre}</td><td class="p-3 text-right">${i.cantidad || 1}</td><td class="p-3 text-right">$ ${Math.round(i.precio || i.valor || 0).toLocaleString()}</td></tr>`;
                });
            } else {
                tbody.innerHTML = `<tr><td class="p-3">SERVICIO TÉCNICO INTEGRAL</td><td class="p-3 text-right">1</td><td class="p-3 text-right">$ ${Math.round(o.total || 0).toLocaleString()}</td></tr>`;
            }

            document.getElementById("f-total").innerText = `$ ${Math.round(o.total || 0).toLocaleString()}`;
        }
        init();
    </script>
</body>
</html>
