<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAdk-s-OXu57MiobzRGBRu-TlF2KYeicWQ",
        authDomain: "tallerpro360.firebaseapp.com",
        projectId: "tallerpro360",
        storageBucket: "tallerpro360.firebasestorage.app",
        messagingSenderId: "636224778184",
        appId: "1:636224778184:web:9bd7351b6458a1ef625afd"
    };
measurementId: "G-VEC2C0QX2G"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");
    const tipo = (params.get("tipo") || "diagnostico").toLowerCase();

    async function ejecutarProtocoloCarga() {
        if (!id) return;
        
        try {
            // 1. OBTENER DATOS DE LA ORDEN
            const docRef = doc(db, "ordenes", id);
            const snap = await getDoc(docRef);

            if (snap.exists()) {
                const dataOrden = snap.data();
                
                // 2. BUSCAR DATOS DE LA EMPRESA (Multitenant Logic)
                const empresaID = dataOrden.empresaId || "taller_001"; 
                const empresaRef = doc(db, "empresas", empresaID);
                const empresaSnap = await getDoc(empresaRef);
                const dataEmpresa = empresaSnap.exists() ? empresaSnap.data() : {};

                inyectarArquitectura(dataOrden, dataEmpresa);
            }
        } catch (error) {
            console.error("Falla en Telemetría:", error);
        }
    }

    function inyectarArquitectura(orden, empresa) {
        document.getElementById("loader").style.display = "none";
        document.getElementById("main-doc").classList.remove("hidden");
        
        // --- 🎨 RENDERIZADO VISUAL ---
        const docFrame = document.getElementById("main-doc");
        docFrame.className = `paper shadow-2xl transition-all duration-700 theme-${tipo}`;
        document.getElementById("bg-watermark").innerText = tipo.toUpperCase();
        document.getElementById("doc-titulo").innerText = tipo.toUpperCase() + "_OFICIAL";

        // --- 🏢 CABECERA SAP-BI (Datos de la Empresa) ---
        document.getElementById("taller-nombre").innerText = empresa.nombre || orden.empresa_nombre || "NEXUS_X PARTNER";
        document.getElementById("taller-nit").innerText = "NIT: " + (empresa.nit || "S/N");
        document.getElementById("taller-regimen").innerText = empresa.regimen || "Régimen Simplificado";
        document.getElementById("legal-taller").innerText = empresa.terminos || "Documento generado por TallerPRO360.";

        // --- 👤 DATOS UNIDAD/CLIENTE ---
        document.getElementById("v-cliente").innerText = orden.cliente;
        document.getElementById("v-placa").innerText = orden.placa;
        document.getElementById("v-tel").innerText = "TEL: " + (orden.telefono || "---");
        document.getElementById("v-bitacora").innerText = orden.bitacora_ia || "ESTADO ÓPTIMO DE OPERACIÓN.";
        document.getElementById("doc-id").innerText = "ID: " + (orden.id || id);

        // --- 📊 MOTOR DE DISCRIMINACIÓN (SAP Logic) ---
        const tbody = document.getElementById("tabla-items");
        tbody.innerHTML = ""; // Limpiar tabla

        // Unificamos servicios y repuestos para el desglose
        const items = [
            ...(orden.servicios || []),
            ...(orden.repuestos || [])
        ];

        if (items.length > 0) {
            items.forEach(item => {
                const fila = `
                    <tr>
                        <td class="p-2 border-b uppercase">${item.descripcion || item.nombre}</td>
                        <td class="p-2 text-right border-b">${item.cantidad || 1}</td>
                        <td class="p-2 text-right border-b">$ ${(item.precio || item.valor || 0).toLocaleString()}</td>
                        <td class="p-2 text-right border-b">$ ${(item.subtotal || (item.cantidad * item.precio) || 0).toLocaleString()}</td>
                    </tr>`;
                tbody.innerHTML += fila;
            });
        } else {
            // Fallback por si la orden no tiene arrays (Uso de total general)
            tbody.innerHTML = `<tr><td class="p-2 border-b">SERVICIO TÉCNICO GLOBAL</td><td class="p-2 text-right border-b">1</td><td class="p-2 text-right border-b">$ ${(orden.total || 0).toLocaleString()}</td><td class="p-2 text-right border-b">$ ${(orden.total || 0).toLocaleString()}</td></tr>`;
        }

        // --- 💰 FINANZAS DE PRECISIÓN ---
        const total = orden.total || 0;
        const esResponsable = (empresa.regimen || "").includes("Responsable de IVA");
        const neto = esResponsable ? (total / 1.19) : total;
        const iva = total - neto;

        document.getElementById("f-total").innerText = `$ ${Math.round(total).toLocaleString()}`;
        document.getElementById("f-neto").innerText = `$ ${Math.round(neto).toLocaleString()}`;
        document.getElementById("f-iva").innerText = `$ ${Math.round(iva).toLocaleString()}`;
        if (!esResponsable) document.getElementById("row-iva").style.display = "none";
    }

    ejecutarProtocoloCarga();
</script>
