<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS_X | DOCUMENTO OFICIAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #05070a; color: #e2e8f0; font-family: 'Rajdhani', sans-serif; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .paper { background: white; color: #1a1a1a; min-height: 29.7cm; width: 100%; max-width: 21cm; margin: auto; padding: 1.5cm; position: relative; overflow: hidden; }
        .watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-45deg); font-size: 8rem; opacity: 0.03; font-family: 'Orbitron'; pointer-events: none; }
        .theme-cotizacion { border-top: 15px solid #fbbf24; } 
        .theme-diagnostico { border-top: 15px solid #22d3ee; } 
        .theme-factura { border-top: 15px solid #22c55e; }    
        .theme-reparacion { border-top: 15px solid #ef4444; } 
        @media print { body { background: white; } .paper { margin: 0; padding: 1cm; box-shadow: none; } .no-print { display: none; } }
    </style>
</head>
<body>

    <div id="loader" class="text-center py-20 orbitron animate-pulse text-cyan-400">
        🛰️ ACCEDIENDO A SERVIDOR NEXUS_X...
    </div>

    <div id="main-doc" class="paper shadow-2xl hidden">
        <div class="watermark orbitron" id="bg-watermark">NEXUS_X</div>

        <div class="flex justify-between items-start pb-6 border-b border-gray-100">
            <div>
                <h1 id="taller-nombre" class="orbitron text-2xl font-black uppercase leading-none text-gray-900">---</h1>
                <p id="taller-nit" class="text-xs font-bold text-gray-500 tracking-widest">NIT: ---</p>
                <p id="taller-regimen" class="text-[9px] uppercase text-gray-400 font-bold mt-1">---</p>
            </div>
            <div class="text-right">
                <h2 id="doc-titulo" class="orbitron text-xl font-bold italic tracking-tighter">---</h2>
                <p id="doc-id" class="text-xs font-mono">ID: ---</p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-8 my-8 bg-gray-50 p-4 border border-gray-100">
            <div>
                <label class="text-[9px] font-bold text-cyan-700 block orbitron">DESTINATARIO_MISIÓN</label>
                <p id="v-cliente" class="text-lg font-bold uppercase italic text-gray-800">---</p>
            </div>
            <div class="text-right border-l-2 border-gray-200 pl-4">
                <label class="text-[9px] font-bold text-cyan-700 block orbitron">UNIDAD_TELEMETRÍA</label>
                <p id="v-placa" class="text-3xl font-black orbitron text-gray-900">---</p>
            </div>
        </div>

        <div class="mb-8 p-4 bg-slate-900 text-cyan-100 border-l-4 border-cyan-400 italic font-mono text-xs">
            <span class="block mb-1 font-bold text-cyan-400 opacity-70 tracking-widest uppercase">/ TRANSMISIÓN_IA:</span>
            <p id="v-bitacora">---</p>
        </div>

        <table class="w-full text-sm mb-10">
            <thead class="bg-gray-100 orbitron text-[10px] text-gray-600">
                <tr><th class="p-2 text-left">DESCRIPCIÓN</th><th class="p-2 text-right">CANT</th><th class="p-2 text-right">UNITARIO</th><th class="p-2 text-right">SUBTOTAL</th></tr>
            </thead>
            <tbody id="tabla-items" class="text-[12px]"></tbody>
        </table>

        <div class="flex justify-end">
            <div class="w-64 space-y-2 border-t-2 border-gray-900 pt-4">
                <div class="flex justify-between text-xs font-bold"><span>NETO:</span><span id="f-neto">$ 0</span></div>
                <div id="row-iva" class="flex justify-between text-xs text-gray-500"><span>IVA:</span><span id="f-iva">$ 0</span></div>
                <div class="flex justify-between text-xl orbitron font-black border-t pt-2"><span>TOTAL:</span><span id="f-total">$ 0</span></div>
            </div>
        </div>

        <div class="mt-20 border-t pt-4 text-[9px] text-gray-400">
            <p class="uppercase font-bold text-gray-300 tracking-[0.2em]">System_Powered_By_TallerPRO360_Nexus_X_Core</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAdk-s-OXu57MiobzRGBRu-TlF2KYeicWQ",
            authDomain: "tallerpro360.firebaseapp.com",
            projectId: "tallerpro360",
            storageBucket: "tallerpro360.firebasestorage.app",
            messagingSenderId: "636224778184",
            appId: "1:636224778184:web:9bd7351b6458a1ef625afd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");
        let tipo = params.get("tipo");

        async function cargarMision() {
            if (!id) return;
            try {
                const snap = await getDoc(doc(db, "ordenes", id));
                if (snap.exists()) {
                    const d = snap.data();
                    
                    // Auto-detección de tipo si falta en el link
                    if (!tipo) {
                        const map = { 'COTIZACION': 'cotizacion', 'FINALIZADO': 'factura', 'INGRESO': 'diagnostico' };
                        tipo = map[d.estado] || 'diagnostico';
                    }

                    // Identidad Dinámica: Buscamos en 'empresas/taller_001'
                    const idEmp = d.empresaId || "taller_001";
                    const empSnap = await getDoc(doc(db, "empresas", idEmp));
                    const e = empSnap.exists() ? empSnap.data() : { nombre: "TALLER LOS MOTORES", nit: "41532245" };

                    renderizar(d, e);
                }
            } catch (err) { console.error(err); }
        }

        function renderizar(d, e) {
            document.getElementById("loader").style.display = "none";
            document.getElementById("main-doc").classList.remove("hidden");
            
            // Estética
            document.getElementById("main-doc").classList.add(`theme-${tipo}`);
            document.getElementById("bg-watermark").innerText = tipo.toUpperCase();
            document.getElementById("doc-titulo").innerText = tipo.toUpperCase() + "_OFICIAL";

            // Datos Taller Dinámicos
            document.getElementById("taller-nombre").innerText = e.nombre || "TALLER LOS MOTORES";
            document.getElementById("taller-nit").innerText = "NIT: " + (e.nit || "41532245");
            
            const nitLimpio = (e.nit || "").toString().replace(/\D/g, '');
            const esIVA = nitLimpio.length > 9;
            document.getElementById("taller-regimen").innerText = esIVA ? "Responsable de IVA" : "No Responsable de IVA";
            if(!esIVA) document.getElementById("row-iva").style.display = "none";

            // Datos Orden
            document.getElementById("doc-id").innerText = "ID: " + (d.id || id);
            document.getElementById("v-cliente").innerText = d.cliente;
            document.getElementById("v-placa").innerText = d.placa;
            document.getElementById("v-bitacora").innerText = d.bitacora_ia || "TRANSMISIÓN EXITOSA.";

            // Financiero
            const total = d.total || d.costos_totales?.total || 0;
            document.getElementById("f-total").innerText = `$ ${Math.round(total).toLocaleString()}`;
            document.getElementById("f-neto").innerText = `$ ${Math.round(total).toLocaleString()}`;
            
            document.getElementById("tabla-items").innerHTML = `<tr><td class="p-2 border-b">SERVICIO TÉCNICO INTEGRAL</td><td class="p-2 text-right border-b">1</td><td class="p-2 text-right border-b">$ ${Math.round(total).toLocaleString()}</td><td class="p-2 text-right border-b">$ ${Math.round(total).toLocaleString()}</td></tr>`;
        }

        cargarMision();
    </script>
</body>
</html>
