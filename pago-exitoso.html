<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Validado | TallerPRO360</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #06b6d4; --dark: #020617; }
        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--dark); 
            color: white; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            overflow: hidden;
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        
        /* Efecto de Escaneo */
        .scanner-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: var(--cyan);
            box-shadow: 0 0 15px var(--cyan);
            top: 0;
            animation: scan 3s infinite linear;
            z-index: 10;
        }
        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(6, 182, 212, 0.2);
            position: relative;
            overflow: hidden;
        }

        .success-glow {
            animation: pulse-glow 2s infinite alternate;
        }
        @keyframes pulse-glow {
            from { box-shadow: 0 0 20px rgba(6, 182, 212, 0.1); }
            to { box-shadow: 0 0 50px rgba(6, 182, 212, 0.4); }
        }
    </style>
</head>
<body>

    <div class="scanner-line"></div>

    <div class="max-w-md w-full p-8 glass-card rounded-[3rem] text-center success-glow mx-4">
        
        <div class="mb-8 relative">
            <div class="w-24 h-24 bg-cyan-500/10 rounded-full flex items-center justify-center mx-auto border border-cyan-500/30">
                <i class="fas fa-check-double text-4xl text-cyan-400 animate-bounce"></i>
            </div>
            <div class="absolute inset-0 bg-cyan-500/20 blur-3xl rounded-full -z-10"></div>
        </div>

        <span class="text-[10px] orbitron text-cyan-500 tracking-[0.6em] uppercase block mb-2">Nexus-X Authentication</span>
        <h1 class="text-3xl font-black uppercase italic tracking-tighter mb-4">PAGO <span class="text-cyan-400">VALIDADO</span></h1>
        
        <p class="text-slate-400 text-sm font-light leading-relaxed mb-8">
            La transacción ha sido procesada por el motor <span class="text-white font-bold italic">PRO360CORE</span>. Tu suscripción o servicio ha sido activado en la red Starlink con éxito.
        </p>

        <div class="bg-white/5 rounded-2xl p-4 border border-white/5 mb-8 text-left">
            <div class="flex justify-between mb-2">
                <span class="text-[9px] font-black text-slate-500 uppercase">Estado:</span>
                <span class="text-[9px] font-black text-emerald-400 uppercase tracking-widest italic">Synchronized</span>
            </div>
            <div class="flex justify-between">
                <span class="text-[9px] font-black text-slate-500 uppercase">ID Operación:</span>
                <span class="text-[9px] font-black text-white" id="op-id">NX-360-B0LD</span>
            </div>
        </div>

        <a href="/dashboard.html" class="block w-full py-4 bg-cyan-500 text-black orbitron font-black text-xs rounded-xl uppercase hover:scale-105 transition shadow-lg shadow-cyan-500/30">
            Ingresar al Panel <i class="fas fa-chevron-right ml-2"></i>
        </a>

        <div class="mt-8">
            <p class="text-[8px] text-slate-600 font-bold uppercase tracking-[0.4em]">Engine Version 13.5.0-STARLINK</p>
        </div>
    </div>

    <script>
        // Generar un ID visual aleatorio para la estética
        document.getElementById('op-id').innerText = 'NX-' + Math.random().toString(36).substr(2, 9).toUpperCase();
        
        // Redirección automática después de 10 segundos
        setTimeout(() => {
            // window.location.href = '/dashboard.html';
        }, 10000);
    </script>
</body>
</html>
