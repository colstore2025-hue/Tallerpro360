<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Validado | TallerPRO360 NEXUS-X</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #06b6d4; --dark: #020617; --emerald: #10b981; }
        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--dark); 
            color: white; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            overflow: hidden;
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        
        .scanner-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: var(--cyan);
            box-shadow: 0 0 15px var(--cyan);
            top: 0;
            animation: scan 3s infinite linear;
            z-index: 10;
        }
        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(6, 182, 212, 0.2);
            position: relative;
            overflow: hidden;
        }

        .success-glow {
            animation: pulse-glow 2s infinite alternate;
        }
        @keyframes pulse-glow {
            from { box-shadow: 0 0 20px rgba(6, 182, 212, 0.1); }
            to { box-shadow: 0 0 50px rgba(6, 182, 212, 0.4); }
        }

        .loading-bar {
            width: 0%;
            height: 4px;
            background: var(--cyan);
            box-shadow: 0 0 10px var(--cyan);
            transition: width 0.5s ease;
        }
    </style>
</head>
<body>

    <div class="scanner-line"></div>

    <div class="max-w-md w-full p-10 glass-card rounded-[3.5rem] text-center success-glow mx-4 border-t-cyan-500/50">
        
        <div class="mb-10 relative">
            <div class="w-28 h-28 bg-cyan-500/10 rounded-full flex items-center justify-center mx-auto border-2 border-cyan-500/20">
                <i id="status-icon" class="fas fa-shield-check text-5xl text-cyan-400"></i>
            </div>
            <div class="absolute inset-0 bg-cyan-500/20 blur-3xl rounded-full -z-10"></div>
        </div>

        <span class="text-[10px] orbitron text-cyan-500 tracking-[0.7em] uppercase block mb-3 italic">Nexus-X Starlink Sincronización</span>
        <h1 class="text-4xl font-black uppercase italic tracking-tighter mb-6">ACCESO <span class="text-cyan-400">VALIDADO</span></h1>
        
        <p class="text-slate-400 text-sm font-light leading-relaxed mb-10 px-4">
            La firma digital <span class="text-white font-bold italic">PRO360CORE</span> ha verificado el recaudo. Su infraestructura logística está ahora operando en la red satelital.
        </p>

        <div class="bg-black/40 rounded-[2rem] p-6 border border-white/5 mb-10 text-left relative overflow-hidden">
            <div class="flex justify-between items-center mb-4">
                <span class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Protocolo:</span>
                <span id="protocol-status" class="text-[9px] font-black text-emerald-400 uppercase tracking-widest italic animate-pulse">Synchronizing...</span>
            </div>
            
            <div class="w-full bg-white/5 h-1 rounded-full overflow-hidden mb-4">
                <div id="sync-bar" class="loading-bar"></div>
            </div>

            <div class="flex justify-between">
                <span class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Hash Transacción:</span>
                <span class="text-[9px] font-black text-white orbitron" id="op-id">NX-SYNC-LOADING</span>
            </div>
        </div>

        <button onclick="enterMission()" id="btn-enter" class="opacity-50 pointer-events-none block w-full py-5 bg-cyan-500 text-black orbitron font-black text-xs rounded-2xl uppercase transition-all shadow-lg shadow-cyan-500/30 hover:scale-[1.02] active:scale-95">
            Ingresar al Comando <i class="fas fa-arrow-right ml-2"></i>
        </button>

        <div class="mt-10">
            <p class="text-[8px] text-slate-600 font-black uppercase tracking-[0.5em] italic">Engine Version 16.0.4-AEGIS</p>
        </div>
    </div>

    <script>
        // Simulación de validación de Hash y Seguridad
        const opId = 'NX-' + Math.random().toString(36).substr(2, 12).toUpperCase();
        document.getElementById('op-id').innerText = opId;

        // Protocolo de Sincronización Automática
        function startSync() {
            const bar = document.getElementById('sync-bar');
            const statusText = document.getElementById('protocol-status');
            const btn = document.getElementById('btn-enter');
            const icon = document.getElementById('status-icon');

            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 30;
                if (progress > 100) progress = 100;
                
                bar.style.width = progress + '%';

                if (progress === 100) {
                    clearInterval(interval);
                    statusText.innerText = 'ONLINE - SECURE';
                    statusText.classList.remove('text-emerald-400', 'animate-pulse');
                    statusText.classList.add('text-cyan-400');
                    
                    // Activar botón y cambiar icono
                    btn.classList.remove('opacity-50', 'pointer-events-none');
                    icon.classList.remove('fa-shield-check');
                    icon.classList.add('fa-rocket-launch', 'animate-bounce');
                    
                    console.log("Nexus-X: Sincronización de licencia completada.");
                }
            }, 600);
        }

        function enterMission() {
            // Aquí podrías forzar un refresh de los datos de Firebase antes de redirigir
            window.location.href = '/dashboard.html';
        }

        // Iniciar al cargar
        window.onload = startSync;
    </script>
</body>
</html>
