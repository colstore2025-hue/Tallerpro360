<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TallerPRO360 | ERP PRO 360</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  background:linear-gradient(135deg,#0f172a,#111827);
  color:#f1f5f9;
  font-family:'Inter',sans-serif;
}
.glass{
  background:rgba(15,23,42,.85);
  backdrop-filter:blur(18px);
  border-radius:1.2rem;
  border:1px solid rgba(255,255,255,.1);
  padding:1.5rem;
  margin-bottom:1.2rem;
}
.btn-pro{
  background:#22c55e;
  border:none;
  font-weight:600;
}
.metric-card h2{
  font-weight:700;
}
</style>
</head>
<body class="p-3">

<div class="container">

<h2 class="text-center mb-4">ERP OPERATIVO PRO 360</h2>

<div class="row mb-4" id="metricas"></div>

<div class="glass">
<h5>Nueva Orden</h5>
<form id="formOrden">

<div class="row">
<div class="col-md-6 mb-2">
<input class="form-control" id="clienteNombre" placeholder="Cliente" required>
</div>
<div class="col-md-6 mb-2">
<input class="form-control" id="clienteTelefono" placeholder="Teléfono" required>
</div>
<div class="col-md-4 mb-2">
<input class="form-control" id="placa" placeholder="Placa" required>
</div>
<div class="col-md-4 mb-2">
<input class="form-control" id="modelo" placeholder="Modelo" required>
</div>
<div class="col-md-4 mb-2">
<input class="form-control" id="repuestos" placeholder="Repuestos (coma)">
</div>
<div class="col-md-6 mb-2">
<input type="number" class="form-control" id="total" placeholder="Total" required>
</div>
</div>

<button class="btn btn-pro w-100 mt-3">Crear Orden</button>
</form>
</div>

<div class="glass">
<h5>Órdenes en Tiempo Real</h5>
<ul class="list-group bg-transparent" id="listaOrdenes"></ul>
</div>

<div class="glass">
<h5>Ingresos Mensuales</h5>
<canvas id="graficoIngresos"></canvas>
</div>

</div>

<script type="module">

import { 
getFirestore, collection, addDoc, updateDoc, doc,
onSnapshot, serverTimestamp, query, orderBy 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const db = getFirestore();
const auth = getAuth();
const empresaId = localStorage.getItem("empresaId");

let ordenes = [];
let inventario = [];

/* =========================
   INIT REALTIME
========================= */

function initRealtimeOrdenes(){
  const q = query(
    collection(db,"empresas",empresaId,"ordenes"),
    orderBy("creadoEn","desc")
  );

  onSnapshot(q,(snap)=>{
    ordenes=[];
    snap.forEach(d=>ordenes.push({id:d.id,...d.data()}));
    renderOrdenes();
    renderMetricas();
    renderGrafico();
    evaluarCRM();
  });
}

function initRealtimeInventario(){
  onSnapshot(
    collection(db,"empresas",empresaId,"inventario"),
    (snap)=>{
      inventario=[];
      snap.forEach(d=>inventario.push({id:d.id,...d.data()}));
    }
  );
}

/* =========================
   CREAR ORDEN + INVENTARIO
========================= */

document.getElementById("formOrden").addEventListener("submit",async e=>{
  e.preventDefault();

  const repuestosInput = document.getElementById("repuestos").value;
  const repuestosArray = repuestosInput.split(",").map(r=>r.trim()).filter(r=>r);

  const nuevaOrden = {
    clienteNombre:clienteNombre.value,
    clienteTelefono:clienteTelefono.value,
    placa:placa.value,
    vehiculo:modelo.value,
    repuestos:repuestosArray,
    totalOrden:parseFloat(total.value),
    pagado:0,
    estado:"en_proceso",
    usuarioId:auth.currentUser.uid,
    creadoEn:serverTimestamp()
  };

  await addDoc(
    collection(db,"empresas",empresaId,"ordenes"),
    nuevaOrden
  );

  await descontarInventario(repuestosArray);

  e.target.reset();
});

/* =========================
   DESCONTAR INVENTARIO
========================= */

async function descontarInventario(repuestos){
  for(const nombreRepuesto of repuestos){
    const item = inventario.find(i=>i.nombre.toLowerCase()===nombreRepuesto.toLowerCase());
    if(item){
      const nuevoStock = item.stockActual - 1;

      await updateDoc(
        doc(db,"empresas",empresaId,"inventario",item.id),
        { stockActual:nuevoStock }
      );

      await addDoc(
        collection(db,"empresas",empresaId,"movimientosInventario"),
        {
          tipo:"salida",
          producto:item.nombre,
          cantidad:1,
          fecha:serverTimestamp()
        }
      );
    }
  }
}

/* =========================
   MÉTRICAS
========================= */

function renderMetricas(){
  const activas = ordenes.filter(o=>o.estado==="en_proceso").length;
  const ingresos = ordenes.reduce((acc,o)=>acc+(o.pagado||0),0);
  const pendientes = ordenes.reduce((acc,o)=>acc+((o.totalOrden||0)-(o.pagado||0)),0);
  const promedio = ordenes.length ? Math.floor(ingresos/ordenes.length):0;

  document.getElementById("metricas").innerHTML=`
  <div class="col-md-3"><div class="glass metric-card"><h6>Activas</h6><h2>${activas}</h2></div></div>
  <div class="col-md-3"><div class="glass metric-card"><h6>Ingresos</h6><h2>$${ingresos.toLocaleString()}</h2></div></div>
  <div class="col-md-3"><div class="glass metric-card"><h6>Pendientes</h6><h2>$${pendientes.toLocaleString()}</h2></div></div>
  <div class="col-md-3"><div class="glass metric-card"><h6>Ticket Prom.</h6><h2>$${promedio.toLocaleString()}</h2></div></div>
  `;
}

/* =========================
   ÓRDENES
========================= */

function renderOrdenes(){
  const ul=document.getElementById("listaOrdenes");
  ul.innerHTML="";
  ordenes.forEach(o=>{
    const li=document.createElement("li");
    li.className="list-group-item bg-transparent text-white mb-2";
    li.innerHTML=`
      <strong>${o.placa}</strong> - ${o.vehiculo}<br>
      ${o.clienteNombre}<br>
      Estado: ${o.estado}<br>
      Total: $${(o.totalOrden||0).toLocaleString()}
    `;
    ul.appendChild(li);
  });
}

/* =========================
   DASHBOARD MENSUAL + IA
========================= */

let chart;

function renderGrafico(){
  const meses={};
  ordenes.forEach(o=>{
    if(!o.creadoEn?.seconds) return;
    const d=new Date(o.creadoEn.seconds*1000);
    const key=d.getMonth()+1;
    meses[key]=(meses[key]||0)+(o.pagado||0);
  });

  const labels=Object.keys(meses);
  const data=Object.values(meses);

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("graficoIngresos"),{
    type:"line",
    data:{
      labels,
      datasets:[{label:"Ingresos",data}]
    }
  });
}

/* =========================
   CRM INTELIGENTE
========================= */

function evaluarCRM(){
  ordenes.forEach(async o=>{
    const deuda=(o.totalOrden||0)-(o.pagado||0);
    if(deuda>0){
      await addDoc(
        collection(db,"empresas",empresaId,"finanzas"),
        {
          tipo:"alerta_deuda",
          cliente:o.clienteNombre,
          deuda,
          fecha:serverTimestamp()
        }
      );
    }
  });
}

/* =========================
   INIT
========================= */

initRealtimeOrdenes();
initRealtimeInventario();

</script>

</body>
</html>
