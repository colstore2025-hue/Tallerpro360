<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Demo TallerPRO360</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { background:#0b0c17; color:white; font-family:sans-serif; padding:20px; }
    h1, h2, h3 { text-shadow:0 0 8px #00ffcc; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    // Dashboard demo sin Firebase
    async function dashboard(container, state) {
      container.innerHTML = `<h1>📊 Dashboard Demo</h1>
        <div id="kpis" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;"></div>
        <div style="margin-top:20px;"><canvas id="graficaIngresos"></canvas></div>
        <div id="iaPanel" style="margin-top:20px;"></div>
      `;

      // 🔹 Datos simulados
      const ingresos = 1200000;
      const costos = 800000;
      const utilidad = ingresos - costos;
      const ordenes = 45;

      const ingresosPorDia = {
        "2026-03-10": 200000,
        "2026-03-11": 150000,
        "2026-03-12": 180000,
        "2026-03-13": 250000,
        "2026-03-14": 220000
      };

      // KPI
      const kpis = document.getElementById("kpis");
      kpis.innerHTML = `
        ${crearKPI("💰 Ingresos", ingresos)}
        ${crearKPI("📉 Costos", costos)}
        ${crearKPI("📈 Utilidad", utilidad)}
        ${crearKPI("🧾 Órdenes", ordenes)}
      `;

      // Gráfica
      renderGrafica(ingresosPorDia);

      // IA demo
      const iaData = {
        resumen: {
          ingresos, costos, utilidad, margen: Math.round(utilidad/ingresos*100), ticketPromedio: Math.round(ingresos/ordenes)
        },
        alertas: ["Revisar inventario crítico", "Cliente con saldo pendiente"],
        recomendaciones: ["Optimizar compras", "Promocionar servicios"]
      };
      renderIA(iaData);
    }

    function crearKPI(titulo, valor) {
      return `<div style="
        background:#111827; padding:20px; border-radius:12px; text-align:center; box-shadow:0 0 10px rgba(0,255,153,0.4);
      ">
        <h3>${titulo}</h3>
        <p style="font-size:22px;">$${new Intl.NumberFormat("es-CO").format(valor)}</p>
      </div>`;
    }

    function renderGrafica(data) {
      const ctx = document.getElementById("graficaIngresos");
      new Chart(ctx, {
        type: "line",
        data: { labels:Object.keys(data), datasets:[{label:"Ingresos por día", data:Object.values(data), borderWidth:2}] }
      });
    }

    function renderIA(data) {
      const panel = document.getElementById("iaPanel");
      panel.innerHTML = `
        <div style="background:#0f172a; padding:20px; border-radius:12px; box-shadow:0 0 15px #00ff99;">
          <h2>🧠 IA Gerente</h2>
          <p>💰 Ingresos: $${data.resumen.ingresos}</p>
          <p>📉 Costos: $${data.resumen.costos}</p>
          <p>📈 Utilidad: $${data.resumen.utilidad}</p>
          <p>📊 Margen: ${data.resumen.margen}%</p>
          <p>🎯 Ticket Promedio: $${data.resumen.ticketPromedio}</p>
          <h3>⚠️ Alertas</h3>${data.alertas.map(a=>`<p>${a}</p>`).join("")}
          <h3>🚀 Recomendaciones</h3>${data.recomendaciones.map(r=>`<p>${r}</p>`).join("")}
        </div>
      `;
    }

    // Iniciar demo
    const container = document.getElementById("app");
    dashboard(container, {empresaId:"demo_001"});
  </script>
</body>
</html>
