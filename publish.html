<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publicar Servicio | TallerPRO360</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #06b6d4; --dark: #020617; }
        body { font-family: 'Outfit', sans-serif; background: var(--dark); color: white; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .glass-input { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; padding: 1rem; width: 100%; outline: none; transition: 0.3s; }
        .glass-input:focus { border-color: var(--cyan); background: rgba(6,182,212,0.05); }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-4xl mx-auto">
        <header class="mb-12 flex justify-between items-end">
            <div>
                <span class="text-cyan-500 orbitron text-[10px] tracking-[0.5em] uppercase">Nexus-X Publisher</span>
                <h1 class="text-4xl font-black uppercase italic tracking-tighter">Publicar <span class="text-cyan-400">Servicio</span></h1>
            </div>
            <a href="/dashboard.html" class="text-slate-500 hover:text-white text-xs font-black orbitron uppercase tracking-widest"><i class="fas fa-arrow-left mr-2"></i> Volver</a>
        </header>

        <form id="formPublish" class="grid grid-cols-1 md:grid-cols-2 gap-8 bg-slate-900/40 p-8 rounded-[2rem] border border-white/5">
            
            <div class="space-y-4">
                <label class="text-[10px] font-black uppercase text-slate-500 tracking-widest">Imagen del Servicio</label>
                <div class="h-64 border-2 border-dashed border-white/10 rounded-[2rem] flex flex-col items-center justify-center cursor-pointer hover:border-cyan-500/50 transition bg-white/5">
                    <i class="fas fa-cloud-upload-alt text-3xl text-slate-600 mb-2"></i>
                    <p class="text-[10px] text-slate-500 font-bold uppercase">Click para cargar (JPG/PNG)</p>
                </div>
            </div>

            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-black uppercase text-slate-500 tracking-widest block mb-2">Nombre del Servicio</label>
                    <input type="text" placeholder="Ej: Mantenimiento Preventivo 10K" class="glass-input text-white font-bold">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-500 tracking-widest block mb-2">Precio Público</label>
                        <input type="number" placeholder="$ 0.00" class="glass-input text-cyan-400 font-black">
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-500 tracking-widest block mb-2">Tiempo Est.</label>
                        <select class="glass-input font-bold text-slate-400">
                            <option>1-2 Horas</option>
                            <option>Medio Día</option>
                            <option>24 Horas</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase text-slate-500 tracking-widest block mb-2">Descripción (Promoción)</label>
                    <textarea rows="3" placeholder="Describe por qué tu taller es el mejor para este servicio..." class="glass-input text-sm"></textarea>
                </div>
            </div>

            <div class="md:col-span-2 pt-6 border-t border-white/5 flex justify-end">
                <button type="submit" class="px-12 py-4 bg-cyan-500 text-black orbitron font-black text-xs rounded-xl uppercase hover:scale-105 transition shadow-lg shadow-cyan-500/20"> Lanzar Publicación <i class="fas fa-paper-plane ml-2"></i></button>
            </div>
        </form>
    </div>

</body>
</html>
