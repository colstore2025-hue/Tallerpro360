<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus-X · Launch Pad V2030</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root { --cyan: #06b6d4; --dark-bg: #010409; --panel: #0d1117; }
        body {
            background-color: var(--dark-bg);
            font-family: 'Outfit', sans-serif; color: white; min-height: 100vh;
            background-image: radial-gradient(circle at 50% -20%, #1e293b 0%, #010409 80%);
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .glass-card {
            background: var(--panel); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2.5rem; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .glass-card:hover { border-color: var(--cyan); box-shadow: 0 0 30px rgba(6, 182, 212, 0.1); }
        
        .input-nexus {
            background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255,255,255,0.08);
            color: white; border-radius: 1.25rem;
        }
        .input-nexus:focus { 
            border-color: var(--cyan); outline: none;
            background: rgba(6, 182, 212, 0.03);
        }
        .btn-launch {
            background: white; color: black;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
            transition: 0.3s;
        }
        .btn-launch:hover { background: var(--cyan); color: white; transform: scale(1.02); }
        
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
        .scanner::after {
            content: ""; position: absolute; width: 100%; height: 2px;
            background: var(--cyan); top: 0; left: 0; animation: scan 3s linear infinite;
            box-shadow: 0 0 15px var(--cyan);
        }
    </style>
</head>
<body class="p-6 md:p-12">

<div class="max-w-7xl mx-auto">
    <div class="flex flex-col md:flex-row justify-between items-end mb-12 border-b border-white/5 pb-10 gap-8">
        <div class="relative pl-8">
            <div class="absolute left-0 top-0 h-full w-1.5 bg-cyan-500 shadow-[0_0_20px_#06b6d4]"></div>
            <div class="flex items-center gap-4 mb-3">
                <span class="px-3 py-1 bg-white/5 text-[9px] orbitron font-black text-slate-400 rounded-full tracking-widest">EXPANSION PROTOCOL</span>
                <span class="text-[9px] orbitron text-cyan-500 font-bold">NEXUS-X // SYNC 2030</span>
            </div>
            <h1 class="orbitron text-5xl font-black italic uppercase tracking-tighter">PUBLISH<span class="text-white/20">CENTER</span></h1>
        </div>
        <div class="flex gap-4 w-full md:w-auto">
            <button onclick="location.hash='#dashboard'" class="flex-1 md:px-8 py-4 glass-card text-[10px] orbitron font-black uppercase tracking-widest hover:bg-white/5">Abortar</button>
            <div class="w-16 h-16 bg-white flex items-center justify-center rounded-3xl shadow-[0_0_30px_rgba(255,255,255,0.2)]">
                <i class="fas fa-satellite-dish text-black text-2xl"></i>
            </div>
        </div>
    </div>

    <div class="grid lg:grid-cols-12 gap-10">
        <div class="lg:col-span-8 space-y-8">
            <div class="glass-card p-10">
                <div class="flex items-center gap-4 mb-10">
                    <div class="h-8 w-1 bg-cyan-500"></div>
                    <h3 class="orbitron text-xs font-black text-white uppercase tracking-[0.3em]">Configuración de Activo</h3>
                </div>
                
                <div class="grid md:grid-cols-2 gap-8">
                    <div class="md:col-span-2">
                        <label class="block text-[8px] text-slate-500 uppercase font-black mb-3 tracking-widest">Nombre Técnico del Repuesto</label>
                        <input type="text" id="prodNombre" class="w-full p-6 input-nexus text-sm font-bold placeholder:text-slate-700" placeholder="EJ: TURBOCOMPRESOR HOLSET HE451VE">
                    </div>
                    
                    <div>
                        <label class="block text-[8px] text-slate-500 uppercase font-black mb-3 tracking-widest">Valor de Mercado (COP)</label>
                        <input type="text" id="prodPrecio" class="w-full p-6 input-nexus text-sm font-black text-cyan-400" placeholder="$ 0">
                    </div>

                    <div>
                        <label class="block text-[8px] text-slate-500 uppercase font-black mb-3 tracking-widest">Canal de Logística</label>
                        <select id="logisticaType" class="w-full p-6 input-nexus text-[10px] font-black uppercase tracking-widest">
                            <option value="heavy">COLOMBIAN TRUCKS (CARGA PESADA)</option>
                            <option value="standard">ENVÍO NACIONAL EXPRESS</option>
                            <option value="usa">CHARLOTTE HUB (EXPORT USA)</option>
                            <option value="local">RETIRO EN TALLER</option>
                        </select>
                    </div>

                    <div class="md:col-span-2">
                        <label class="block text-[8px] text-slate-500 uppercase font-black mb-3 tracking-widest">Descripción / ADN del Producto</label>
                        <textarea id="prodDesc" rows="4" class="w-full p-6 input-nexus text-xs leading-relaxed" placeholder="Detalla compatibilidad, horas de uso y certificación..."></textarea>
                    </div>
                </div>
            </div>

            <div class="flex flex-col md:flex-row gap-6">
                <button id="btnPublish" class="flex-[3] py-8 btn-launch orbitron font-black text-[12px] rounded-[2.5rem] uppercase tracking-[0.2em] flex items-center justify-center gap-4">
                    EJECUTAR PUBLICACIÓN GLOBAL <i class="fas fa-bolt"></i>
                </button>
                <button class="flex-1 py-8 glass-card border-white/10 text-slate-400 orbitron font-black text-[9px] rounded-[2.5rem] uppercase hover:text-white">
                    Backup local
                </button>
            </div>
        </div>

        <div class="lg:col-span-4 space-y-8">
            <div class="glass-card p-2 text-center overflow-hidden group cursor-pointer border-dashed border-2 border-white/10 hover:border-cyan-500/50" onclick="document.getElementById('fileInput').click()">
                <div id="dropZone" class="py-16">
                    <div class="w-20 h-20 bg-white/5 rounded-full flex items-center justify-center mx-auto mb-6 group-hover:bg-cyan-500/10 transition-all">
                        <i class="fas fa-microchip text-3xl text-slate-600 group-hover:text-cyan-500"></i>
                    </div>
                    <p class="orbitron text-[10px] font-black uppercase text-slate-500 tracking-widest">Vincular Imagen</p>
                    <input type="file" id="fileInput" class="hidden" accept="image/*">
                </div>
                <div id="previewContainer" class="hidden relative scanner">
                    <img id="imgPreview" src="#" alt="Preview" class="w-full h-80 object-cover rounded-[2rem]">
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent"></div>
                    <div class="absolute bottom-6 left-6 text-left">
                        <p class="text-[7px] font-black text-cyan-400 orbitron uppercase tracking-[0.3em] mb-1">Preview Protocol</p>
                        <p id="previewName" class="text-xs font-black text-white uppercase italic truncate w-48">SIN ASIGNAR</p>
                    </div>
                </div>
            </div>

            <div class="bg-gradient-to-br from-[#0d1117] to-[#010409] p-10 rounded-[3rem] border border-cyan-500/10 relative overflow-hidden">
                <div class="absolute -right-8 -top-8 text-white/5 text-8xl italic orbitron font-black select-none">AI</div>
                
                <div class="flex items-center gap-4 mb-8">
                    <div class="w-10 h-10 bg-cyan-500/10 border border-cyan-500/30 rounded-xl flex items-center justify-center">
                        <i class="fas fa-brain text-cyan-500 text-sm"></i>
                    </div>
                    <p class="orbitron text-[10px] font-black text-white uppercase tracking-[0.2em]">Strategist AI</p>
                </div>

                <div class="space-y-6">
                    <div id="aiSuggestion" class="text-[11px] text-slate-400 italic leading-relaxed font-medium">
                        Analizando tendencias de mercado en <span class="text-white">Colombia / Charlotte</span>...
                    </div>
                    
                    <div class="p-5 bg-black/40 rounded-2xl border border-white/5">
                        <div class="flex justify-between items-center mb-3">
                            <p class="text-[8px] font-black text-emerald-400 uppercase tracking-widest">Probabilidad de Conversión</p>
                            <span class="text-[10px] font-black orbitron text-white">85%</span>
                        </div>
                        <div class="w-full bg-white/5 h-1.5 rounded-full overflow-hidden">
                            <div class="bg-gradient-to-r from-cyan-500 to-emerald-500 h-full w-[85%]"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const previewName = document.getElementById('previewName');
    const prodNombre = document.getElementById('prodNombre');
    const aiText = document.getElementById('aiSuggestion');

    // Actualización de nombre en tiempo real
    prodNombre.addEventListener('input', (e) => {
        const val = e.target.value.toUpperCase();
        previewName.innerText = val || "SIN ASIGNAR";
        
        if(val.length > 5) {
            aiText.innerHTML = `Nexus detecta demanda creciente para <b class="text-cyan-400">${val}</b>. Se recomienda fijar precio un 5% debajo de la competencia para cierre en menos de 48h.`;
        }
    });

    // Vista previa de imagen con Scanner Effect
    fileInput.onchange = e => {
        const [file] = fileInput.files;
        if (file) {
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById('imgPreview').src = e.target.result;
                document.getElementById('dropZone').classList.add('hidden');
                document.getElementById('previewContainer').classList.remove('hidden');
            }
            reader.readAsDataURL(file);
        }
    };

    // Máscara de Moneda Inteligente
    document.getElementById('prodPrecio').addEventListener('input', function (e) {
        let value = e.target.value.replace(/\D/g, "");
        if (value) {
            value = new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(value);
            e.target.value = value;
        } else {
            e.target.value = "";
        }
    });

    // Acción de Publicación (Simulada para integración con Dashboard)
    document.getElementById('btnPublish').onclick = () => {
        alert("Sincronizando con Bóveda Nexus-X... Publicación en progreso.");
        // Aquí iría la lógica de guardado en Firebase
    };
</script>

</body>
</html>
