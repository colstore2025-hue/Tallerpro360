<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TallerPRO360 | Simulación del Taller Inteligente</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
background:#020617;
color:white;
font-family:system-ui;
}

.sidebar{
background:#020617;
border-right:1px solid #1e293b;
}

.card{
background:#0f172a;
border:1px solid #1e293b;
border-radius:14px;
padding:20px;
}

.log{
background:#020617;
border:1px solid #1e293b;
border-radius:10px;
padding:10px;
font-size:14px;
height:220px;
overflow:auto;
}

</style>

</head>


<body class="flex min-h-screen">

<!-- SIDEBAR -->

<div class="sidebar w-64 p-6">

<h1 class="text-2xl font-black text-emerald-400 mb-10">
TallerPRO360
</h1>

<div class="space-y-4 text-slate-300">

<div>
<i class="fa-solid fa-car"></i> Órdenes
</div>

<div>
<i class="fa-solid fa-brain"></i> IA Mecánica
</div>

<div>
<i class="fa-solid fa-chart-line"></i> Finanzas
</div>

<div>
<i class="fa-solid fa-users"></i> Clientes
</div>

</div>

</div>


<!-- PANEL PRINCIPAL -->

<div class="flex-1 p-10">

<h2 class="text-3xl font-bold mb-8">
Simulación del Taller Inteligente
</h2>


<!-- KPIs -->

<div class="grid md:grid-cols-3 gap-6">

<div class="card">

<h3 class="text-lg font-bold">
Órdenes Activas
</h3>

<p id="ordenes" class="text-3xl text-emerald-400 mt-3">
0
</p>

</div>

<div class="card">

<h3 class="text-lg font-bold">
Ingresos Hoy
</h3>

<p id="ingresos" class="text-3xl text-emerald-400 mt-3">
$0
</p>

</div>

<div class="card">

<h3 class="text-lg font-bold">
Clientes Atendidos
</h3>

<p id="clientes" class="text-3xl text-emerald-400 mt-3">
0
</p>

</div>

</div>


<!-- GRAFICO -->

<div class="card mt-8">

<h3 class="text-lg font-bold mb-4">
Ingresos del Día
</h3>

<canvas id="graficoIngresos"></canvas>

</div>


<!-- ACTIVIDAD -->

<div class="mt-8">

<h3 class="text-xl font-bold mb-3">
Actividad del Taller
</h3>

<div id="log" class="log"></div>

</div>

</div>



<script>

/* ========================
VARIABLES
======================== */

let ordenes = 0
let ingresos = 0
let clientes = 0

let datosGrafico = []



const vehiculos = [
"Toyota Corolla",
"Chevrolet Spark",
"Renault Logan",
"Kia Picanto",
"Mazda 3"
]

const fallas = [
"Fuga de aceite",
"Falla en frenos",
"Batería descargada",
"Sensor de oxígeno",
"Filtro de aire obstruido"
]

const costos = [
120000,
250000,
90000,
180000,
320000
]



/* ========================
GRAFICO
======================== */

const ctx = document.getElementById('graficoIngresos')

const grafico = new Chart(ctx, {

type: 'line',

data: {

labels: [],

datasets: [{

label: 'Ingresos',

data: [],

borderColor: '#10b981',

backgroundColor: '#10b98133',

tension:0.3

}]

}

})



/* ========================
SIMULADOR
======================== */

function simular(){

const v = vehiculos[Math.floor(Math.random()*vehiculos.length)]

const f = fallas[Math.floor(Math.random()*fallas.length)]

const c = costos[Math.floor(Math.random()*costos.length)]

ordenes++
clientes++
ingresos += c

document.getElementById("ordenes").innerText = ordenes

document.getElementById("clientes").innerText = clientes

document.getElementById("ingresos").innerText =
"$"+ingresos.toLocaleString("es-CO")

registrarLog(v,f,c)

actualizarGrafico()

}



/* ========================
LOG
======================== */

function registrarLog(vehiculo,falla,costo){

const log = document.getElementById("log")

const item = document.createElement("div")

item.innerHTML =

`<p class="text-slate-300 mb-2">

🚗 ${vehiculo} ingresó al taller<br>

🧠 IA detecta: ${falla}<br>

💰 Orden creada: $${costo.toLocaleString("es-CO")}

</p>`

log.prepend(item)

}



/* ========================
GRAFICO
======================== */

function actualizarGrafico(){

const hora = new Date().toLocaleTimeString()

grafico.data.labels.push(hora)

grafico.data.datasets[0].data.push(ingresos)

grafico.update()

}



/* ========================
EJECUCION
======================== */

setInterval(simular,4000)

</script>


</body>
</html>
