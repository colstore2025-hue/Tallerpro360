<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TallerPRO360 | AI Workshop System</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#020617;
color:white;
font-family:system-ui;
overflow-x:hidden;
}

.card{
background:#0f172a;
border:1px solid #1e293b;
border-radius:16px;
padding:22px;
}

.log{
background:#020617;
border:1px solid #1e293b;
border-radius:10px;
height:260px;
overflow:auto;
padding:15px;
font-size:14px;
}

.glow{
color:#10b981;
}

header{
border-bottom:1px solid #1e293b;
}

</style>

</head>

<body>

<!-- HEADER -->

<header class="flex justify-between items-center px-10 py-6">

<h1 class="text-2xl font-black glow">
TallerPRO360 AI SYSTEM
</h1>

<div class="text-slate-400 text-sm">
Sistema Inteligente de Gestión de Taller
</div>

</header>



<!-- PANEL -->

<div class="p-10 space-y-8">

<!-- KPIs -->

<div class="grid md:grid-cols-4 gap-6">

<div class="card">

<div class="text-slate-400">
Vehículos en Taller
</div>

<div id="vehiculos" class="text-3xl glow mt-2">
0
</div>

</div>


<div class="card">

<div class="text-slate-400">
Órdenes Generadas
</div>

<div id="ordenes" class="text-3xl glow mt-2">
0
</div>

</div>


<div class="card">

<div class="text-slate-400">
Clientes Atendidos
</div>

<div id="clientes" class="text-3xl glow mt-2">
0
</div>

</div>


<div class="card">

<div class="text-slate-400">
Ingresos del Día
</div>

<div id="ingresos" class="text-3xl glow mt-2">
$0
</div>

</div>

</div>



<!-- GRAFICO -->

<div class="card">

<h3 class="mb-4 font-bold">
Flujo de Ingresos en Tiempo Real
</h3>

<canvas id="grafico"></canvas>

</div>



<!-- ACTIVIDAD IA -->

<div class="card">

<h3 class="mb-4 font-bold">
Actividad del Sistema IA
</h3>

<div id="log" class="log"></div>

</div>

</div>



<script>

/* VARIABLES */

let vehiculos = 0
let ordenes = 0
let clientes = 0
let ingresos = 0


const autos = [

"Toyota Hilux",
"Kia Rio",
"Renault Duster",
"Chevrolet Onix",
"Mazda CX5",
"Nissan Versa"

]


const fallas = [

"Sensor ABS defectuoso",
"Pastillas de freno desgastadas",
"Fuga de aceite motor",
"Filtro de aire obstruido",
"Batería descargada",
"Falla en bobina de encendido"

]


const costos = [

120000,
180000,
250000,
90000,
320000,
140000

]



/* GRAFICO */

const ctx = document.getElementById("grafico")

const chart = new Chart(ctx,{

type:"line",

data:{

labels:[],

datasets:[{

label:"Ingresos",

data:[],

borderColor:"#10b981",

backgroundColor:"rgba(16,185,129,0.2)",

tension:0.3

}]

}

})



/* LOG SISTEMA */

function registrar(mensaje){

const log = document.getElementById("log")

const item = document.createElement("div")

item.classList.add("mb-2")

item.innerHTML = mensaje

log.prepend(item)

}



/* SIMULACION IA */

function simularSistema(){

const auto = autos[Math.floor(Math.random()*autos.length)]

const falla = fallas[Math.floor(Math.random()*fallas.length)]

const costo = costos[Math.floor(Math.random()*costos.length)]


vehiculos++
ordenes++
clientes++
ingresos += costo


document.getElementById("vehiculos").innerText = vehiculos
document.getElementById("ordenes").innerText = ordenes
document.getElementById("clientes").innerText = clientes
document.getElementById("ingresos").innerText =
"$"+ingresos.toLocaleString("es-CO")



registrar("🚗 Vehículo recibido: <span class='glow'>"+auto+"</span>")
registrar("🤖 IA analiza sistema del vehículo")
registrar("🔎 Diagnóstico detectado: "+falla)
registrar("📦 Orden de servicio generada")
registrar("💰 Valor del servicio: $"+costo.toLocaleString("es-CO"))
registrar("<hr class='border-slate-800'>")



actualizarGrafico()

}



/* GRAFICO */

function actualizarGrafico(){

const tiempo = new Date().toLocaleTimeString()

chart.data.labels.push(tiempo)

chart.data.datasets[0].data.push(ingresos)

chart.update()

}



/* INTERVALO */

setInterval(simularSistema,3500)

</script>


</body>
</html>
