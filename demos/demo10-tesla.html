<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TallerPRO360 | AI Nexus-X System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Outfit:wght@300;400;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root { --cyan: #06b6d4; --emerald: #10b981; --dark: #020617; }
        body { background: var(--dark); color: white; font-family: 'Outfit', sans-serif; overflow-x: hidden; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }

        .glass-card {
            background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px; padding: 24px; position: relative; overflow: hidden;
            transition: 0.3s;
        }
        .glass-card:hover { border-color: var(--cyan); box-shadow: 0 0 30px rgba(6, 182, 212, 0.1); }

        .log-container {
            background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px; height: 350px; overflow-y: auto; padding: 20px;
            font-family: 'JetBrains Mono', monospace; font-size: 11px;
        }

        .glow-text { color: var(--cyan); text-shadow: 0 0 10px rgba(6, 182, 212, 0.5); }
        
        .status-pill {
            background: rgba(6, 182, 212, 0.1); border: 1px solid rgba(6, 182, 212, 0.2);
            padding: 2px 8px; border-radius: 99px; font-size: 9px; font-weight: 900;
        }

        header { border-bottom: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 10px; }
    </style>
</head>
<body>

<header class="flex justify-between items-center px-10 py-6 sticky top-0 z-50">
    <div>
        <h1 class="orbitron text-2xl font-black italic tracking-tighter">
            TALLER<span class="text-cyan-500">PRO360</span> <span class="text-white/30 font-light">AI</span>
        </h1>
        <p class="text-[9px] mono text-cyan-500/50 uppercase tracking-[0.4em]">Engineered for high performance</p>
    </div>
    <div class="hidden md:flex items-center gap-6 text-[10px] mono font-bold text-slate-400">
        <div class="flex items-center gap-2"><span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span> SYSTEM ONLINE</div>
        <div class="flex items-center gap-2"><i class="fas fa-satellite"></i> NEXUS-X LINK ACTIVE</div>
    </div>
</header>

<div class="p-8 max-w-7xl mx-auto space-y-8">

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
        <div class="glass-card">
            <p class="text-[10px] text-slate-500 font-black uppercase mb-2 tracking-widest text-center">Unidades en Taller</p>
            <div id="vehiculos" class="orbitron text-4xl font-black text-center glow-text">0</div>
        </div>
        <div class="glass-card">
            <p class="text-[10px] text-slate-500 font-black uppercase mb-2 tracking-widest text-center">Órdenes Generadas</p>
            <div id="ordenes" class="orbitron text-4xl font-black text-center glow-text">0</div>
        </div>
        <div class="glass-card">
            <p class="text-[10px] text-slate-500 font-black uppercase mb-2 tracking-widest text-center">Clientes Atendidos</p>
            <div id="clientes" class="orbitron text-4xl font-black text-center glow-text">0</div>
        </div>
        <div class="glass-card">
            <p class="text-[10px] text-emerald-500 font-black uppercase mb-2 tracking-widest text-center italic">Ingresos de Misión</p>
            <div id="ingresos" class="orbitron text-3xl font-black text-center text-emerald-400">$ 0</div>
        </div>
    </div>

    <div class="grid lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-8 glass-card">
            <div class="flex justify-between items-center mb-6">
                <h3 class="orbitron text-[10px] font-black text-white uppercase tracking-[0.2em] flex items-center gap-2">
                    <i class="fas fa-chart-line text-cyan-500"></i> Flujo de Capital (COP)
                </h3>
                <span class="status-pill text-cyan-400">REAL-TIME TELEMETRY</span>
            </div>
            <canvas id="grafico" height="180"></canvas>
        </div>

        <div class="lg:col-span-4 space-y-4">
            <h3 class="orbitron text-[10px] font-black text-white uppercase tracking-[0.2em] flex items-center gap-2 px-2">
                <i class="fas fa-robot text-cyan-500"></i> Terminal de Eventos IA
            </h3>
            <div id="log" class="log-container">
                <div class="text-slate-600">>> Iniciando protocolos de escaneo...</div>
            </div>
        </div>
    </div>
</div>

<script>
/* DATA ENGINE */
let vehiculos = 0, ordenes = 0, clientes = 0, ingresos = 0;

const autos = ["Toyota Hilux 4x4", "Kia Rio", "Renault Duster", "Chevrolet Onix", "Mazda CX5", "Nissan Versa", "Kenworth T800"];
const fallas = ["Sensor ABS defectuoso", "Pastillas de freno desgastadas", "Fuga de aceite motor", "Filtro de aire obstruido", "Batería descargada", "Fallo en bobina de encendido", "Error en Turbo Garret"];
const costos = [120000, 180000, 250000, 90000, 320000, 140000, 1850000];

/* CHART CONFIGURATION */
const ctx = document.getElementById("grafico").getContext("2d");
const gradient = ctx.createLinearGradient(0, 0, 0, 400);
gradient.addColorStop(0, 'rgba(6, 182, 212, 0.2)');
gradient.addColorStop(1, 'rgba(6, 182, 212, 0)');

const chart = new Chart(ctx, {
    type: "line",
    data: {
        labels: [],
        datasets: [{
            label: "COP",
            data: [],
            borderColor: "#06b6d4",
            borderWidth: 2,
            pointRadius: 0,
            fill: true,
            backgroundColor: gradient,
            tension: 0.4
        }]
    },
    options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
            x: { display: false },
            y: { 
                grid: { color: 'rgba(255,255,255,0.03)' },
                ticks: { color: '#475569', font: { family: 'JetBrains Mono', size: 10 } }
            }
        }
    }
});

/* LOG LOGIC */
function registrar(mensaje, type = "info") {
    const log = document.getElementById("log");
    const item = document.createElement("div");
    const time = new Date().toLocaleTimeString('en-US', { hour12: false });
    
    let icon = ">>";
    let color = "text-slate-400";
    
    if(type === "car") { icon = "🚗"; color = "text-white font-bold"; }
    if(type === "ai") { icon = "🤖"; color = "text-cyan-400"; }
    if(type === "money") { icon = "💰"; color = "text-emerald-400"; }

    item.className = `mb-3 pb-2 border-b border-white/5 ${color}`;
    item.innerHTML = `<span class="text-[9px] text-slate-600 mr-2">[${time}]</span> ${icon} ${mensaje}`;
    
    log.prepend(item);
}

/* SIMULATION ENGINE */
function simularSistema() {
    const idx = Math.floor(Math.random() * autos.length);
    const auto = autos[idx];
    const falla = fallas[idx];
    const costo = costos[idx];

    vehiculos++;
    ordenes++;
    clientes++;
    ingresos += costo;

    // Update UI con animación suave
    document.getElementById("vehiculos").innerText = vehiculos;
    document.getElementById("ordenes").innerText = ordenes;
    document.getElementById("clientes").innerText = clientes;
    document.getElementById("ingresos").innerText = "$ " + ingresos.toLocaleString("es-CO");

    // Registro secuencial simulado
    registrar(`Unidad detectada: ${auto}`, "car");
    setTimeout(() => registrar(`Escaneando sensores... Análisis predictivo en curso.`, "ai"), 800);
    setTimeout(() => registrar(`ANOMALÍA: ${falla}`, "ai"), 1600);
    setTimeout(() => registrar(`Orden confirmada por $${costo.toLocaleString("es-CO")}`, "money"), 2400);

    actualizarGrafico();
}

function actualizarGrafico() {
    const tiempo = new Date().toLocaleTimeString();
    chart.data.labels.push(tiempo);
    chart.data.datasets[0].data.push(ingresos);

    if (chart.data.labels.length > 15) {
        chart.data.labels.shift();
        chart.data.datasets[0].data.shift();
    }
    chart.update();
}

/* START */
setInterval(simularSistema, 5000);
simularSistema(); // Ejecución inicial
</script>

</body>
</html>
