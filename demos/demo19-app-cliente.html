<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>App Cliente TallerPRO360</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-950 text-white p-6">

<h1 class="text-3xl text-green-400 mb-6">
App Cliente
</h1>


<div class="bg-slate-900 p-6 rounded mb-6">

<p class="text-slate-400">Vehículo</p>
<h2 class="text-xl">Toyota Corolla 2018</h2>

<p class="text-slate-400 mt-4">Estado actual</p>
<h2 id="estado" class="text-yellow-400 text-xl">
Recibido en taller
</h2>

</div>


<div class="bg-slate-900 p-6 rounded mb-6">

<h2 class="text-xl text-blue-400 mb-4">
Progreso de reparación
</h2>

<div class="w-full bg-slate-700 rounded h-4">

<div id="barra"
class="bg-green-500 h-4 rounded"
style="width:20%">
</div>

</div>

</div>


<div class="bg-slate-900 p-6 rounded mb-6">

<h2 class="text-xl text-purple-400 mb-4">
Chat con el taller
</h2>

<div id="chat" class="space-y-2 text-sm"></div>

<input
id="mensaje"
placeholder="Escribe un mensaje"
class="w-full mt-4 p-2 text-black rounded"
>

<button
onclick="enviarMensaje()"
class="mt-3 bg-green-500 px-5 py-2 rounded"
>
Enviar
</button>

</div>


<div class="bg-slate-900 p-6 rounded">

<h2 class="text-xl text-yellow-400 mb-2">
Factura estimada
</h2>

<p>Pastillas de freno: $120.000</p>
<p>Mano de obra: $80.000</p>

<h3 class="mt-4 text-green-400 text-xl">
Total: $200.000
</h3>

<button
class="mt-4 bg-blue-500 px-6 py-2 rounded"
>
Pagar ahora
</button>

</div>


<script>

const estados=[
"Vehículo recibido",
"Diagnóstico en proceso",
"Reparación en curso",
"Pruebas finales",
"Listo para entrega"
]

let progreso=20
let indice=0

function actualizarEstado(){

indice++

if(indice<estados.length){

document.getElementById("estado").innerText=estados[indice]

progreso+=20

document.getElementById("barra").style.width=progreso+"%"

}

}

setInterval(actualizarEstado,5000)


function enviarMensaje(){

const texto=document.getElementById("mensaje").value

if(texto==="")return

const chat=document.getElementById("chat")

const div=document.createElement("div")

div.innerHTML="👤 Cliente: "+texto

chat.appendChild(div)

document.getElementById("mensaje").value=""

setTimeout(()=>{

const respuesta=document.createElement("div")

respuesta.innerHTML="🔧 Taller: Estamos revisando tu vehículo"

chat.appendChild(respuesta)

},1500)

}

</script>

</body>

</html>
