<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inventario TallerPRO360</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-950 text-white p-8">

<h1 class="text-4xl text-green-400 mb-8">
Inventario de Repuestos
</h1>


<div class="grid md:grid-cols-2 gap-8">


<div class="bg-slate-900 p-6 rounded">

<h2 class="text-xl text-blue-400 mb-4">
Agregar repuesto
</h2>

<input
id="nombre"
placeholder="Nombre del repuesto"
class="w-full p-2 mb-3 text-black rounded"
>

<input
id="stock"
type="number"
placeholder="Cantidad"
class="w-full p-2 mb-3 text-black rounded"
>

<input
id="precio"
type="number"
placeholder="Precio"
class="w-full p-2 mb-3 text-black rounded"
>

<button
onclick="agregar()"
class="bg-green-500 px-6 py-2 rounded"
>
Agregar
</button>

</div>


<div class="bg-slate-900 p-6 rounded">

<h2 class="text-xl text-yellow-400 mb-4">
Inventario
</h2>

<div id="lista" class="space-y-3"></div>

</div>


</div>


<script>

const inventario=[]


function agregar(){

const nombre=document.getElementById("nombre").value
const stock=parseInt(document.getElementById("stock").value)
const precio=parseInt(document.getElementById("precio").value)

if(!nombre||!stock||!precio)return

inventario.push({nombre,stock,precio})

mostrar()

}


function mostrar(){

const lista=document.getElementById("lista")

lista.innerHTML=""

inventario.forEach(item=>{

let alerta=""

if(item.stock<5){

alerta="<span style='color:red'>⚠ Stock bajo</span>"

}

const div=document.createElement("div")

div.className="bg-slate-800 p-3 rounded"

div.innerHTML=
`
📦 ${item.nombre}<br>
Stock: ${item.stock}<br>
Precio: $${item.precio}<br>
${alerta}
`

lista.appendChild(div)

})

}

</script>

</body>

</html>
