<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TallerPRO360 | AI Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root { --cyan: #06b6d4; --dark: #020617; --slate-900: #0f172a; }
        body { background: var(--dark); color: white; font-family: 'JetBrains Mono', monospace; overflow: hidden; }
        .orbitron { font-family: 'Orbitron', sans-serif; }

        /* HANGAR DE ESCANEO */
        .hangar {
            position: relative; height: 350px; background: #010409;
            border-radius: 30px; border: 1px solid rgba(255,255,255,0.05);
            background-image: radial-gradient(circle at 2px 2px, rgba(6, 182, 212, 0.05) 1px, transparent 0);
            background-size: 30px 30px; overflow: hidden;
            box-shadow: inset 0 0 50px rgba(0,0,0,1);
        }

        .vehiculo-container {
            position: absolute; left: -150px; top: 50%; transform: translateY(-50%);
            transition: 3.5s cubic-bezier(0.19, 1, 0.22, 1);
            filter: drop-shadow(0 0 20px rgba(6, 182, 212, 0.2));
        }

        .laser-beam {
            position: absolute; top: 0; left: 50%; width: 2px; height: 100%;
            background: var(--cyan); box-shadow: 0 0 30px var(--cyan), 0 0 60px var(--cyan);
            opacity: 0; transform: scaleY(0); transition: 0.5s; z-index: 10;
        }

        .laser-beam.active {
            opacity: 0.8; transform: scaleY(1);
            animation: pulse-laser 1.5s infinite alternate;
        }

        @keyframes pulse-laser {
            0% { box-shadow: 0 0 20px var(--cyan); opacity: 0.5; }
            100% { box-shadow: 0 0 50px var(--cyan); opacity: 1; }
        }

        /* CARDS & LOGS */
        .glass-card {
            background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px; padding: 20px; backdrop-filter: blur(10px);
        }

        .terminal-log {
            background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 15px; height: 220px; overflow-y: auto; padding: 20px;
            font-size: 11px; line-height: 1.8;
        }

        .glow-cyan { color: var(--cyan); text-shadow: 0 0 10px rgba(6, 182, 212, 0.5); }
        
        .badge {
            background: rgba(6, 182, 212, 0.1); border: 1px solid var(--cyan);
            padding: 2px 8px; border-radius: 4px; font-size: 9px; font-weight: bold;
        }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--cyan); }
    </style>
</head>

<body class="p-8 md:p-12">

    <div class="flex justify-between items-end mb-8 px-4">
        <div>
            <h1 class="orbitron text-3xl font-black italic glow-cyan uppercase tracking-tighter">
                NEXUS-X<span class="text-white">SCAN</span>
            </h1>
            <p class="text-[9px] text-slate-500 uppercase tracking-[0.4em]">Autonomous Workshop Simulation v.2026</p>
        </div>
        <div class="text-right hidden md:block">
            <span class="badge">SISTEMA: OPERATIVO</span>
            <p class="text-[10px] text-slate-400 mt-2">HUB: IBAGUÉ CENTRAL</p>
        </div>
    </div>

    <div class="hangar mb-10">
        <div id="vehiculo" class="vehiculo-container">
            <div class="flex flex-col items-center">
                <i class="fas fa-truck-monster text-6xl text-white"></i>
                <div class="w-20 h-2 bg-cyan-500/20 blur-xl mt-4"></div>
            </div>
        </div>
        <div id="laser" class="laser-beam"></div>
        
        <div class="absolute bottom-6 left-6 flex gap-4">
            <div class="w-3 h-3 bg-cyan-500 rounded-full animate-ping"></div>
            <span class="text-[10px] font-bold text-cyan-400 orbitron tracking-widest">IA SCANNING ZONE</span>
        </div>
    </div>

    <div class="grid md:grid-cols-3 gap-8 mb-10">
        <div class="glass-card">
            <p class="text-[10px] text-slate-500 font-bold uppercase mb-2">Unidades Procesadas</p>
            <div id="vehiculos" class="orbitron text-4xl font-black glow-cyan">0</div>
        </div>
        <div class="glass-card">
            <p class="text-[10px] text-slate-500 font-bold uppercase mb-2">Misiones Completadas</p>
            <div id="ordenes" class="orbitron text-4xl font-black">0</div>
        </div>
        <div class="glass-card">
            <p class="text-[10px] text-emerald-500 font-bold uppercase mb-2 italic">Ingresos Netos (COP)</p>
            <div id="ingresos" class="orbitron text-3xl font-black text-emerald-400 italic">$ 0</div>
        </div>
    </div>

    <div class="glass-card">
        <h3 class="text-[11px] font-bold text-white uppercase mb-4 flex items-center gap-2">
            <i class="fas fa-terminal text-cyan-500"></i> Eventos de Inteligencia Artificial
        </h3>
        <div id="log" class="terminal-log">
            <div class="text-slate-600 italic">>> Sistema listo. Esperando ingreso de activos...</div>
        </div>
    </div>

<script>
    let vCount = 0, oCount = 0, iCount = 0;

    const modelos = [
        { icon: "fa-truck-monster", name: "Toyota Hilux 4x4" },
        { icon: "fa-car-side", name: "Renault Duster" },
        { icon: "fa-truck-pickup", name: "Ford Raptor" },
        { icon: "fa-shuttle-van", name: "Kia Grand Carnival" }
    ];

    const fallas = [
        "Desgaste de Pastillas Cerámicas",
        "Fallo en Inyección de Combustible",
        "Error Crítico: Sensor ABS P0420",
        "Batería con 15% de Vida Útil",
        "Fuga en Amortiguadores Traseros",
        "Filtro de Partículas Obstruido"
    ];

    const precios = [250000, 850000, 1200000, 320000, 480000];

    function registrar(msg, color = "text-slate-300") {
        const area = document.getElementById("log");
        const time = new Date().toLocaleTimeString('en-US', { hour12: false });
        const item = document.createElement("div");
        item.className = `mb-2 ${color}`;
        item.innerHTML = `<span class="text-cyan-500/50 mr-2">[${time}]</span> ${msg}`;
        area.prepend(item);
    }

    function simular() {
        const modelo = modelos[Math.floor(Math.random()*modelos.length)];
        const falla = fallas[Math.floor(Math.random()*fallas.length)];
        const precio = precios[Math.floor(Math.random()*precios.length)];

        const vDiv = document.getElementById("vehiculo");
        const laser = document.getElementById("laser");

        // 1. Reset & Entrada
        vDiv.innerHTML = `
            <div class="flex flex-col items-center">
                <i class="fas ${modelo.icon} text-6xl text-white"></i>
                <div class="w-20 h-2 bg-cyan-500/20 blur-xl mt-4"></div>
            </div>
        `;
        vDiv.style.left = "-150px";
        vDiv.style.opacity = "1";

        setTimeout(() => {
            vDiv.style.left = "40%";
            registrar(`ACTIVO DETECTADO: <span class="text-white font-bold">${modelo.name}</span>`, "text-cyan-400");
        }, 100);

        // 2. Escaneo Láser
        setTimeout(() => {
            laser.classList.add("active");
            registrar(`🤖 IA NEXUS: Iniciando escaneo de telemetría completa...`);
        }, 2800);

        // 3. Diagnóstico
        setTimeout(() => {
            registrar(`🔎 DIAGNÓSTICO: ${falla}`, "text-yellow-400");
        }, 4500);

        // 4. Procesamiento
        setTimeout(() => {
            vCount++; oCount++; iCount += precio;
            document.getElementById("vehiculos").innerText = vCount;
            document.getElementById("ordenes").innerText = oCount;
            document.getElementById("ingresos").innerText = "$ " + iCount.toLocaleString("es-CO");
            
            registrar(`📦 ORDEN DE TRABAJO GENERADA. Ticket: $${precio.toLocaleString("es-CO")}`, "text-emerald-400");
            laser.classList.remove("active");
        }, 6000);

        // 5. Salida
        setTimeout(() => {
            vDiv.style.left = "110%";
            vDiv.style.opacity = "0";
            registrar(`✅ ACTIVO DESPACHADO. Notificación enviada al cliente.`);
            registrar(`<hr class="border-white/5 my-2">`);
        }, 7500);
    }

    // Intervalo de ciclo
    setInterval(simular, 10000);
    simular(); // Inicio inmediato
</script>

</body>
</html>
