<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TallerPRO360 AI Demo</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#020617;
color:white;
font-family:system-ui;
overflow:hidden;
}

.taller{
position:relative;
height:300px;
background:#0f172a;
border-radius:20px;
border:1px solid #1e293b;
overflow:hidden;
}

.auto{
position:absolute;
left:-120px;
top:170px;
font-size:40px;
transition:3s linear;
}

.scanner{
position:absolute;
top:0;
left:50%;
width:4px;
height:100%;
background:#10b981;
opacity:0;
animation:scan 2s infinite;
}

@keyframes scan{

0%{transform:translateX(-200px);opacity:0}

50%{opacity:1}

100%{transform:translateX(200px);opacity:0}

}

.card{

background:#0f172a;
border:1px solid #1e293b;
border-radius:16px;
padding:20px;

}

.log{

background:#020617;
border:1px solid #1e293b;
border-radius:12px;
height:200px;
overflow:auto;
padding:15px;
font-size:14px;

}

.glow{
color:#10b981;
}

</style>

</head>

<body class="p-10">

<!-- HEADER -->

<div class="flex justify-between mb-8">

<h1 class="text-3xl font-bold glow">
TallerPRO360 AI
</h1>

<div class="text-slate-400">
Simulación Inteligente de Taller
</div>

</div>

<!-- TALLER -->

<div class="taller mb-8">

<div id="auto" class="auto">
🚗
</div>

<div id="scanner" class="scanner"></div>

</div>


<!-- PANEL -->

<div class="grid md:grid-cols-3 gap-6">

<div class="card">

<div class="text-slate-400">
Vehículos procesados
</div>

<div id="vehiculos" class="text-3xl glow mt-2">
0
</div>

</div>

<div class="card">

<div class="text-slate-400">
Órdenes generadas
</div>

<div id="ordenes" class="text-3xl glow mt-2">
0
</div>

</div>

<div class="card">

<div class="text-slate-400">
Ingresos
</div>

<div id="ingresos" class="text-3xl glow mt-2">
$0
</div>

</div>

</div>


<!-- ACTIVIDAD -->

<div class="card mt-8">

<h3 class="mb-4 font-bold">
Actividad de IA
</h3>

<div id="log" class="log"></div>

</div>



<script>

let vehiculos = 0
let ordenes = 0
let ingresos = 0

const autos = [
"🚗","🚙","🚘"
]

const fallas = [

"Pastillas de freno desgastadas",
"Falla en sensor ABS",
"Batería descargada",
"Filtro de aire sucio",
"Fuga de aceite",
"Bobina de encendido dañada"

]

const precios = [

90000,
120000,
150000,
200000,
250000

]


function log(msg){

const area = document.getElementById("log")

const item = document.createElement("div")

item.classList.add("mb-1")

item.innerHTML = msg

area.prepend(item)

}



function simular(){

const autoIcon = autos[Math.floor(Math.random()*autos.length)]
const falla = fallas[Math.floor(Math.random()*fallas.length)]
const precio = precios[Math.floor(Math.random()*precios.length)]

const auto = document.getElementById("auto")
const scanner = document.getElementById("scanner")


auto.innerHTML = autoIcon
auto.style.left = "-120px"


setTimeout(()=>{

auto.style.left="45%"

},100)


setTimeout(()=>{

scanner.style.opacity=1

log("🚗 Vehículo ingresó al taller")

},2500)


setTimeout(()=>{

log("🤖 IA escaneando vehículo")

},3500)


setTimeout(()=>{

log("🔎 Diagnóstico detectado: "+falla)

},4500)


setTimeout(()=>{

ordenes++
vehiculos++
ingresos+=precio

document.getElementById("vehiculos").innerText=vehiculos
document.getElementById("ordenes").innerText=ordenes
document.getElementById("ingresos").innerText="$"+ingresos.toLocaleString("es-CO")

log("📦 Orden generada automáticamente")

},5500)


setTimeout(()=>{

log("💰 Factura enviada al cliente: $"+precio.toLocaleString("es-CO"))
log("<hr class='border-slate-800'>")

scanner.style.opacity=0

},6500)

}


setInterval(simular,8000)

</script>

</body>
</html>
