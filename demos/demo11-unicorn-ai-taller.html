<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TallerPRO360 AI Platform</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#020617;
color:white;
font-family:system-ui;
}

.card{
background:#0f172a;
border:1px solid #1e293b;
border-radius:16px;
padding:20px;
}

.glow{
color:#10b981;
}

.chat{
height:250px;
overflow:auto;
background:#020617;
border:1px solid #1e293b;
border-radius:12px;
padding:15px;
}

.msg{
padding:8px;
border-radius:10px;
margin-bottom:8px;
}

.ai{
background:#1e293b;
}

.client{
background:#065f46;
text-align:right;
}

</style>

</head>

<body class="p-10">


<!-- HEADER -->

<div class="flex justify-between mb-8">

<h1 class="text-3xl font-bold glow">
TallerPRO360 AI Platform
</h1>

<div class="text-slate-400">
Sistema Inteligente de Gestión Automotriz
</div>

</div>


<!-- KPIs -->

<div class="grid md:grid-cols-4 gap-6 mb-8">

<div class="card">
<div class="text-slate-400">Vehículos</div>
<div id="vehiculos" class="text-3xl glow mt-2">0</div>
</div>

<div class="card">
<div class="text-slate-400">Órdenes</div>
<div id="ordenes" class="text-3xl glow mt-2">0</div>
</div>

<div class="card">
<div class="text-slate-400">Clientes</div>
<div id="clientes" class="text-3xl glow mt-2">0</div>
</div>

<div class="card">
<div class="text-slate-400">Ingresos</div>
<div id="ingresos" class="text-3xl glow mt-2">$0</div>
</div>

</div>


<!-- GRAFICO -->

<div class="card mb-8">

<h3 class="mb-4 font-bold">
Ingresos del Taller
</h3>

<canvas id="grafico"></canvas>

</div>


<div class="grid md:grid-cols-2 gap-6">

<!-- CHAT CLIENTE -->

<div class="card">

<h3 class="mb-4 font-bold">
Asistente IA con Cliente
</h3>

<div id="chat" class="chat"></div>

</div>


<!-- MAPA CLIENTE -->

<div class="card">

<h3 class="mb-4 font-bold">
Ubicación del Cliente
</h3>

<div class="rounded-lg overflow-hidden">

<iframe
width="100%"
height="250"
src="https://maps.google.com/maps?q=bogota&t=&z=13&ie=UTF8&iwloc=&output=embed">
</iframe>

</div>

</div>

</div>


<script>

let vehiculos = 0
let ordenes = 0
let clientes = 0
let ingresos = 0

const autos = [
"Toyota Hilux",
"Kia Rio",
"Chevrolet Onix",
"Renault Duster",
"Mazda CX5"
]

const fallas = [
"Pastillas de freno desgastadas",
"Fuga de aceite",
"Batería descargada",
"Sensor ABS defectuoso",
"Filtro de aire obstruido"
]

const precios = [
90000,
120000,
150000,
220000,
300000
]


/* CHAT */

function chatAI(msg){

const area = document.getElementById("chat")

const item = document.createElement("div")

item.className="msg ai"

item.innerHTML="🤖 "+msg

area.prepend(item)

}

function chatCliente(msg){

const area = document.getElementById("chat")

const item = document.createElement("div")

item.className="msg client"

item.innerHTML="👤 "+msg

area.prepend(item)

}



/* GRAFICO */

const ctx = document.getElementById("grafico")

const chart = new Chart(ctx,{

type:"line",

data:{
labels:[],
datasets:[{
label:"Ingresos",
data:[],
borderColor:"#10b981"
}]
}

})


function actualizarGrafico(){

const t = new Date().toLocaleTimeString()

chart.data.labels.push(t)
chart.data.datasets[0].data.push(ingresos)

chart.update()

}



function simular(){

const auto = autos[Math.floor(Math.random()*autos.length)]
const falla = fallas[Math.floor(Math.random()*fallas.length)]
const precio = precios[Math.floor(Math.random()*precios.length)]


vehiculos++
ordenes++
clientes++
ingresos+=precio


document.getElementById("vehiculos").innerText=vehiculos
document.getElementById("ordenes").innerText=ordenes
document.getElementById("clientes").innerText=clientes
document.getElementById("ingresos").innerText="$"+ingresos.toLocaleString("es-CO")


chatCliente("Hola, traje mi "+auto+" al taller.")

setTimeout(()=>{
chatAI("Vehículo recibido. Iniciando diagnóstico con IA.")
},1000)

setTimeout(()=>{
chatAI("Detectamos: "+falla)
},2000)

setTimeout(()=>{
chatAI("Costo estimado: $"+precio.toLocaleString("es-CO"))
},3000)

setTimeout(()=>{
chatCliente("Perfecto, procedan con la reparación.")
},4000)

setTimeout(()=>{
chatAI("Reparación en proceso. Te notificaremos cuando esté listo.")
},5000)

actualizarGrafico()

}


setInterval(simular,7000)

</script>

</body>
</html>
