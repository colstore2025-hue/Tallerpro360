<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Analítica TallerPRO360</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="bg-slate-950 text-white p-8">

<h1 class="text-4xl text-green-400 mb-8">
Analítica del Taller
</h1>


<div class="grid md:grid-cols-2 gap-8">


<div class="bg-slate-900 p-6 rounded">

<h2 class="text-xl text-blue-400 mb-4">
Ingresos por mes
</h2>

<canvas id="graficoIngresos"></canvas>

</div>


<div class="bg-slate-900 p-6 rounded">

<h2 class="text-xl text-yellow-400 mb-4">
Servicios más comunes
</h2>

<canvas id="graficoServicios"></canvas>

</div>


<div class="bg-slate-900 p-6 rounded">

<h2 class="text-xl text-purple-400 mb-4">
Repuestos más vendidos
</h2>

<canvas id="graficoRepuestos"></canvas>

</div>


<div class="bg-slate-900 p-6 rounded">

<h2 class="text-xl text-green-400 mb-4">
Crecimiento del negocio
</h2>

<canvas id="graficoCrecimiento"></canvas>

</div>


</div>



<script>

new Chart(
document.getElementById("graficoIngresos"),
{
type:"line",
data:{
labels:["Ene","Feb","Mar","Abr","May","Jun"],
datasets:[{
label:"Ingresos",
data:[500000,800000,750000,1000000,1200000,1500000],
borderColor:"rgb(34,197,94)",
backgroundColor:"rgba(34,197,94,0.2)"
}]
}
}
)


new Chart(
document.getElementById("graficoServicios"),
{
type:"bar",
data:{
labels:["Aceite","Frenos","Batería","Alineación"],
datasets:[{
label:"Servicios",
data:[40,25,15,20],
backgroundColor:[
"#22c55e",
"#3b82f6",
"#eab308",
"#a855f7"
]
}]
}
}
)


new Chart(
document.getElementById("graficoRepuestos"),
{
type:"pie",
data:{
labels:["Pastillas freno","Baterías","Filtros","Aceite"],
datasets:[{
data:[30,20,25,25],
backgroundColor:[
"#22c55e",
"#3b82f6",
"#eab308",
"#ef4444"
]
}]
}
}
)


new Chart(
document.getElementById("graficoCrecimiento"),
{
type:"line",
data:{
labels:["2021","2022","2023","2024"],
datasets:[{
label:"Clientes",
data:[120,200,320,500],
borderColor:"#22c55e",
backgroundColor:"rgba(34,197,94,0.2)"
}]
}
}
)

</script>

</body>

</html>
