<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Facturación TallerPRO360</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-950 text-white p-8">

<h1 class="text-4xl text-green-400 mb-8">
Facturación del Taller
</h1>


<div class="grid md:grid-cols-2 gap-8">


<div class="bg-slate-900 p-6 rounded">

<h2 class="text-xl text-blue-400 mb-4">
Agregar servicio
</h2>

<input
id="servicio"
placeholder="Servicio o repuesto"
class="w-full p-2 mb-3 text-black rounded"
>

<input
id="precio"
type="number"
placeholder="Precio"
class="w-full p-2 mb-3 text-black rounded"
>

<button
onclick="agregarItem()"
class="bg-green-500 px-6 py-2 rounded"
>
Agregar
</button>

</div>


<div class="bg-slate-900 p-6 rounded">

<h2 class="text-xl text-yellow-400 mb-4">
Factura
</h2>

<div id="factura" class="space-y-2 mb-4"></div>

<h3 class="text-xl text-green-400">
Total: $<span id="total">0</span>
</h3>

<button
onclick="generarFactura()"
class="mt-4 bg-blue-500 px-6 py-2 rounded"
>
Generar factura
</button>

</div>


</div>


<script>

const items=[]

function agregarItem(){

const servicio=document.getElementById("servicio").value
const precio=parseInt(document.getElementById("precio").value)

if(!servicio||!precio)return

items.push({servicio,precio})

mostrarFactura()

}


function mostrarFactura(){

const contenedor=document.getElementById("factura")

contenedor.innerHTML=""

let total=0

items.forEach(i=>{

total+=i.precio

const div=document.createElement("div")

div.className="bg-slate-800 p-2 rounded"

div.innerHTML=
`
🔧 ${i.servicio} — $${i.precio}
`

contenedor.appendChild(div)

})

document.getElementById("total").innerText=total

}


function generarFactura(){

alert("Factura generada correctamente")

}

</script>

</body>

</html>
