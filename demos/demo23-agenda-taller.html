<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Agenda TallerPRO360</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-950 text-white p-8">

<h1 class="text-4xl text-green-400 mb-8">
Agenda del Taller
</h1>

<div class="grid md:grid-cols-2 gap-8">

<div class="bg-slate-900 p-6 rounded">

<h2 class="text-xl text-blue-400 mb-4">
Reservar cita
</h2>

<input
id="cliente"
placeholder="Nombre del cliente"
class="w-full p-2 mb-3 text-black rounded"
>

<input
id="vehiculo"
placeholder="Vehículo"
class="w-full p-2 mb-3 text-black rounded"
>

<input
type="time"
id="hora"
class="w-full p-2 mb-3 text-black rounded"
>

<button
onclick="reservar()"
class="bg-green-500 px-6 py-2 rounded"
>
Reservar
</button>

</div>


<div class="bg-slate-900 p-6 rounded">

<h2 class="text-xl text-yellow-400 mb-4">
Citas del día
</h2>

<div id="agenda" class="space-y-3"></div>

</div>

</div>


<script>

const citas=[]

function reservar(){

const cliente=document.getElementById("cliente").value
const vehiculo=document.getElementById("vehiculo").value
const hora=document.getElementById("hora").value

if(cliente==""||vehiculo==""||hora=="")return

citas.push({cliente,vehiculo,hora})

mostrarAgenda()

}


function mostrarAgenda(){

const contenedor=document.getElementById("agenda")

contenedor.innerHTML=""

citas
.sort((a,b)=>a.hora.localeCompare(b.hora))
.forEach(c=>{

const div=document.createElement("div")

div.className="bg-slate-800 p-3 rounded"

div.innerHTML=
`
⏰ ${c.hora}<br>
👤 ${c.cliente}<br>
🚗 ${c.vehiculo}
`

contenedor.appendChild(div)

})

}

</script>

</body>

</html>
