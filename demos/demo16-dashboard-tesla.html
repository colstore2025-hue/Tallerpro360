<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard TallerPRO360</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="bg-slate-950 text-white p-8">

<h1 class="text-4xl text-green-400 mb-8">
TallerPRO360 Control Center
</h1>


<div class="grid md:grid-cols-4 gap-6 mb-10">

<div class="bg-slate-900 p-6 rounded">
<p class="text-slate-400">Ingresos Hoy</p>
<h2 id="ingresos" class="text-3xl text-green-400">$0</h2>
</div>

<div class="bg-slate-900 p-6 rounded">
<p class="text-slate-400">Vehículos en Taller</p>
<h2 id="vehiculos" class="text-3xl text-blue-400">0</h2>
</div>

<div class="bg-slate-900 p-6 rounded">
<p class="text-slate-400">Reparaciones Hoy</p>
<h2 id="reparaciones" class="text-3xl text-yellow-400">0</h2>
</div>

<div class="bg-slate-900 p-6 rounded">
<p class="text-slate-400">Clientes Activos</p>
<h2 id="clientes" class="text-3xl text-purple-400">0</h2>
</div>

</div>


<div class="bg-slate-900 p-6 rounded">

<canvas id="grafico"></canvas>

</div>



<script>

let ingresos=0
let vehiculos=5
let reparaciones=2
let clientes=12


function actualizarDatos(){

ingresos+=Math.floor(Math.random()*200000)

vehiculos+=Math.floor(Math.random()*2)

reparaciones+=Math.floor(Math.random()*1)

clientes+=Math.floor(Math.random()*1)


document.getElementById("ingresos").innerText="$"+ingresos

document.getElementById("vehiculos").innerText=vehiculos

document.getElementById("reparaciones").innerText=reparaciones

document.getElementById("clientes").innerText=clientes

}


setInterval(actualizarDatos,3000)



const ctx=document.getElementById('grafico')

const chart=new Chart(ctx,{

type:'line',

data:{

labels:["8am","9am","10am","11am","12pm","1pm"],

datasets:[{

label:'Ingresos',

data:[100000,200000,180000,300000,400000,500000],

borderColor:'rgb(34,197,94)',

backgroundColor:'rgba(34,197,94,0.2)',

}]

},

options:{

responsive:true

}

})

</script>

</body>

</html>
