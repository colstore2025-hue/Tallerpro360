<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mapa TallerPRO360</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
margin:0;
background:#020617;
color:white;
font-family:system-ui;
}

#map{
height:100vh;
}

</style>

</head>

<body>

<div id="map"></div>

<script>

const map = L.map('map').setView([4.7110,-74.0721],13)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map)

const autos=[]

function crearAuto(){

const lat=4.7110+(Math.random()-0.5)/100
const lng=-74.0721+(Math.random()-0.5)/100

const marker=L.marker([lat,lng]).addTo(map)

marker.bindPopup("🚗 Vehículo del taller")

autos.push(marker)

}

function moverAutos(){

autos.forEach(auto=>{

const pos=auto.getLatLng()

const lat=pos.lat+(Math.random()-0.5)/500
const lng=pos.lng+(Math.random()-0.5)/500

auto.setLatLng([lat,lng])

})

}

for(let i=0;i<5;i++){

crearAuto()

}

setInterval(moverAutos,3000)

</script>

</body>

</html>
