<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CEO Dashboard | TallerPRO360</title>
<link rel="icon" href="logo-tallerpro360.png">

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background:#0f172a; font-family:'Inter',sans-serif; color:#f1f5f9; }
.font-nexus{font-family:'Orbitron',sans-serif;}
.glass{background:rgba(15,23,42,.7);backdrop-filter:blur(20px);border-radius:1.5rem;border:1px solid rgba(255,255,255,.05);}
.status-activo{color:#10b981;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700;}
.status-suspendido{color:#ef4444;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700;}
#mapa{height:380px;border-radius:1rem;}
</style>
</head>
<body class="p-6">

<!-- HEADER -->
<header class="flex justify-between items-center mb-8">
<h1 class="text-3xl font-nexus font-black text-amber-500">TallerPRO360 <span class="text-white">CEO</span></h1>
<button onclick="logout()" class="bg-red-600 px-4 py-2 rounded font-bold hover:bg-red-700">
<i class="fas fa-power-off"></i> Salir
</button>
</header>

<!-- ================= KPIs ================= -->
<section class="grid grid-cols-1 md:grid-cols-5 gap-6 mb-8">
<div class="glass p-6 text-center"><p class="text-xs text-gray-400">Talleres</p><h2 id="kpiTalleres" class="text-4xl font-nexus text-amber-500">0</h2></div>
<div class="glass p-6 text-center"><p class="text-xs text-gray-400">Activos</p><h2 id="kpiActivos" class="text-4xl font-nexus text-green-500">0</h2></div>
<div class="glass p-6 text-center"><p class="text-xs text-gray-400">Por vencer</p><h2 id="kpiVence" class="text-4xl font-nexus text-red-500">0</h2></div>
<div class="glass p-6 text-center"><p class="text-xs text-gray-400">Planes activos</p><h2 id="kpiPlanes" class="text-4xl font-nexus text-blue-500">0</h2></div>
<div class="glass p-6 text-center"><p class="text-xs text-gray-400">Clientes rentables</p><h2 id="kpiClientes" class="text-4xl font-nexus text-purple-500">0</h2></div>
</section>

<!-- ================= FINANZAS IA ================= -->
<section class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8">
<div class="glass p-4"><div class="text-xs text-slate-400">Ingresos</div><div id="iaIngresos" class="text-xl font-bold"></div></div>
<div class="glass p-4"><div class="text-xs text-slate-400">Costos</div><div id="iaCostos"></div></div>
<div class="glass p-4"><div class="text-xs text-slate-400">Utilidad</div><div id="iaUtilidad"></div></div>
<div class="glass p-4"><div class="text-xs text-slate-400">Margen</div><div id="iaMargen"></div></div>
<div class="glass p-4"><div class="text-xs text-slate-400">Predicción mensual</div><div id="iaPrediccion" class="text-xl font-bold text-emerald-400"></div></div>
</section>

<!-- ================= IA ANALYTICS ================= -->
<section class="grid md:grid-cols-3 gap-6 mb-8">
<div class="glass p-6"><div class="font-bold mb-2">Repuestos más usados</div><div id="iaTopRepuestos"></div></div>
<div class="glass p-6"><div class="font-bold mb-2">Técnicos más productivos</div><div id="iaTopTecnicos"></div></div>
<div class="glass p-6"><div class="font-bold mb-2">Clientes más rentables</div><div id="iaTopClientes"></div></div>
</section>

<!-- ================= TABLA TALLERES ================= -->
<section class="glass p-6 mb-8 overflow-x-auto">
<table class="w-full text-sm">
<thead class="text-gray-400">
<tr><th>Taller</th><th>Ciudad</th><th>Plan</th><th>Estado</th><th>Vence</th><th>Acción</th></tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</section>

<!-- ================= MAPA Y CHART ================= -->
<section class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
<div class="glass p-6"><canvas id="chartCiudades"></canvas></div>
<div class="glass p-6"><div id="mapa"></div></div>
</section>

<!-- ================= FOOTER ================= -->
<footer class="text-center text-xs text-gray-500">© 2026 TallerPRO360 · CEO Control Panel</footer>

<!-- ================= SCRIPTS ================= -->
<script type="module">
import { auth, db } from "./firebase-config.js";

import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { doc, getDoc, collection, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// Integración con todos tus módulos JS
import { iniciarDashboardIA } from "./app/js/dashboardIA.js";
import { calcularPrecioInteligente } from "./app/js/pricingAI.js";
import { PredictiveMaintenance } from "./app/js/predictiveMaintenance.js";
import { detectarRepuestos } from "./app/js/iaMecanica.js";
import { publicarRepuesto, obtenerPedidosEmpresa } from "./app/js/autoPartsMarketplace.js";
import { iniciarVoz } from "./app/js/workshopVoiceAssistant.js";
import { workshopRanking } from "./app/js/workshopRankingAI.js";
import { fraudeDetect } from "./app/js/fraudDetectionAI.js";
import { customerRetention } from "./app/js/customerRetentionAI.js";

// Autenticación y control CEO
onAuthStateChanged(auth, async(user)=>{
  if(!user){ window.location="login.html"; return; }
  const snap = await getDoc(doc(db,"usuarios",user.uid));
  if(!snap.exists() || snap.data().rolGlobal!=="superadmin"){ window.location="login.html"; return; }
  initDashboard();
});

// ================= INIT =================
let map, markers=[], chart;
function initDashboard(){
  initMap();
  cargarTalleres();
  iniciarDashboardIA(); // Analítica IA
  workshopRanking();  // Ranking global de talleres
}

// ================= MAPA =================
function initMap(){
  map=L.map("mapa").setView([4.57,-74.29],6);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:18}).addTo(map);
}

// ================= TALLERES =================
function cargarTalleres(){
  onSnapshot(collection(db,"talleres"),snap=>{
    let total=0, activos=0, vence=0, planes=0;
    let ciudades={}, tbody=document.getElementById("tabla");
    tbody.innerHTML="";
    markers.forEach(m=>map.removeLayer(m));
    markers=[];
    snap.forEach(docSnap=>{
      const t=docSnap.data(); total++;
      if(t.estado==="activo") activos++;
      if(t.plan && t.estado==="activo") planes++;
      let fechaVence=t.fechaVencimiento?.toDate ? t.fechaVencimiento.toDate() : null;
      if(fechaVence){ const diff=(fechaVence-new Date())/(1000*60*60*24); if(diff<=5 && diff>=0) vence++; }
      if(t.ciudad) ciudades[t.ciudad]=(ciudades[t.ciudad]||0)+1;
      const badge = t.estado==="activo"? `<span class="status-activo">ACTIVO</span>`:`<span class="status-suspendido">SUSPENDIDO</span>`;
      tbody.innerHTML+=`
      <tr class="border-b border-slate-700 hover:bg-slate-800/30">
        <td>${t.nombreTaller||"-"}</td>
        <td>${t.ciudad||"-"}</td>
        <td>${t.plan||"-"}</td>
        <td>${badge}</td>
        <td>${fechaVence?fechaVence.toLocaleDateString():"-"}</td>
        <td class="text-right">
          <button onclick="toggle('${docSnap.id}','${t.estado}')"
            class="text-xs px-3 py-1 bg-slate-800 rounded hover:bg-slate-700">
            ${t.estado==="activo"?"Suspender":"Activar"}
          </button>
        </td>
      </tr>`;
    });
    document.getElementById("kpiTalleres").innerText=total;
    document.getElementById("kpiActivos").innerText=activos;
    document.getElementById("kpiVence").innerText=vence;
    document.getElementById("kpiPlanes").innerText=planes;
    renderChart(ciudades);
  });
}

// ================= CHART =================
function renderChart(data){
  if(chart) chart.destroy();
  chart=new Chart(document.getElementById("chartCiudades"),{
    type:"doughnut",
    data:{labels:Object.keys(data),datasets:[{data:Object.values(data),
      backgroundColor:["#f59e0b","#10b981","#3b82f6","#ef4444","#8b5cf6"]}]},
    options:{plugins:{legend:{position:"bottom"}}}
  });
}

// ================= CAMBIAR ESTADO =================
window.toggle=async(id,estadoActual)=>{
  const next = estadoActual==="activo"?"suspendido":"activo";
  if(!confirm(`Cambiar estado a ${next}?`)) return;
  await updateDoc(doc(db,"talleres",id),{estado:next,actualizadoEn:new Date()});
};

// ================= LOGOUT =================
window.logout=()=>{ signOut(auth).then(()=>window.location="login.html"); };
</script>

</body>
</html>
