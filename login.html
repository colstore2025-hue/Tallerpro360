<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nexus-X · PRO360CORE Access</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
  :root {
    --neon-cyan: #00f2ff;
    --space-black: #020617;
  }

  body {
    background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
    font-family: 'Inter', sans-serif;
    color: #f8fafc;
    overflow: hidden;
  }

  /* Efecto de fondo NASA */
  .stars {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: url('https://www.transparenttextures.com/patterns/stardust.png');
    opacity: 0.3;
    z-index: -1;
  }

  .glass-card {
    background: rgba(15, 23, 42, 0.7);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 2px; /* Estilo Tesla: bordes más rectos y limpios */
    box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
  }

  .nasa-title {
    font-family: 'Orbitron', sans-serif;
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .input-tesla {
    background: rgba(2, 6, 23, 0.8);
    border: 1px solid #1e293b;
    transition: all 0.3s ease;
    border-radius: 2px;
  }

  .input-tesla:focus {
    border-color: var(--neon-cyan);
    box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
    outline: none;
  }

  .btn-tesla {
    background: transparent;
    border: 1px solid var(--neon-cyan);
    color: var(--neon-cyan);
    font-family: 'Orbitron', sans-serif;
    letter-spacing: 2px;
    transition: all 0.4s ease;
    border-radius: 2px;
    text-transform: uppercase;
    font-size: 0.8rem;
  }

  .btn-tesla:hover {
    background: var(--neon-cyan);
    color: #000;
    box-shadow: 0 0 20px var(--neon-cyan);
  }

  .tab-active {
    border-bottom: 2px solid var(--neon-cyan);
    color: var(--neon-cyan);
  }

  /* Animación de entrada */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate-ready { animation: fadeInUp 0.8s ease-out; }
</style>
</head>

<body class="flex items-center justify-center min-h-screen p-4">
<div class="stars"></div>

<div class="w-full max-w-md glass-card p-10 animate-ready">
  
  <div class="text-center mb-10">
    <h1 class="nasa-title text-2xl font-black text-white mb-2">Nexus-X</h1>
    <p class="text-[10px] tracking-[0.3em] text-cyan-500 uppercase">PRO360CORE Engine</p>
  </div>

  <div class="flex justify-center space-x-8 mb-8 text-xs font-bold uppercase tracking-widest">
    <button id="tabLogin" class="pb-2 tab-active transition-all" onclick="switchTab('login')">Acceso</button>
    <button id="tabRegister" class="pb-2 text-slate-500 hover:text-white transition-all" onclick="switchTab('register')">Registro</button>
  </div>

  <form id="loginForm" class="space-y-6">
    <div>
      <label class="block text-[10px] text-slate-400 mb-2 uppercase tracking-tighter">Identificador de Usuario</label>
      <input type="email" id="loginEmail" class="w-full p-3 input-tesla text-sm" placeholder="EMAIL@SYSTEM.COM" required>
    </div>

    <div>
      <label class="block text-[10px] text-slate-400 mb-2 uppercase tracking-tighter">Clave de Seguridad</label>
      <div class="relative">
        <input type="password" id="loginPass" class="w-full p-3 input-tesla text-sm pr-10" placeholder="••••••••" required>
        <span onclick="togglePass('loginPass')" class="absolute right-3 top-3 cursor-pointer opacity-50 hover:opacity-100 text-xs">VIEW</span>
      </div>
    </div>

    <button type="submit" class="w-full py-4 btn-tesla mt-4">Validar Credenciales</button>
  </form>

  <form id="registerForm" class="space-y-6 hidden">
    <input type="text" id="nombre" class="w-full p-3 input-tesla text-sm" placeholder="NOMBRE DEL TALLER / EMPRESA" required>
    <input type="email" id="regEmail" class="w-full p-3 input-tesla text-sm" placeholder="EMAIL DE ADMINISTRADOR" required>
    <div class="grid grid-cols-2 gap-4">
      <input type="password" id="regPass" class="p-3 input-tesla text-sm" placeholder="CLAVE" required>
      <input type="password" id="regPass2" class="p-3 input-tesla text-sm" placeholder="CONFIRMAR" required>
    </div>
    <button type="submit" class="w-full py-4 btn-tesla bg-cyan-900/20">Iniciar Protocolo de Registro</button>
  </form>

  <p id="error" class="text-red-500 text-[10px] text-center mt-6 uppercase tracking-widest hidden font-bold"></p>

  <div class="mt-8 text-center">
    <button id="resetBtn" class="text-[9px] text-slate-500 hover:text-cyan-400 uppercase tracking-widest transition-all">¿Restablecer acceso al sistema?</button>
  </div>

</div>

<script type="module">
  // --- TU LÓGICA DE FIREBASE SE MANTIENE IGUAL ---
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAdk-s-OXu57MiobzRGBRu-TlF2KYeicWQ",
    authDomain: "tallerpro360.firebaseapp.com",
    projectId: "tallerpro360",
    storageBucket: "tallerpro360.firebasestorage.app",
    messagingSenderId: "636224778184",
    appId: "1:636224778184:web:9bd7351b6458a1ef625afd"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // Funciones de UI globales
  window.switchTab = (tab) => {
    const isLogin = tab === 'login';
    document.getElementById('loginForm').classList.toggle('hidden', !isLogin);
    document.getElementById('registerForm').classList.toggle('hidden', isLogin);
    document.getElementById('tabLogin').className = isLogin ? 'pb-2 tab-active transition-all' : 'pb-2 text-slate-500 hover:text-white transition-all';
    document.getElementById('tabRegister').className = !isLogin ? 'pb-2 tab-active transition-all' : 'pb-2 text-slate-500 hover:text-white transition-all';
  };

  window.togglePass = (id) => {
    const input = document.getElementById(id);
    input.type = input.type === 'password' ? 'text' : 'password';
  };

  // --- LÓGICA DE SUBMIT (TU CÓDIGO ORIGINAL CONSERVADO) ---
  loginForm.addEventListener("submit", async e => {
    e.preventDefault();
    const errEl = document.getElementById('error');
    try {
      const cred = await signInWithEmailAndPassword(auth, loginEmail.value.trim(), loginPass.value);
      localStorage.setItem("uid", cred.user.uid);
      window.location.href = "/app/index.html";
    } catch(e) {
      errEl.innerText = "ERROR DE AUTENTICACIÓN: " + e.code.toUpperCase();
      errEl.classList.remove("hidden");
    }
  });

  registerForm.addEventListener("submit", async e => {
    e.preventDefault();
    if(regPass.value !== regPass2.value) return alert("Las claves no coinciden.");
    try {
      const cred = await createUserWithEmailAndPassword(auth, regEmail.value, regPass.value);
      await setDoc(doc(db, "usuariosGlobal", cred.user.uid), { rolGlobal: "cliente", empresaId: cred.user.uid, email: regEmail.value, activo: true });
      await setDoc(doc(db, "empresas", cred.user.uid), { nombre: nombre.value, planId: "freemium", estadoPlan: "ACTIVO", creadoEn: serverTimestamp() });
      alert("SISTEMA CONFIGURADO. PROCEDA AL ACCESO.");
      window.location.reload();
    } catch(e) { alert("ERROR DE SISTEMA: " + e.message); }
  });
</script>
</body>
</html>
