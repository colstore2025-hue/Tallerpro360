<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Nexus-X · TallerPRO360 V17.0 🛰️</title>
    
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" 
<link rel="icon" type="image/png" href="assets/logo-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

 <link rel="manifest" 
href="manifest.json">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root { --neon-cyan: #00f2ff; --space-black: #020617; --deep-slate: #0f172a; }
        
        body {
            background: radial-gradient(circle at center, var(--deep-slate) 0%, var(--space-black) 100%);
            font-family: 'Inter', sans-serif; 
            color: #f8fafc; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; margin: 0;
        }

        body::before {
            content: ""; position: absolute; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.2; pointer-events: none;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(50px);
            border: 1px solid rgba(0, 242, 255, 0.15); box-shadow: 0 0 120px rgba(0, 0, 0, 0.9);
            transform: perspective(1000px) rotateX(2deg);
        }

        .nasa-title {
            font-family: 'Orbitron', sans-serif; letter-spacing: 12px;
            background: linear-gradient(to right, #fff, var(--neon-cyan), #4f46e5, #fff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-size: 300% auto; animation: shine 8s linear infinite;
        }

        @keyframes shine { to { background-position: 300% center; } }

        .input-nexus {
            background: rgba(2, 6, 23, 0.9); border: 1px solid rgba(255,255,255,0.08);
            font-family: 'JetBrains Mono', monospace; color: white; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-nexus:focus { 
            border-color: var(--neon-cyan); box-shadow: 0 0 30px rgba(0, 242, 255, 0.15); 
            background: rgba(0, 242, 255, 0.02); outline: none; transform: translateY(-2px);
        }

        .btn-nexus {
            position: relative; background: transparent; border: 1px solid var(--neon-cyan); 
            color: var(--neon-cyan); font-family: 'Orbitron', sans-serif; transition: all 0.5s;
            text-transform: uppercase; font-weight: 900; overflow: hidden;
        }

        .btn-nexus:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 50px rgba(0, 242, 255, 0.6); }

        .loader-orbit {
            width: 20px; height: 20px; border: 2px solid var(--neon-cyan);
            border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Splash Screen Esthetics */
        #splashScreen { z-index: 1000; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body>

<div id="splashScreen" class="fixed inset-0 bg-[#020617] flex flex-col items-center justify-center hidden animate-in fade-in duration-500">
    <div class="absolute inset-0 bg-radial-at-center from-[#0f172a] to-[#020617] opacity-80"></div>
    <div class="relative group mb-16 scale-90">
        <div class="absolute -inset-10 bg-cyan-500/10 rounded-full blur-3xl animate-pulse"></div>
        <img src="assets/logo-tallerpro360.png" alt="Nexus Logo" class="relative w-56 h-auto drop-shadow-[0_0_40px_rgba(0,242,255,0.2)]">
    </div>
    <div class="w-72 h-1 bg-white/5 rounded-full relative overflow-hidden">
        <div id="splashBar" class="h-full bg-cyan-500 transition-all duration-300" style="width: 0%"></div>
    </div>
    <p id="splashStatus" class="orbitron text-[8px] text-cyan-500 mt-10 tracking-[0.6em] uppercase font-black italic">
        Sincronizando Nodo Nexus-X
    </p>
</div>

<div class="w-full max-w-lg glass-card p-12 rounded-[4rem] relative z-10 mx-4">
    <div class="text-center mb-12">
        <h1 class="nasa-title text-5xl font-black mb-4 italic">NEXUS-X</h1>
        <p class="text-[8px] tracking-[0.8em] text-cyan-400 font-black uppercase italic">Core Terminal V17.0</p>
    </div>

    <form id="loginForm" class="space-y-8">
        <div class="relative group">
            <i class="fas fa-at absolute left-6 top-1/2 -translate-y-1/2 text-slate-600 group-focus-within:text-cyan-400"></i>
            <input type="email" id="email" class="w-full p-6 pl-16 input-nexus rounded-[2rem] text-sm" placeholder="USUARIO / ENLACE SATELITAL" required>
        </div>
        <div class="relative group">
            <i class="fas fa-fingerprint absolute left-6 top-1/2 -translate-y-1/2 text-slate-600 group-focus-within:text-cyan-400"></i>
            <input type="password" id="pass" class="w-full p-6 pl-16 input-nexus rounded-[2rem] text-sm" placeholder="LLAVE DE ACCESO" required>
        </div>
        <button type="submit" id="submitBtn" class="w-full py-7 btn-nexus rounded-[2.5rem] text-[11px] tracking-[0.3em] flex justify-center items-center gap-4">
            <span id="btnText">INICIAR SECUENCIA</span>
            <i id="btnIcon" class="fas fa-rocket"></i>
        </button>
    </form>

    <button onclick="window.iniciarPruebaExpress()" class="w-full mt-6 py-4 text-[9px] orbitron text-slate-500 hover:text-cyan-400 transition-colors tracking-[0.4em] uppercase font-bold">
        ¿No tienes acceso? Iniciar Prueba 7 Días
    </button>

    <div id="statusMsg" class="hidden mt-8 p-6 rounded-[2rem] text-[10px] text-center font-bold orbitron border-2"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAdk-s-OXu57MiobzRGBRu-TlF2KYeicWQ",
        authDomain: "tallerpro360.firebaseapp.com",
        projectId: "tallerpro360",
        storageBucket: "tallerpro360.firebasestorage.app",
        messagingSenderId: "636224778184",
        appId: "1:636224778184:web:9bd7351b6458a1ef625afd"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const loginForm = document.getElementById('loginForm');
    const statusMsg = document.getElementById('statusMsg');
    const submitBtn = document.getElementById('submitBtn');
    
    const splash = {
        el: document.getElementById('splashScreen'),
        bar: document.getElementById('splashBar'),
        status: document.getElementById('splashStatus'),
        show: () => splash.el.classList.remove('hidden'),
        update: (p, t) => { splash.bar.style.width = p+'%'; splash.status.innerText = t; }
    };

    const notify = (text, isError = true) => {
        statusMsg.innerText = text;
        statusMsg.className = `mt-8 p-6 rounded-[2rem] text-[10px] text-center font-bold orbitron border-2 ${
            isError ? 'bg-red-500/10 border-red-500/40 text-red-500' : 'bg-cyan-500/10 border-cyan-500/40 text-cyan-500'
        }`;
        statusMsg.classList.remove('hidden');
    };

    /**
     * PROTOCOLO DE PERSISTENCIA NEXUS-X
     * Sincroniza LocalStorage con Firestore
     */
    function saveSession(uid, data) {
        localStorage.setItem("uid", uid);
        localStorage.setItem("empresaId", data.empresaId || "BASE");
        
        // Normalización de Roles y Planes (Tolerante a mayúsculas/minúsculas)
        const rolFinal = (data.role || data.rolGlobal || "operador").toUpperCase();
        const planFinal = (data.planType || data.plantype || data.plan || "GRATI-CORE").toUpperCase();

        localStorage.setItem("rol", rolFinal);
        localStorage.setItem("planTipo", planFinal);
        localStorage.setItem("nexus_userName", data.nombre || "Comandante");

        console.log(`✅ NODO SINCRONIZADO: ${rolFinal} en plan ${planFinal}`);
    }

    /**
     * SECUENCIA DE ACCESO
     */
    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const emailVal = document.getElementById('email').value.trim();
        const passVal = document.getElementById('pass').value;

        submitBtn.disabled = true;
        notify("VERIFICANDO CREDENCIALES...", false);

        try {
            const userCredential = await signInWithEmailAndPassword(auth, emailVal, passVal);
            const uid = userCredential.user.uid;

            splash.show();
            splash.update(20, "IDENTIDAD CONFIRMADA");

            // BUSQUEDA EN COLECCIÓN 'usuarios' (Según tus capturas)
            const userSnap = await getDoc(doc(db, "usuarios", uid));
            if (!userSnap.exists()) throw new Error("PERFIL NO ENCONTRADO EN NODO CENTRAL.");

            const userData = userSnap.data();
            saveSession(uid, userData);

            splash.update(60, "SISTEMA OPERACIONAL: " + (userData.empresaId || 'BASE'));
            
            setTimeout(() => {
                splash.update(100, "SALTO HIPERESPACIAL...");
                window.location.href = "app/index.html";
            }, 1000);

        } catch (error) {
            submitBtn.disabled = false;
            splash.el.classList.add('hidden');
            notify("FALLO EN SECUENCIA: " + error.message.toUpperCase());
        }
    });

    /**
     * MOTOR FREEMIUM / DEMO
     */
    window.iniciarPruebaExpress = async () => {
        const emailDemo = prompt("INGRESE EMAIL PARA ACTIVAR LICENCIA DEMO (7 DÍAS):");
        if (!emailDemo || !emailDemo.includes('@')) return;

        submitBtn.disabled = true;
        splash.show();
        splash.update(10, "GENERANDO ACCESO TEMPORAL");

        try {
            const tempPass = "Nexus" + Math.floor(1000 + Math.random() * 9000);
            const userCred = await createUserWithEmailAndPassword(auth, emailDemo, tempPass);
            const uid = userCred.user.uid;
            const empresaId = "DEMO_" + Date.now().toString().slice(-4);

            const demoData = {
                nombre: "Comandante Demo",
                email: emailDemo,
                empresaId: empresaId,
                role: "dueno",
                planType: "GRATI-CORE",
                createdAt: serverTimestamp()
            };

            await setDoc(doc(db, "usuarios", uid), demoData);
            await setDoc(doc(db, "empresas", empresaId), {
                nombreTaller: "Taller Pro Demo",
                planTipo: "GRATI-CORE",
                status: "TRIAL",
                fechaActivacion: serverTimestamp()
            });

            saveSession(uid, demoData);
            splash.update(100, "CUENTA CREADA");
            alert("TU CLAVE ES: " + tempPass);
            window.location.href = "app/index.html";

        } catch (error) {
            submitBtn.disabled = false;
            splash.el.classList.add('hidden');
            alert("ERROR: " + error.message);
        }
    };
</script>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/service-worker.js').catch(() => {});
        });
    }
</script>
</body>
</html>
