<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nexus-X · PRO360CORE V16.7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --neon-cyan: #00f2ff; --space-black: #020617; }
        body {
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            font-family: 'Inter', sans-serif; color: #f8fafc;
            height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; margin: 0;
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(40px);
            border: 1px solid rgba(0, 242, 255, 0.1);
            box-shadow: 0 0 100px rgba(0, 0, 0, 0.8);
        }
        .nasa-title {
            font-family: 'Orbitron', sans-serif; letter-spacing: 10px;
            background: linear-gradient(to right, #fff, var(--neon-cyan), #fff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-size: 200% auto; animation: shine 5s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }
        .input-nexus {
            background: rgba(2, 6, 23, 0.8); border: 1px solid rgba(255,255,255,0.05);
            font-family: 'JetBrains Mono', monospace; color: white; transition: all 0.3s;
        }
        .input-nexus:focus { border-color: var(--neon-cyan); box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); outline: none; }
        .btn-nexus {
            border: 1px solid var(--neon-cyan); color: var(--neon-cyan);
            font-family: 'Orbitron', sans-serif; transition: all 0.4s;
            text-transform: uppercase; font-weight: 900;
        }
        .btn-nexus:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 40px var(--neon-cyan); }
    </style>
</head>
<body>

<div class="w-full max-w-lg glass-card p-10 rounded-[3rem] relative">
    <div class="text-center mb-10">
        <h1 class="nasa-title text-4xl font-black mb-2">Nexus-X</h1>
        <p class="text-[7px] tracking-[0.6em] text-cyan-500/50 uppercase font-black">Strategic Logistics Engine</p>
    </div>

    <form id="loginForm" class="space-y-6">
        <input type="email" id="email" class="w-full p-5 input-nexus rounded-2xl text-sm" placeholder="USUARIO / EMAIL" required>
        <input type="password" id="pass" class="w-full p-5 input-nexus rounded-2xl text-sm" placeholder="CONTRASEÑA" required>
        
        <button type="submit" class="w-full py-5 btn-nexus rounded-2xl text-[10px] tracking-widest flex justify-center items-center gap-3">
            <span>Iniciar Secuencia</span>
            <i class="fas fa-rocket"></i>
        </button>
    </form>

    <div id="statusMsg" class="hidden mt-6 p-4 rounded-xl text-[10px] text-center font-bold orbitron border animate-pulse"></div>

    <div class="mt-8 text-center text-[8px] text-slate-500 uppercase tracking-widest">
        Copyright © 2026 Colombian Trucks Logistics LLC
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAdk-s-OXu57MiobzRGBRu-TlF2KYeicWQ",
        authDomain: "tallerpro360.firebaseapp.com",
        projectId: "tallerpro360",
        storageBucket: "tallerpro360.firebasestorage.app",
        messagingSenderId: "636224778184",
        appId: "1:636224778184:web:9bd7351b6458a1ef625afd"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const loginForm = document.getElementById('loginForm');
    const statusMsg = document.getElementById('statusMsg');

    const notify = (text, isError = true) => {
        statusMsg.innerText = text;
        statusMsg.className = `mt-6 p-4 rounded-xl text-[10px] text-center font-bold orbitron border ${isError ? 'bg-red-500/10 border-red-500/30 text-red-500' : 'bg-cyan-500/10 border-cyan-500/30 text-cyan-500'}`;
        statusMsg.classList.remove('hidden');
    };

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        notify("SINCRONIZANDO CON SATÉLITE...", false);

        try {
            const userCredential = await signInWithEmailAndPassword(auth, email.value, pass.value);
            const uid = userCredential.user.uid;

            // BUSQUEDA EN COLECCIÓN ÚNICA 'usuarios'
            const userSnap = await getDoc(doc(db, "usuarios", uid));

            if (!userSnap.exists()) {
                throw new Error("NODO NO RECONOCIDO EN LA RED.");
            }

            const userData = userSnap.data();
            const empresaId = userData.empresaId;

            // OBTENER DATOS DE LA EMPRESA Y PLAN
            const empSnap = await getDoc(doc(db, "empresas", empresaId));
            const empData = empSnap.exists() ? empSnap.data() : {};

            // ESTRATEGIA DE SIMULACIÓN Y PLANES
            const plan = empData.planTipo || "freemium";
            const esSimulador = (plan === "freemium");

            // PERSISTENCIA EN LOCALSTORAGE (GOD-MODE INCLUIDO)
            localStorage.setItem("nexus_uid", uid);
            localStorage.setItem("nexus_empresaId", empresaId);
            localStorage.setItem("nexus_rol", userData.rolGlobal || "operador");
            localStorage.setItem("nexus_plan", plan);
            localStorage.setItem("nexus_mode", esSimulador ? "SIMULATOR" : "LIVE");

            // DIRECCIONAMIENTO ESTRATÉGICO
            if (userData.rolGlobal === "superadmin") {
                window.location.href = "/app/#master";
            } else {
                // Si es Freemium, el Dashboard sabrá que debe mostrar el prototipo
                window.location.href = "/app/#dashboard";
            }

        } catch (error) {
            notify("FALLO EN SECUENCIA: " + error.message.toUpperCase());
        }
    });
</script>
</body>
</html>
