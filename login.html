<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nexus-X · PRO360CORE Engine V16.1</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
  :root { --neon-cyan: #00f2ff; --space-black: #020617; }
  body {
    background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
    font-family: 'Inter', sans-serif;
    color: #f8fafc;
    height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden;
  }
  .stars {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: url('https://www.transparenttextures.com/patterns/stardust.png');
    opacity: 0.3; z-index: -1; animation: pulse-stars 10s infinite alternate;
  }
  @keyframes pulse-stars { from { opacity: 0.2; } to { opacity: 0.5; } }
  .glass-card {
    background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(25px);
    border: 1px solid rgba(0, 242, 255, 0.1); box-shadow: 0 0 80px rgba(0, 0, 0, 0.9);
    position: relative; z-index: 10;
  }
  .nasa-title {
    font-family: 'Orbitron', sans-serif; letter-spacing: 6px; text-transform: uppercase;
    background: linear-gradient(to right, #fff, var(--neon-cyan));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .input-tesla {
    background: rgba(2, 6, 23, 0.9); border: 1px solid #1e293b;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); color: white;
  }
  .input-tesla:focus {
    border-color: var(--neon-cyan); box-shadow: 0 0 15px rgba(0, 242, 255, 0.15); outline: none;
  }
  .btn-tesla {
    background: transparent; border: 1px solid var(--neon-cyan); color: var(--neon-cyan);
    font-family: 'Orbitron', sans-serif; letter-spacing: 3px; transition: all 0.5s ease;
    text-transform: uppercase; cursor: pointer;
  }
  .btn-tesla:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 30px var(--neon-cyan); }
  .tab-active { border-bottom: 2px solid var(--neon-cyan); color: var(--neon-cyan); text-shadow: 0 0 10px rgba(0, 242, 255, 0.5); }
  .system-loader {
    width: 18px; height: 18px; border: 2px solid rgba(0, 242, 255, 0.2);
    border-top-color: var(--neon-cyan); border-radius: 50%; animation: spin 0.8s linear infinite;
    display: inline-block; margin-right: 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<body>
<div class="stars"></div>

<div class="w-full max-w-md glass-card p-10 rounded-[2.5rem] overflow-hidden">
  <div class="text-center mb-10">
    <div class="w-12 h-12 bg-cyan-500/10 rounded-full flex items-center justify-center mx-auto mb-4 border border-cyan-500/20">
        <i class="fas fa-bolt-lightning text-cyan-400"></i>
    </div>
    <h1 class="nasa-title text-3xl font-black mb-2">Nexus-X</h1>
    <p id="systemStatus" class="text-[8px] tracking-[0.5em] text-cyan-500/60 uppercase italic">Aegis Security Layer V16.1</p>
  </div>

  <div class="flex justify-center space-x-12 mb-10 text-[10px] font-black uppercase tracking-[0.2em]">
    <button id="tabLogin" class="pb-2 tab-active transition-all" onclick="switchTab('login')">Auth Access</button>
    <button id="tabRegister" class="pb-2 text-slate-500 hover:text-white transition-all" onclick="switchTab('register')">New Mission</button>
  </div>

  <form id="loginForm" class="space-y-6">
    <div class="group">
      <label class="block text-[9px] text-slate-500 mb-2 uppercase tracking-widest group-focus-within:text-cyan-400">Digital Identity</label>
      <input type="email" id="loginEmail" class="w-full p-4 input-tesla rounded-2xl text-sm" placeholder="COMMANDER@SYSTEM.COM" required>
    </div>

    <div>
      <label class="block text-[9px] text-slate-500 mb-2 uppercase tracking-widest">Access Key</label>
      <div class="relative">
        <input type="password" id="loginPass" class="w-full p-4 input-tesla rounded-2xl text-sm pr-12" placeholder="••••••••" required>
        <span onclick="togglePass('loginPass')" class="absolute right-4 top-4 cursor-pointer opacity-30 hover:opacity-100 text-[10px] orbitron text-cyan-400">VIEW</span>
      </div>
    </div>

    <button type="submit" id="loginBtn" class="w-full py-5 btn-tesla rounded-2xl mt-4 text-xs">
        Validar Credenciales
    </button>
  </form>

  <form id="registerForm" class="space-y-5 hidden">
    <div id="planIndicator" class="text-[10px] text-center border border-cyan-500/20 py-3 rounded-xl text-cyan-400 uppercase tracking-[0.2em] bg-cyan-950/20 mb-4 orbitron">
        MODO: CARGANDO...
    </div>

    <input type="text" id="nombre" class="w-full p-4 input-tesla rounded-2xl text-sm" placeholder="NOMBRE DE LA ORGANIZACIÓN" required>
    <input type="email" id="regEmail" class="w-full p-4 input-tesla rounded-2xl text-sm" placeholder="EMAIL DE COMANDO" required>

    <div class="grid grid-cols-2 gap-4">
      <input type="password" id="regPass" class="w-full p-4 input-tesla rounded-2xl text-sm" placeholder="CLAVE" required>
      <input type="password" id="regPass2" class="w-full p-4 input-tesla rounded-2xl text-sm" placeholder="CONFIRMAR" required>
    </div>

    <button type="submit" id="regBtn" class="w-full py-5 btn-tesla rounded-2xl mt-2 text-xs">
        Inicializar Protocolo
    </button>
  </form>

  <p id="error" class="text-red-500 text-[9px] text-center mt-8 uppercase tracking-widest hidden font-bold animate-pulse"></p>

  <div class="mt-10 text-center border-t border-white/5 pt-6">
    <button id="resetBtn" type="button" class="text-[9px] text-slate-600 hover:text-cyan-400 uppercase tracking-[0.3em] transition-all orbitron">Restablecer Acceso</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAdk-s-OXu57MiobzRGBRu-TlF2KYeicWQ",
    authDomain: "tallerpro360.firebaseapp.com",
    projectId: "tallerpro360",
    storageBucket: "tallerpro360.firebasestorage.app",
    messagingSenderId: "636224778184",
    appId: "1:636224778184:web:9bd7351b6458a1ef625afd"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const urlParams = new URLSearchParams(window.location.search);
  let selectedPlan = urlParams.get('plan') || 'basico';
  document.getElementById('planIndicator').innerText = `NODO: ${selectedPlan.toUpperCase()}`;

  window.switchTab = (tab) => {
    const isLogin = tab === 'login';
    document.getElementById('loginForm').classList.toggle('hidden', !isLogin);
    document.getElementById('registerForm').classList.toggle('hidden', isLogin);
    document.getElementById('tabLogin').className = isLogin ? 'pb-2 tab-active transition-all' : 'pb-2 text-slate-500 hover:text-white transition-all';
    document.getElementById('tabRegister').className = !isLogin ? 'pb-2 tab-active transition-all' : 'pb-2 text-slate-500 hover:text-white transition-all';
  };

  window.togglePass = (id) => {
    const input = document.getElementById(id);
    input.type = input.type === 'password' ? 'text' : 'password';
  };

  // --- LÓGICA DE LOGIN EVOLUCIONADA V16.1 ---
  loginForm.addEventListener("submit", async e => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const errEl = document.getElementById('error');
    btn.innerHTML = `<span class="system-loader"></span> Sincronizando Red...`;
    btn.disabled = true;
    errEl.classList.add('hidden');

    try {
      const email = loginEmail.value.trim();
      const pass = loginPass.value;

      const cred = await signInWithEmailAndPassword(auth, email, pass);
      const uid = cred.user.uid;

      const userDoc = await getDoc(doc(db, "usuariosGlobal", uid));
      
      if (!userDoc.exists()) throw new Error("IDENTIDAD NO REGISTRADA EN NEXUS-CORE");
      const userData = userDoc.data();

      // ROL: SUPERADMIN (Bypass total)
      if (userData.rolGlobal === "superadmin") {
          localStorage.setItem("adminMode", "true");
          localStorage.setItem("empresaId", "NEXUS_GLOBAL"); 
          window.location.href = "/app/#master-control";
          return;
      }

      // ROL: CLIENTE (Validación de Empresa)
      const empresaDoc = await getDoc(doc(db, "empresas", uid));
      if (!empresaDoc.exists()) throw new Error("NODO DE EMPRESA INEXISTENTE");

      const empresaData = empresaDoc.data();
      localStorage.setItem("empresaId", uid);
      localStorage.setItem("planTier", empresaData.planId);
      localStorage.setItem("status", empresaData.estadoPlan);

      window.location.href = "/app/#dashboard";
    } catch(e) {
      btn.innerText = "VALIDAR CREDENCIALES";
      btn.disabled = false;
      errEl.innerText = "FALLO DE ACCESO: " + e.message.toUpperCase();
      errEl.classList.remove("hidden");
    }
  });

  // --- REGISTRO CON TIERING (ELITE / PRO / BASICO) ---
  registerForm.addEventListener("submit", async e => {
    e.preventDefault();
    if(regPass.value !== regPass2.value) return alert("LLAVES DE SEGURIDAD NO COINCIDEN");
    
    const btn = document.getElementById('regBtn');
    btn.innerHTML = `<span class="system-loader"></span> Creando Nodo...`;
    btn.disabled = true;

    try {
      const cred = await createUserWithEmailAndPassword(auth, regEmail.value, regPass.value);
      const uid = cred.user.uid;

      // Definir expiración por Tier
      const trialDays = selectedPlan === 'elite' ? 60 : 30;
      const venceDate = new Date();
      venceDate.setDate(venceDate.getDate() + trialDays);

      // 1. Perfil de Usuario
      await setDoc(doc(db, "usuariosGlobal", uid), {
        rolGlobal: "cliente",
        email: regEmail.value,
        tier: selectedPlan,
        creadoEn: serverTimestamp()
      });

      // 2. Perfil de Empresa (Dashboard Ready)
      await setDoc(doc(db, "empresas", uid), {
        nombre: nombre.value.toUpperCase(),
        planId: selectedPlan,
        venceEn: venceDate,
        estadoPlan: "ACTIVO",
        powerLevel: selectedPlan === 'elite' ? 100 : (selectedPlan === 'pro' ? 70 : 40),
        creadoEn: serverTimestamp()
      });

      localStorage.setItem("empresaId", uid);
      localStorage.setItem("planTier", selectedPlan);
      window.location.href = "/app/#dashboard";
    } catch(e) { 
      btn.innerText = "INICIALIZAR PROTOCOLO";
      btn.disabled = false;
      alert("ERROR EN REGISTRO: " + e.message);
    }
  });

  document.getElementById("resetBtn").onclick = async () => {
    const email = loginEmail.value.trim();
    if (!email) return alert("Ingrese su email en el campo de identidad.");
    await sendPasswordResetEmail(auth, email);
    alert("Protocolo de recuperación enviado.");
  };
</script>
</body>
</html>
