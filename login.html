<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Nexus-X · TallerPRO360 V35.0 🛰️</title>
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/png" href="assets/logo-192.png">
    <link rel="manifest" href="manifest.json">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { --neon-cyan: #00f2ff; --space-black: #020617; --deep-slate: #0f172a; }
        body {
            background: radial-gradient(circle at center, var(--deep-slate) 0%, var(--space-black) 100%);
            font-family: 'Inter', sans-serif; color: #f8fafc; height: 100vh; 
            display: flex; align-items: center; justify-content: center; overflow: hidden; margin: 0;
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(50px);
            border: 1px solid rgba(0, 242, 255, 0.15); box-shadow: 0 0 120px rgba(0, 0, 0, 0.9);
            transform: perspective(1000px) rotateX(1deg); transition: all 0.5s ease;
        }
        .nasa-title {
            font-family: 'Orbitron', sans-serif; letter-spacing: 10px;
            background: linear-gradient(to right, #fff, var(--neon-cyan), #4f46e5, #fff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-size: 300% auto; animation: shine 8s linear infinite;
        }
        @keyframes shine { to { background-position: 300% center; } }
        .input-nexus {
            background: rgba(2, 6, 23, 0.9); border: 1px solid rgba(255,255,255,0.08);
            font-family: 'JetBrains Mono', monospace; color: white; transition: all 0.4s;
        }
        .input-nexus:focus { border-color: var(--neon-cyan); box-shadow: 0 0 20px rgba(0, 242, 255, 0.1); outline: none; }
        .btn-nexus {
            background: transparent; border: 1px solid var(--neon-cyan); 
            color: var(--neon-cyan); font-family: 'Orbitron', sans-serif; transition: all 0.5s;
            text-transform: uppercase; font-weight: 900; overflow: hidden;
        }
        .btn-nexus:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 40px rgba(0, 242, 255, 0.5); }
        .staff-avatar {
            width: 60px; height: 60px; border-radius: 20px; background: rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s; cursor: pointer;
        }
        .staff-avatar:hover { border-color: var(--neon-cyan); background: rgba(0,242,255,0.1); transform: scale(1.1); }
    </style>
</head>
<body>

<div id="splashScreen" class="fixed inset-0 bg-[#020617] flex flex-col items-center justify-center hidden z-[1000]">
    <div class="relative group mb-12 scale-90">
        <div class="absolute -inset-20 bg-cyan-500/10 rounded-full blur-3xl animate-pulse"></div>
        <h1 class="nasa-title text-4xl font-black italic">NEXUS-X</h1>
    </div>
    <div class="w-64 h-1 bg-white/5 rounded-full relative overflow-hidden">
        <div id="splashBar" class="h-full bg-cyan-500 transition-all duration-300" style="width: 0%"></div>
    </div>
    <p id="splashStatus" class="orbitron text-[7px] text-cyan-500 mt-8 tracking-[0.5em] uppercase italic animate-pulse">
        Sincronizando Nodo...
    </p>
</div>

<div class="w-full max-w-lg glass-card p-10 rounded-[3.5rem] relative z-10 mx-4">
    <div class="text-center mb-10">
        <h1 class="nasa-title text-4xl font-black mb-2 italic">NEXUS-X</h1>
        <p class="text-[7px] tracking-[0.6em] text-cyan-400 font-black uppercase italic">Core Terminal V35.0</p>
    </div>

    <div id="staffSelector" class="hidden mb-10 p-6 bg-white/5 rounded-3xl border border-white/10">
        <p class="orbitron text-[8px] text-slate-500 mb-4 tracking-widest text-center uppercase">Tripulación Detectada</p>
        <div id="staffList" class="flex flex-wrap justify-center gap-4"></div>
        <button onclick="logoutOwner()" class="w-full mt-4 text-[7px] orbitron text-red-500/50 hover:text-red-500 uppercase tracking-widest transition-all">Cerrar Sesión Taller</button>
    </div>

    <form id="loginForm" class="space-y-6">
        <div class="relative group">
            <i class="fas fa-at absolute left-6 top-1/2 -translate-y-1/2 text-slate-600 group-focus-within:text-cyan-400 transition-colors"></i>
            <input type="email" id="email" class="w-full p-5 pl-16 input-nexus rounded-2xl text-xs" placeholder="ENLACE SATELITAL (EMAIL)" required>
        </div>
        <div class="relative group">
            <i class="fas fa-fingerprint absolute left-6 top-1/2 -translate-y-1/2 text-slate-600 group-focus-within:text-cyan-400 transition-colors"></i>
            <input type="password" id="pass" class="w-full p-5 pl-16 input-nexus rounded-2xl text-xs" placeholder="LLAVE MAESTRA" required>
        </div>
        <button type="submit" id="submitBtn" class="w-full py-6 btn-nexus rounded-[2rem] text-[10px] tracking-[0.3em] flex justify-center items-center gap-3">
            <span>INICIAR SECUENCIA</span>
            <i class="fas fa-bolt text-xs"></i>
        </button>
    </form>

    <div id="statusMsg" class="hidden mt-6 p-5 rounded-2xl text-[9px] text-center font-bold orbitron border italic tracking-widest"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAdk-s-OXu57MiobzRGBRu-TlF2KYeicWQ",
        authDomain: "tallerpro360.firebaseapp.com",
        projectId: "tallerpro360",
        storageBucket: "tallerpro360.firebasestorage.app",
        messagingSenderId: "636224778184",
        appId: "1:636224778184:web:9bd7351b6458a1ef625afd"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const splash = {
        el: document.getElementById('splashScreen'),
        bar: document.getElementById('splashBar'),
        status: document.getElementById('splashStatus'),
        show: () => splash.el.classList.remove('hidden'),
        update: (p, t) => { splash.bar.style.width = p+'%'; splash.status.innerText = t; }
    };

    /**
     * VERIFICACIÓN DE SESIÓN EXISTENTE (AUTO-DETECCIÓN DE STAFF)
     */
    window.addEventListener('load', async () => {
        const empresaId = localStorage.getItem("nexus_empresaId");
        if (empresaId) {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('staffSelector').classList.remove('hidden');
            await cargarStaff(empresaId);
        }
    });

    async function cargarStaff(empresaId) {
        const staffList = document.getElementById('staffList');
        const q = query(collection(db, "staff_local"), where("empresaId", "==", empresaId));
        const snap = await getDocs(q);
        
        // Siempre incluimos al Dueño en la lista
        let html = `
            <div class="flex flex-col items-center gap-2" onclick="accesoDirecto('DUENO')">
                <div class="staff-avatar border-indigo-500/50"><i class="fas fa-crown text-indigo-400"></i></div>
                <span class="orbitron text-[6px] uppercase font-bold">Dueño</span>
            </div>
        `;

        snap.forEach(doc => {
            const s = doc.data();
            html += `
                <div class="flex flex-col items-center gap-2" onclick="pedirPIN('${s.nombre}', '${s.pass}', '${s.cargo}')">
                    <div class="staff-avatar"><i class="fas ${s.cargo === 'TECNICO' ? 'fa-wrench' : 'fa-user-tie'} text-slate-400"></i></div>
                    <span class="orbitron text-[6px] uppercase font-bold">${s.nombre.split(' ')[0]}</span>
                </div>
            `;
        });
        staffList.innerHTML = html;
    }

    window.pedirPIN = (nombre, pinCorrecto, cargo) => {
        Swal.fire({
            title: `ACCESO: ${nombre}`,
            input: 'password',
            inputPlaceholder: 'INGRESE PIN',
            background: '#0d1117', color: '#fff',
            confirmButtonText: 'VALIDAR',
            preConfirm: (pin) => {
                if (pin === pinCorrecto) return true;
                Swal.showValidationMessage('PIN INCORRECTO');
            }
        }).then((result) => {
            if (result.isConfirmed) {
                localStorage.setItem("nexus_rol", cargo);
                localStorage.setItem("nexus_userName", nombre);
                splash.show();
                splash.update(100, "IDENTIDAD VALIDADA");
                setTimeout(() => window.location.href = "app/index.html", 800);
            }
        });
    };

    window.logoutOwner = () => {
        localStorage.clear();
        window.location.reload();
    };

    /**
     * LOGIN MAESTRO (DUEÑO)
     */
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const pass = document.getElementById('pass').value;

        splash.show();
        splash.update(30, "ESTABLECIENDO LINK...");

        try {
            const userCred = await signInWithEmailAndPassword(auth, email, pass);
            const userSnap = await getDoc(doc(db, "usuarios", userCred.user.uid));
            
            if (!userSnap.exists()) throw new Error("ERROR DE SINCRONIZACIÓN");
            
            const data = userSnap.data();
            localStorage.setItem("nexus_empresaId", data.empresaId || "taller_001");
            localStorage.setItem("nexus_uid", userCred.user.uid);
            localStorage.setItem("nexus_rol", "DUENO");
            localStorage.setItem("nexus_plan", (data.planType || "GRATI-CORE").toUpperCase());
            localStorage.setItem("nexus_userName", data.nombre || "Comandante");

            splash.update(100, "SISTEMA OPERACIONAL");
            setTimeout(() => window.location.href = "app/index.html", 1000);

        } catch (err) {
            splash.el.classList.add('hidden');
            const msg = document.getElementById('statusMsg');
            msg.innerText = "ERROR EN SECUENCIA: " + err.message.toUpperCase();
            msg.className = "mt-6 p-5 rounded-2xl text-[9px] text-center font-bold orbitron border bg-red-500/10 border-red-500/40 text-red-500 block";
        }
    });
</script>
</body>
</html>
