<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TallerPRO360 · Login</title>
<link rel="manifest" href="./manifest.json">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
body {
  background:#0f172a;
  font-family:Inter,system-ui;
}
</style>
</head>

<body class="text-slate-200 flex items-center justify-center min-h-screen px-4">

<div class="w-full max-w-sm bg-slate-800 rounded-2xl p-6 shadow-xl">

  <!-- LOGO -->
  <div class="text-center mb-6">
    <img src="./assets/logo-192.png" class="h-14 mx-auto mb-3">
    <h1 class="text-xl font-black text-emerald-400">TallerPRO360</h1>
    <p class="text-xs text-slate-400 mt-1">ERP SaaS para talleres automotrices</p>
  </div>

  <!-- FORMULARIO -->
  <form id="loginForm" class="space-y-4">

    <div>
      <label class="text-xs text-slate-400">Correo</label>
      <input type="email" id="email" required
        class="w-full mt-1 px-4 py-2 rounded-lg bg-slate-900 border border-slate-700 focus:outline-none focus:border-emerald-400"
        placeholder="usuario@correo.com">
    </div>

    <div>
      <label class="text-xs text-slate-400">Contraseña</label>
      <div class="relative">
        <input type="password" id="password" required
          class="w-full mt-1 px-4 py-2 rounded-lg bg-slate-900 border border-slate-700 focus:outline-none focus:border-emerald-400"
          placeholder="••••••••">
        <button type="button" id="togglePass" class="absolute right-3 top-3 text-slate-400">
          <i class="fa fa-eye"></i>
        </button>
      </div>
    </div>

    <button type="submit"
      class="w-full bg-emerald-500 hover:bg-emerald-600 text-slate-900 font-bold py-2 rounded-lg transition">
      Ingresar
    </button>

  </form>

  <!-- RECUPERAR CONTRASEÑA -->
  <p class="text-center text-xs mt-3">
    <button id="resetBtn" class="text-emerald-400 hover:underline">
      ¿Olvidaste tu contraseña?
    </button>
  </p>

  <p id="errorMsg" class="hidden text-red-400 text-xs text-center mt-4"></p>

  <p class="text-center text-[10px] text-slate-500 mt-6">
    Acceso Superadmin · CEO · Staff
  </p>

</div>

<script type="module">
import { auth, db } from "./app/js/core/firebase-config.js";
import {
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut,
  sendPasswordResetEmail
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const form = document.getElementById("loginForm");
const errorMsg = document.getElementById("errorMsg");
const togglePass = document.getElementById("togglePass");
const resetBtn = document.getElementById("resetBtn");

/* ===============================
MOSTRAR / OCULTAR PASSWORD
=============================== */
togglePass.addEventListener("click", () => {
  const pass = document.getElementById("password");
  if(pass.type === "password") {
    pass.type = "text";
    togglePass.innerHTML = '<i class="fa fa-eye-slash"></i>';
  } else {
    pass.type = "password";
    togglePass.innerHTML = '<i class="fa fa-eye"></i>';
  }
});

/* ===============================
RESET PASSWORD
=============================== */
resetBtn.addEventListener("click", async () => {
  const email = document.getElementById("email").value.trim();
  if(!email) { showError("Escribe tu correo para recuperar contraseña"); return; }
  try {
    await sendPasswordResetEmail(auth, email);
    alert("Te enviamos un correo para cambiar tu contraseña");
  } catch(e) {
    showError("No se pudo enviar el correo");
    console.error(e);
  }
});

/* ===============================
AUTO LOGIN
=============================== */
onAuthStateChanged(auth, async (user) => {
  if(!user) return;
  try {
    const snap = await getDoc(doc(db, "usuariosGlobal", user.uid));
    if(!snap.exists()) { await signOut(auth); return; }
    const data = snap.data();
    if(!data.activo) { await signOut(auth); return; }
    setLocalStorage(data, user.uid);
    redirigir(data);
  } catch(e) {
    console.error(e);
    await signOut(auth);
  }
});

/* ===============================
LOGIN
=============================== */
form.addEventListener("submit", async (e) => {
  e.preventDefault();
  hideError();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  try {
    const cred = await signInWithEmailAndPassword(auth, email, password);
    const uid = cred.user.uid;
    const snap = await getDoc(doc(db, "usuariosGlobal", uid));
    if(!snap.exists()) { showError("Usuario no registrado"); await signOut(auth); return; }
    const data = snap.data();
    if(!data.activo) { showError("Usuario desactivado"); await signOut(auth); return; }
    setLocalStorage(data, uid);
    redirigir(data);
  } catch(err) {
    showError("Credenciales incorrectas");
    console.error(err);
  }
});

/* ===============================
REDIRECCIÓN SEGÚN ROL
=============================== */
function redirigir(data){
  if(data.rolGlobal === "superadmin") { window.location="/admin/ceo-dashboard.html"; return; }
  switch(data.rol){
    case "dueno":
    case "admin":
    case "tecnico":
    case "asesor":
      window.location="/app/index.html";
      break;
    case "cliente":
      window.location="/cliente.html";
      break;
  }
}

/* ===============================
LOCAL STORAGE
=============================== */
function setLocalStorage(data, uid){
  localStorage.setItem("uid", uid);
  localStorage.setItem("empresaId", data.empresaId || "");
  localStorage.setItem("rol", data.rol || "");
  localStorage.setItem("planTipo", data.planTipo || "freemium");
}

/* ===============================
ERROR HANDLING
=============================== */
function showError(msg){
  errorMsg.textContent = msg;
  errorMsg.classList.remove("hidden");
}
function hideError(){
  errorMsg.classList.add("hidden");
}
</script>

</body>
</html>
