<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nexus-X · PRO360CORE Engine V16.3</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
  :root { 
    --neon-cyan: #00f2ff; 
    --neon-purple: #bc13fe;
    --space-black: #020617; 
  }

  body {
    background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
    font-family: 'Inter', sans-serif;
    color: #f8fafc;
    height: 100vh; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    overflow: hidden;
    margin: 0;
  }

  /* Capa de Estrellas Animadas */
  .stars-container {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: url('https://www.transparenttextures.com/patterns/stardust.png');
    opacity: 0.3; z-index: -1; animation: drift 60s linear infinite;
  }

  @keyframes drift { from { background-position: 0 0; } to { background-position: 1000px 1000px; } }

  /* Cristal Nexus-X */
  .glass-card {
    background: rgba(15, 23, 42, 0.7); 
    backdrop-filter: blur(40px);
    border: 1px solid rgba(0, 242, 255, 0.15); 
    box-shadow: 0 0 100px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 242, 255, 0.05);
    position: relative; z-index: 10;
    transition: transform 0.3s ease;
  }

  .nasa-title {
    font-family: 'Orbitron', sans-serif; 
    letter-spacing: 8px; 
    text-transform: uppercase;
    background: linear-gradient(to right, #fff, var(--neon-cyan), #fff);
    background-size: 200% auto;
    -webkit-background-clip: text; 
    -webkit-text-fill-color: transparent;
    animation: shine 4s linear infinite;
  }

  @keyframes shine { to { background-position: 200% center; } }

  .input-tesla {
    background: rgba(2, 6, 23, 0.6); 
    border: 1px solid rgba(255,255,255,0.05);
    font-family: 'JetBrains Mono', monospace;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
    color: white;
  }

  .input-tesla:focus {
    border-color: var(--neon-cyan); 
    box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); 
    outline: none;
    background: rgba(2, 6, 23, 0.9);
  }

  .btn-primary-nexus {
    background: transparent; border: 1px solid var(--neon-cyan); color: var(--neon-cyan);
    font-family: 'Orbitron', sans-serif; letter-spacing: 2px; transition: all 0.4s ease;
    text-transform: uppercase; font-weight: 900;
  }

  .btn-primary-nexus:hover { 
    background: var(--neon-cyan); color: #000; 
    box-shadow: 0 0 40px var(--neon-cyan); 
    transform: translateY(-2px);
  }

  .btn-demo-ultra {
    background: linear-gradient(45deg, var(--neon-purple), #4f46e5);
    color: white; font-family: 'Orbitron', sans-serif;
    letter-spacing: 1px; font-weight: 900; transition: all 0.4s ease;
    border: none; text-transform: uppercase;
  }

  .btn-demo-ultra:hover {
    filter: brightness(1.2); box-shadow: 0 0 30px rgba(188, 19, 254, 0.4);
    transform: scale(1.02);
  }

  .tab-active { 
    border-bottom: 3px solid var(--neon-cyan); 
    color: var(--neon-cyan); 
    font-weight: 900;
  }

  .system-loader {
    width: 20px; height: 20px; border: 2px solid rgba(0, 242, 255, 0.2);
    border-top-color: var(--neon-cyan); border-radius: 50%; animation: spin 0.8s linear infinite;
    display: inline-block; vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .glow-dot {
    width: 6px; height: 6px; background: var(--neon-cyan);
    border-radius: 50%; display: inline-block; margin-right: 8px;
    box-shadow: 0 0 10px var(--neon-cyan);
    animation: pulse-glow 2s infinite;
  }

  @keyframes pulse-glow { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
</head>

<body>
<div class="stars-container"></div>

<div class="w-full max-w-md glass-card p-10 rounded-[3rem] border border-white/5 relative">
  <div class="absolute -top-12 -right-12 w-40 h-40 bg-cyan-500/10 rounded-full blur-[60px]"></div>
  
  <div class="text-center mb-10">
    <div class="w-16 h-16 bg-white/5 rounded-2xl flex items-center justify-center mx-auto mb-6 border border-white/10 rotate-45 group hover:rotate-90 transition-transform duration-500">
        <i class="fas fa-microchip text-2xl text-cyan-400 -rotate-45"></i>
    </div>
    <h1 class="nasa-title text-4xl font-black mb-1">Nexus-X</h1>
    <p class="text-[7px] tracking-[0.6em] text-slate-500 uppercase font-black">Sincronización Proactiva V16.3</p>
  </div>

  <div class="flex justify-between px-4 mb-10 text-[9px] font-black uppercase tracking-widest border-b border-white/5">
    <button id="tabLogin" class="pb-4 tab-active transition-all" onclick="switchTab('login')">Ingresar</button>
    <button id="tabRegister" class="pb-4 text-slate-500 hover:text-white transition-all" onclick="switchTab('register')">Nuevo Taller</button>
  </div>

  <form id="loginForm" class="space-y-6">
    <div class="space-y-2">
      <label class="block text-[8px] text-slate-500 uppercase tracking-[0.3em] ml-2 font-black">Identidad de Comando</label>
      <input type="email" id="loginEmail" class="w-full p-5 input-tesla rounded-[1.5rem] text-xs" placeholder="CORREO@SISTEMA.COM" required>
    </div>

    <div class="space-y-2">
      <label class="block text-[8px] text-slate-500 uppercase tracking-[0.3em] ml-2 font-black">Llave de Acceso</label>
      <div class="relative">
        <input type="password" id="loginPass" class="w-full p-5 input-tesla rounded-[1.5rem] text-xs" placeholder="••••••••" required>
        <button type="button" onclick="togglePass('loginPass')" class="absolute right-5 top-5 opacity-40 hover:opacity-100 transition-all text-[8px] orbitron text-cyan-400 font-black">VER</button>
      </div>
    </div>

    <button type="submit" id="loginBtn" class="w-full py-6 btn-primary-nexus rounded-[1.5rem] mt-4 text-[10px]">
        Vincular con el Radar <i class="fas fa-satellite ml-2"></i>
    </button>
  </form>

  <form id="registerForm" class="space-y-4 hidden">
    <div id="planIndicator" class="text-[9px] text-center border border-purple-500/30 py-3 rounded-2xl text-purple-400 uppercase tracking-[0.3em] bg-purple-950/20 mb-4 orbitron font-bold">
        NODO DE DESPLIEGUE: CARGANDO...
    </div>

    <input type="text" id="nombre" class="w-full p-4 input-tesla rounded-2xl text-xs" placeholder="NOMBRE DEL TALLER / EMPRESA" required>
    <input type="email" id="regEmail" class="w-full p-4 input-tesla rounded-2xl text-xs" placeholder="EMAIL DE ADMINISTRACIÓN" required>

    <div class="grid grid-cols-2 gap-4">
      <input type="password" id="regPass" class="w-full p-4 input-tesla rounded-2xl text-xs" placeholder="CONTRASEÑA" required>
      <input type="password" id="regPass2" class="w-full p-4 input-tesla rounded-2xl text-xs" placeholder="CONFIRMAR" required>
    </div>

    <button type="submit" id="regBtn" class="w-full py-5 btn-primary-nexus rounded-2xl mt-2 text-[10px]">
        Inicializar Protocolo <i class="fas fa-rocket ml-2"></i>
    </button>
  </form>

  <div id="demoArea" class="mt-8 pt-8 border-t border-white/5 text-center">
    <p class="text-[8px] text-slate-500 uppercase tracking-widest mb-4">¿Solo quieres explorar el sistema?</p>
    <button type="button" onclick="activarDemoInmediata()" id="btnDemo" class="w-full py-4 btn-demo-ultra rounded-[1.5rem] text-[9px]">
        Activar Acceso Demo Elite <i class="fas fa-bolt ml-2"></i>
    </button>
  </div>

  <p id="error" class="text-red-500 text-[8px] text-center mt-6 uppercase tracking-[0.2em] hidden font-black animate-pulse bg-red-500/10 py-3 rounded-xl border border-red-500/20"></p>

  <div class="mt-8 text-center">
    <button id="resetBtn" type="button" class="text-[8px] text-slate-600 hover:text-cyan-400 uppercase tracking-[0.4em] transition-all orbitron">Recuperar Llave de Acceso</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInAnonymously, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAdk-s-OXu57MiobzRGBRu-TlF2KYeicWQ",
    authDomain: "tallerpro360.firebaseapp.com",
    projectId: "tallerpro360",
    storageBucket: "tallerpro360.firebasestorage.app",
    messagingSenderId: "636224778184",
    appId: "1:636224778184:web:9bd7351b6458a1ef625afd"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const urlParams = new URLSearchParams(window.location.search);
  let selectedPlan = urlParams.get('plan') || 'basico';
  const planIndicator = document.getElementById('planIndicator');
  if(planIndicator) planIndicator.innerText = `NODO DE DESPLIEGUE: ${selectedPlan.toUpperCase()}`;

  window.switchTab = (tab) => {
    const isLogin = tab === 'login';
    document.getElementById('loginForm').classList.toggle('hidden', !isLogin);
    document.getElementById('registerForm').classList.toggle('hidden', isLogin);
    document.getElementById('demoArea').classList.toggle('hidden', !isLogin);
    document.getElementById('tabLogin').className = isLogin ? 'pb-4 tab-active transition-all' : 'pb-4 text-slate-500 hover:text-white transition-all';
    document.getElementById('tabRegister').className = !isLogin ? 'pb-4 tab-active transition-all' : 'pb-4 text-slate-500 hover:text-white transition-all';
  };

  window.togglePass = (id) => {
    const input = document.getElementById(id);
    input.type = input.type === 'password' ? 'text' : 'password';
  };

  /**
   * --- FUNCIÓN MAESTRA: ACTIVAR DEMO (FRICCIÓN CERO) ---
   */
  window.activarDemoInmediata = async () => {
    const btn = document.getElementById('btnDemo');
    const errEl = document.getElementById('error');
    btn.innerHTML = `<span class="system-loader"></span> Generando Órbita Temporal...`;
    btn.disabled = true;

    try {
        // 1. Login Anónimo
        const cred = await signInAnonymously(auth);
        const uid = cred.user.uid;

        // 2. Creación Automática de Perfil
        const vencimiento = new Date();
        vencimiento.setDate(vencimiento.getDate() + 7); // 7 días de prueba full

        await setDoc(doc(db, "usuariosGlobal", uid), {
            rolGlobal: "cliente",
            email: "demo_anonima_" + uid.substring(0,5) + "@tallerpro360.com",
            tier: "freemium",
            isAnonymous: true,
            creadoEn: serverTimestamp()
        });

        await setDoc(doc(db, "empresas", uid), {
            nombre: "TALLER EXPERIMENTAL NEXUS",
            planId: "freemium",
            estadoPlan: "ACTIVO",
            venceEn: vencimiento,
            creadoEn: serverTimestamp()
        });

        // 3. Sincronización Local
        localStorage.setItem("empresaId", uid);
        localStorage.setItem("planTier", "freemium");
        localStorage.setItem("status", "ACTIVO");
        
        console.log("🚀 DEMO ACTIVADA: UID " + uid);
        window.location.href = "/app/#dashboard";

    } catch (e) {
        btn.innerText = "ACCESO DEMO ELITE";
        btn.disabled = false;
        errEl.innerText = "ERROR EN GENERADOR: " + e.message.toUpperCase();
        errEl.classList.remove('hidden');
    }
  };

  /**
   * ENGINE DE LOGIN TRADICIONAL
   */
  loginForm.addEventListener("submit", async e => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const errEl = document.getElementById('error');
    btn.innerHTML = `<span class="system-loader"></span> Sincronizando...`;
    btn.disabled = true;
    errEl.classList.add('hidden');

    try {
      const cred = await signInWithEmailAndPassword(auth, loginEmail.value.trim(), loginPass.value);
      const uid = cred.user.uid;

      // Obtener Datos Globales
      const userDoc = await getDoc(doc(db, "usuariosGlobal", uid));
      if (!userDoc.exists()) throw new Error("ID_NO_RECONOCIDO");

      const uData = userDoc.data();
      
      // Intentar obtener datos de empresa
      const empDoc = await getDoc(doc(db, "empresas", uid));
      
      // ALMACENAMIENTO DE SEGURIDAD (Hotfix V16.3)
      localStorage.setItem("empresaId", uid);
      localStorage.setItem("status", empDoc.exists() ? empDoc.data().estadoPlan : "ACTIVO");
      localStorage.setItem("planTier", empDoc.exists() ? empDoc.data().planId : (uData.tier || "basico"));
      localStorage.setItem("rolGlobal", uData.rolGlobal);

      window.location.href = uData.rolGlobal === "superadmin" ? "/app/#master" : "/app/#dashboard";

    } catch(e) {
      btn.innerText = "VINCULAR CON EL RADAR";
      btn.disabled = false;
      errEl.innerText = "FALLO DE CONEXIÓN: " + e.message.toUpperCase();
      errEl.classList.remove("hidden");
    }
  });

  /**
   * ENGINE DE REGISTRO FORMAL (BÁSICO, PRO, ELITE)
   */
  registerForm.addEventListener("submit", async e => {
    e.preventDefault();
    const btn = document.getElementById('regBtn');
    if(regPass.value !== regPass2.value) return alert("LLAVES DE ACCESO NO COINCIDEN");
    
    btn.innerHTML = `<span class="system-loader"></span> Creando Nodo...`;
    btn.disabled = true;

    try {
      const cred = await createUserWithEmailAndPassword(auth, regEmail.value, regPass.value);
      const uid = cred.user.uid;

      const vDate = new Date();
      vDate.setDate(vDate.getDate() + 30);

      await setDoc(doc(db, "usuariosGlobal", uid), {
        rolGlobal: "cliente", email: regEmail.value, tier: selectedPlan, creadoEn: serverTimestamp()
      });

      await setDoc(doc(db, "empresas", uid), {
        nombre: nombre.value.toUpperCase(), planId: selectedPlan,
        venceEn: vDate, estadoPlan: "ACTIVO", creadoEn: serverTimestamp()
      });

      localStorage.setItem("empresaId", uid);
      localStorage.setItem("planTier", selectedPlan);
      localStorage.setItem("status", "ACTIVO");
      
      window.location.href = "/app/#dashboard";
    } catch(e) { 
      btn.innerText = "INICIALIZAR PROTOCOLO";
      btn.disabled = false;
      alert("ERROR EN SECUENCIA: " + e.message);
    }
  });

  document.getElementById("resetBtn").onclick = async () => {
    const email = loginEmail.value.trim();
    if (!email) return alert("INGRESE CORREO DE COMANDO.");
    await sendPasswordResetEmail(auth, email);
    alert("Protocolo de restauración enviado al satélite.");
  };
</script>
</body>
</html>
