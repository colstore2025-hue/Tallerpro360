<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>TallerPRO360 · Acceso</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
  background:#020617;
  font-family:Inter,system-ui;
}
.card{
  background:#111827;
  border-radius:20px;
  padding:28px;
  box-shadow:0 20px 50px rgba(0,0,0,.6);
}
.input{
  width:100%;
  padding:10px;
  border-radius:10px;
  background:#020617;
  border:1px solid #1e293b;
  color:#e2e8f0;
}
.input:focus{
  outline:none;
  border-color:#00ffff;
}
.btn{
  width:100%;
  padding:10px;
  border-radius:10px;
  font-weight:bold;
}
</style>

</head>

<body class="flex items-center justify-center min-h-screen">

<div class="w-full max-w-md card">

<div class="text-center mb-6">
  <h1 class="text-2xl font-black text-cyan-400">🚀 TallerPRO360</h1>
  <p class="text-xs text-slate-400">Acceso Inteligente</p>
</div>

<!-- TABS -->
<div class="flex mb-6">
  <button id="tabLogin" class="flex-1 py-2 bg-cyan-500 rounded-l-lg">Login</button>
  <button id="tabRegister" class="flex-1 py-2 bg-slate-700 rounded-r-lg">Registro</button>
</div>

<!-- LOGIN -->
<form id="loginForm" class="space-y-4">

<input type="email" id="loginEmail" class="input" placeholder="Correo" required>

<div class="relative">
  <input type="password" id="loginPass" class="input pr-10" placeholder="Contraseña" required>
  <span onclick="window.togglePass('loginPass')" class="absolute right-3 top-2 cursor-pointer">👁️</span>
</div>

<button class="btn bg-cyan-500 hover:bg-cyan-600">
Ingresar
</button>

</form>

<!-- REGISTER -->
<form id="registerForm" class="space-y-4 hidden">

<input type="text" id="nombre" class="input" placeholder="Nombre del taller" required>
<input type="email" id="regEmail" class="input" placeholder="Correo" required>

<div class="relative">
  <input type="password" id="regPass" class="input pr-10" placeholder="Contraseña" required>
  <span onclick="window.togglePass('regPass')" class="absolute right-3 top-2 cursor-pointer">👁️</span>
</div>

<div class="relative">
  <input type="password" id="regPass2" class="input pr-10" placeholder="Confirmar contraseña" required>
  <span onclick="window.togglePass('regPass2')" class="absolute right-3 top-2 cursor-pointer">👁️</span>
</div>

<button class="btn bg-green-500 hover:bg-green-600">
Crear cuenta
</button>

</form>

<p id="error" class="text-red-400 text-xs text-center mt-4 hidden"></p>

<p class="text-center text-xs mt-3">
<button id="resetBtn" class="text-cyan-400">¿Olvidaste tu contraseña?</button>
</p>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAdk-s-OXu57MiobzRGBRu-TlF2KYeicWQ",
  authDomain: "tallerpro360.firebaseapp.com",
  projectId: "tallerpro360",
  storageBucket: "tallerpro360.firebasestorage.app",
  messagingSenderId: "636224778184",
  appId: "1:636224778184:web:9bd7351b6458a1ef625afd"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* LOGIN */
loginForm.addEventListener("submit", async e => {
  e.preventDefault();
  try {
    const cred = await signInWithEmailAndPassword(auth, loginEmail.value.trim(), loginPass.value);
    const uid = cred.user.uid;

    // Buscamos su perfil global
    const userSnap = await getDoc(doc(db, "usuariosGlobal", uid));
    if(!userSnap.exists()) throw new Error("Usuario no registrado.");

    const userData = userSnap.data();
    
    // Guardamos sesión para que el Router la lea
    localStorage.setItem("uid", uid);
    localStorage.setItem("empresaId", userData.empresaId || uid);
    localStorage.setItem("rol", userData.rolGlobal || "cliente");

    // REDIRECCIÓN ÚNICA A LA APP
    window.location.href = "/app/index.html";
  } catch(e) {
    error.innerText = e.message;
    error.classList.remove("hidden");
  }
});

/* REGISTER (Ajustado para crear la estructura correcta) */
registerForm.addEventListener("submit", async e => {
  e.preventDefault();
  try {
    const cred = await createUserWithEmailAndPassword(auth, regEmail.value, regPass.value);
    const uid = cred.user.uid;

    // 1. Crear Perfil de Usuario
    await setDoc(doc(db, "usuariosGlobal", uid), {
      rolGlobal: "cliente",
      empresaId: uid, // Por defecto su propio UID es su empresa
      email: regEmail.value,
      activo: true
    });

    // 2. Crear la Empresa/Taller
    await setDoc(doc(db, "empresas", uid), {
      nombre: nombre.value,
      planId: "freemium",
      estadoPlan: "ACTIVO",
      creadoEn: serverTimestamp()
    });

    alert("¡Cuenta creada! Ya puedes ingresar.");
    location.reload();
  } catch(e) { alert(e.message); }
});
</script>

</body>
</html>
