<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nexus-X · PRO360CORE Engine</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
  :root {
    --neon-cyan: #00f2ff;
    --space-black: #020617;
  }

  body {
    background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
    font-family: 'Inter', sans-serif;
    color: #f8fafc;
    overflow: hidden;
  }

  .stars {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: url('https://www.transparenttextures.com/patterns/stardust.png');
    opacity: 0.3;
    z-index: -1;
  }

  .glass-card {
    background: rgba(15, 23, 42, 0.7);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 2px;
    box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
  }

  .nasa-title {
    font-family: 'Orbitron', sans-serif;
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .input-tesla {
    background: rgba(2, 6, 23, 0.8);
    border: 1px solid #1e293b;
    transition: all 0.3s ease;
    border-radius: 2px;
    color: white;
  }

  .input-tesla:focus {
    border-color: var(--neon-cyan);
    box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
    outline: none;
  }

  .btn-tesla {
    background: transparent;
    border: 1px solid var(--neon-cyan);
    color: var(--neon-cyan);
    font-family: 'Orbitron', sans-serif;
    letter-spacing: 2px;
    transition: all 0.4s ease;
    border-radius: 2px;
    text-transform: uppercase;
    font-size: 0.8rem;
    cursor: pointer;
  }

  .btn-tesla:hover {
    background: var(--neon-cyan);
    color: #000;
    box-shadow: 0 0 20px var(--neon-cyan);
  }

  .tab-active {
    border-bottom: 2px solid var(--neon-cyan);
    color: var(--neon-cyan);
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate-ready { animation: fadeInUp 0.8s ease-out; }
</style>
</head>

<body class="flex items-center justify-center min-h-screen p-4">
<div class="stars"></div>

<div class="w-full max-w-md glass-card p-10 animate-ready">
  
  <div class="text-center mb-10">
    <h1 class="nasa-title text-2xl font-black text-white mb-2">Nexus-X</h1>
    <p id="systemStatus" class="text-[10px] tracking-[0.3em] text-cyan-500 uppercase">PRO360CORE Engine Ready</p>
  </div>

  <div class="flex justify-center space-x-8 mb-8 text-xs font-bold uppercase tracking-widest">
    <button id="tabLogin" class="pb-2 tab-active transition-all" onclick="switchTab('login')">Acceso</button>
    <button id="tabRegister" class="pb-2 text-slate-500 hover:text-white transition-all" onclick="switchTab('register')">Registro</button>
  </div>

  <form id="loginForm" class="space-y-6">
    <div>
      <label class="block text-[10px] text-slate-400 mb-2 uppercase tracking-tighter">Identificador de Usuario</label>
      <input type="email" id="loginEmail" class="w-full p-3 input-tesla text-sm" placeholder="EMAIL@SYSTEM.COM" required>
    </div>

    <div>
      <label class="block text-[10px] text-slate-400 mb-2 uppercase tracking-tighter">Clave de Seguridad</label>
      <div class="relative">
        <input type="password" id="loginPass" class="w-full p-3 input-tesla text-sm pr-10" placeholder="••••••••" required>
        <span onclick="togglePass('loginPass')" class="absolute right-3 top-3 cursor-pointer opacity-50 hover:opacity-100 text-xs">VIEW</span>
      </div>
    </div>

    <button type="submit" class="w-full py-4 btn-tesla mt-4">Validar Credenciales</button>
  </form>

  <form id="registerForm" class="space-y-6 hidden">
    <div>
      <label class="block text-[10px] text-slate-400 mb-2 uppercase tracking-tighter">Nombre de la Organización</label>
      <input type="text" id="nombre" class="w-full p-3 input-tesla text-sm" placeholder="TALLER / EMPRESA" required>
    </div>
    
    <div>
      <label class="block text-[10px] text-slate-400 mb-2 uppercase tracking-tighter">Email de Administrador</label>
      <input type="email" id="regEmail" class="w-full p-3 input-tesla text-sm" placeholder="ADMIN@NEXUS.COM" required>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-[10px] text-slate-400 mb-2 uppercase tracking-tighter">Clave</label>
        <input type="password" id="regPass" class="w-full p-3 input-tesla text-sm" placeholder="••••" required>
      </div>
      <div>
        <label class="block text-[10px] text-slate-400 mb-2 uppercase tracking-tighter">Confirmar</label>
        <input type="password" id="regPass2" class="w-full p-3 input-tesla text-sm" placeholder="••••" required>
      </div>
    </div>

    <div id="planIndicator" class="text-[9px] text-center border border-dashed border-cyan-900 py-2 text-cyan-500 uppercase tracking-widest bg-cyan-950/20">
      Plan Inicial: Cargando...
    </div>

    <button type="submit" class="w-full py-4 btn-tesla mt-2">Iniciar Protocolo de Registro</button>
  </form>

  <p id="error" class="text-red-500 text-[10px] text-center mt-6 uppercase tracking-widest hidden font-bold"></p>

  <div class="mt-8 text-center">
    <button id="resetBtn" type="button" class="text-[9px] text-slate-500 hover:text-cyan-400 uppercase tracking-widest transition-all">¿Restablecer acceso al sistema?</button>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAdk-s-OXu57MiobzRGBRu-TlF2KYeicWQ",
    authDomain: "tallerpro360.firebaseapp.com",
    projectId: "tallerpro360",
    storageBucket: "tallerpro360.firebasestorage.app",
    messagingSenderId: "636224778184",
    appId: "1:636224778184:web:9bd7351b6458a1ef625afd"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // --- DETECCIÓN DE PLAN DESDE URL ---
  const urlParams = new URLSearchParams(window.location.search);
  let selectedPlan = urlParams.get('plan') || 'freemium';
  document.getElementById('planIndicator').innerText = `Plan Vinculado: ${selectedPlan}`;

  // --- UI SWITCHER ---
  window.switchTab = (tab) => {
    const isLogin = tab === 'login';
    document.getElementById('loginForm').classList.toggle('hidden', !isLogin);
    document.getElementById('registerForm').classList.toggle('hidden', isLogin);
    document.getElementById('tabLogin').className = isLogin ? 'pb-2 tab-active transition-all' : 'pb-2 text-slate-500 hover:text-white transition-all';
    document.getElementById('tabRegister').className = !isLogin ? 'pb-2 tab-active transition-all' : 'pb-2 text-slate-500 hover:text-white transition-all';
  };

  window.togglePass = (id) => {
    const input = document.getElementById(id);
    input.type = input.type === 'password' ? 'text' : 'password';
  };

  // --- RECUPERAR CONTRASEÑA ---
  document.getElementById("resetBtn").addEventListener("click", async () => {
    const email = document.getElementById("loginEmail").value.trim();
    if (!email) {
      alert("SISTEMA: Ingrese su email en el campo 'Identificador de Usuario' para enviar el enlace.");
      return;
    }
    try {
      await sendPasswordResetEmail(auth, email);
      alert("PROTOCOLO INICIADO: Revise su bandeja de entrada para restablecer el acceso.");
    } catch(e) { alert("ERROR DE SISTEMA: " + e.message); }
  });

  // --- LOGIN ---
  loginForm.addEventListener("submit", async e => {
    e.preventDefault();
    const errEl = document.getElementById('error');
    errEl.classList.add('hidden');
    try {
      const cred = await signInWithEmailAndPassword(auth, loginEmail.value.trim(), loginPass.value);
      localStorage.setItem("uid", cred.user.uid);
      // REDIRECCIÓN PERFECTA CORREGIDA
      window.location.href = "/app/#dashboard";
    } catch(e) {
      errEl.innerText = "ACCESO DENEGADO: " + e.message.toUpperCase();
      errEl.classList.remove("hidden");
    }
  });

  // --- REGISTRO + ACTIVACIÓN AUTOMÁTICA ---
  registerForm.addEventListener("submit", async e => {
    e.preventDefault();
    if(regPass.value !== regPass2.value) return alert("LAS CLAVES NO COINCIDEN");
    
    const btn = e.submitter;
    btn.innerText = "CREANDO PERFIL...";
    btn.disabled = true;

    try {
      const cred = await createUserWithEmailAndPassword(auth, regEmail.value, regPass.value);
      const uid = cred.user.uid;

      // 1. Guardar Usuario Global
      await setDoc(doc(db, "usuariosGlobal", uid), {
        rolGlobal: "cliente",
        empresaId: uid,
        email: regEmail.value,
        activo: true
      });

      // 2. Guardar Empresa con Plan Detectado (o Freemium por defecto)
      await setDoc(doc(db, "empresas", uid), {
        nombre: nombre.value.toUpperCase(),
        planId: selectedPlan,
        estadoPlan: "ACTIVO", // Activación instantánea para Plan Gratis/Trial
        creadoEn: serverTimestamp()
      });

      alert("🛰️ PROTOCOLO EXITOSO: Organización creada y plan vinculado.");
      window.location.href = "/app/#dashboard"; // Redirección perfecta
    } catch(e) { 
      alert("FALLO EN REGISTRO: " + e.message);
      btn.innerText = "Iniciar Protocolo de Registro";
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
