<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TallerPRO360 ERP PRO 360</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
background:linear-gradient(135deg,#0f172a,#111827);
color:#f1f5f9;
font-family:Arial;
}
.glass{
background:rgba(15,23,42,.85);
backdrop-filter:blur(20px);
border-radius:1rem;
padding:1.5rem;
margin-bottom:1rem;
}
.metric h2{font-weight:700;}
.btn-pro{
background:#22c55e;
border:none;
font-weight:600;
}
</style>
</head>
<body class="p-3">

<div class="container">

<h3 class="text-center mb-4">ERP OPERATIVO PRO 360</h3>

<div id="metricas" class="row mb-4"></div>

<div class="glass">
<h5>Nueva Orden</h5>
<form id="formOrden">

<input class="form-control mb-2" id="cliente" placeholder="Cliente" required>
<input class="form-control mb-2" id="telefono" placeholder="Teléfono" required>
<input class="form-control mb-2" id="placa" placeholder="Placa" required>
<input class="form-control mb-2" id="vehiculo" placeholder="Vehículo" required>
<input class="form-control mb-2" id="repuestos" placeholder="Repuestos separados por coma">
<input type="number" class="form-control mb-2" id="total" placeholder="Total" required>

<button class="btn btn-pro w-100">Crear Orden</button>

</form>
</div>

<div class="glass">
<h5>Órdenes en tiempo real</h5>
<ul id="listaOrdenes" class="list-group bg-transparent"></ul>
</div>

<div class="glass">
<h5>Ingresos Mensuales</h5>
<canvas id="grafico"></canvas>
</div>

</div>

<script type="module">

/* ================= FIREBASE ================= */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
getFirestore, collection, addDoc, updateDoc, doc,
onSnapshot, serverTimestamp, query, orderBy 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import { 
getAuth, onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

/* 🔴 PON AQUÍ TU CONFIG EXACTA */
const firebaseConfig = {
  apiKey: "AIzaSyAdk-s-OXu57MiobzRGBRu-TlF2KYeicWQ",
  authDomain: "tallerpro360.firebaseapp.com",
  projectId: "tallerpro360",
  storageBucket: "tallerpro360.firebasestorage.app",
  messagingSenderId: "636224778184",
  appId: "1:636224778184:web:9bd7351b6458a1ef625afd",
  measurementId: "G-VEC2C0QX2G"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let empresaId = null;
let ordenes = [];
let inventario = [];
let chart;

/* ================= AUTH ================= */

onAuthStateChanged(auth, async(user)=>{

if(!user){
alert("Usuario no autenticado");
return;
}

const uid = user.uid;

/* Buscar empresa automáticamente */
empresaId = "tallerpro360_demo";  // 🔥 usamos tu empresa real

initInventario();
initOrdenes();

});

/* ================= REALTIME ================= */

function initOrdenes(){

const q = query(
collection(db,"empresas",empresaId,"ordenes"),
orderBy("creadoEn","desc")
);

onSnapshot(q,(snap)=>{
ordenes=[];
snap.forEach(d=>ordenes.push({id:d.id,...d.data()}));
renderOrdenes();
renderMetricas();
renderGrafico();
});

}

function initInventario(){

onSnapshot(
collection(db,"empresas",empresaId,"inventario"),
(snap)=>{
inventario=[];
snap.forEach(d=>inventario.push({id:d.id,...d.data()}));
});

}

/* ================= CREAR ORDEN ================= */

document.getElementById("formOrden").addEventListener("submit",async e=>{
e.preventDefault();

if(!empresaId) return alert("Empresa no detectada");

const repuestosArray = repuestos.value.split(",").map(r=>r.trim()).filter(r=>r);

const nuevaOrden={
clienteNombre:cliente.value,
clienteTelefono:telefono.value,
placa:placa.value,
vehiculo:vehiculo.value,
repuestos:repuestosArray,
totalOrden:parseFloat(total.value),
pagado:0,
estado:"activa",
creadoEn:serverTimestamp()
};

await addDoc(collection(db,"empresas",empresaId,"ordenes"),nuevaOrden);

await descontarInventario(repuestosArray);

e.target.reset();
});

/* ================= INVENTARIO ================= */

async function descontarInventario(lista){

for(const nombre of lista){

const item = inventario.find(i=>i.nombre.toLowerCase()===nombre.toLowerCase());

if(item){

await updateDoc(
doc(db,"empresas",empresaId,"inventario",item.id),
{ stockActual:item.stockActual-1 }
);

await addDoc(
collection(db,"empresas",empresaId,"movimientosInventario"),
{
tipo:"salida",
producto:item.nombre,
cantidad:1,
fecha:serverTimestamp()
}
);

}

}

}

/* ================= MÉTRICAS ================= */

function renderMetricas(){

const activas = ordenes.length;
const ingresos = ordenes.reduce((a,o)=>a+(o.pagado||0),0);
const pendientes = ordenes.reduce((a,o)=>a+((o.totalOrden||0)-(o.pagado||0)),0);

document.getElementById("metricas").innerHTML=`
<div class="col-md-4">
<div class="glass metric">
<h6>Órdenes</h6>
<h2>${activas}</h2>
</div>
</div>

<div class="col-md-4">
<div class="glass metric">
<h6>Ingresos</h6>
<h2>$${ingresos.toLocaleString()}</h2>
</div>
</div>

<div class="col-md-4">
<div class="glass metric">
<h6>Pendientes</h6>
<h2>$${pendientes.toLocaleString()}</h2>
</div>
</div>
`;

}

/* ================= LISTADO ================= */

function renderOrdenes(){

const ul=document.getElementById("listaOrdenes");
ul.innerHTML="";

ordenes.forEach(o=>{
const li=document.createElement("li");
li.className="list-group-item bg-transparent text-white mb-2";
li.innerHTML=`
<strong>${o.placa}</strong> - ${o.vehiculo}<br>
${o.clienteNombre}<br>
Total: $${o.totalOrden}
`;
ul.appendChild(li);
});

}

/* ================= GRÁFICO ================= */

function renderGrafico(){

const meses={};

ordenes.forEach(o=>{
if(!o.creadoEn?.seconds) return;
const d=new Date(o.creadoEn.seconds*1000);
const mes=d.getMonth()+1;
meses[mes]=(meses[mes]||0)+(o.pagado||0);
});

if(chart) chart.destroy();

chart=new Chart(document.getElementById("grafico"),{
type:"line",
data:{
labels:Object.keys(meses),
datasets:[{label:"Ingresos",data:Object.values(meses)}]
}
});

}

</script>
</body>
</html>
