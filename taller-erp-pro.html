<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TallerPRO360 ERP PRO 360</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
background:linear-gradient(135deg,#0f172a,#111827);
color:#f1f5f9;
font-family:Arial;
}
.glass{
background:rgba(15,23,42,.85);
backdrop-filter:blur(20px);
border-radius:1rem;
padding:1.5rem;
margin-bottom:1rem;
}
.btn-pro{
background:#22c55e;
border:none;
font-weight:600;
}
</style>
</head>
<body class="p-3">

<div class="container">

<h3 class="text-center mb-4">ERP OPERATIVO PRO 360</h3>

<div id="metricas" class="row mb-4"></div>

<div class="glass">
<h5>Nueva Orden</h5>
<form id="formOrden">
<input class="form-control mb-2" id="cliente" placeholder="Cliente" required>
<input class="form-control mb-2" id="telefono" placeholder="Teléfono" required>
<input class="form-control mb-2" id="placa" placeholder="Placa" required>
<input class="form-control mb-2" id="vehiculo" placeholder="Vehículo" required>
<input class="form-control mb-2" id="repuestos" placeholder="Repuestos separados por coma">
<input type="number" class="form-control mb-2" id="total" placeholder="Total" required>
<button class="btn btn-pro w-100">Crear Orden</button>
</form>
</div>

<div class="glass">
<h5>Órdenes en tiempo real</h5>
<ul id="listaOrdenes" class="list-group bg-transparent"></ul>
</div>

<div class="glass">
<h5>Ingresos Mensuales</h5>
<canvas id="grafico"></canvas>
</div>

</div>

<script type="module">

/* ================= IMPORTS (SOLO UNA VEZ) ================= */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getFirestore, collection, addDoc, updateDoc, doc,
  onSnapshot, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { 
  getAuth, onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

/* ================= CONFIG FIREBASE ================= */

const firebaseConfig = {
  apiKey: "AIzaSyAdk-s-OXu57MiobzRGBRu-TlF2KYeicWQ",
  authDomain: "tallerpro360.firebaseapp.com",
  projectId: "tallerpro360",
  storageBucket: "tallerpro360.firebasestorage.app",
  messagingSenderId: "636224778184",
  appId: "1:636224778184:web:9bd7351b6458a1ef625afd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* ================= SESIÓN SAAS ================= */

const empresaId = localStorage.getItem("empresaId");
const sucursalId = localStorage.getItem("sucursalId");
const uid = localStorage.getItem("uid");
const rol = localStorage.getItem("rol");

if (!empresaId || !uid || !rol || !sucursalId) {
  window.location.href = "/";
}

/* ================= VARIABLES ================= */

let ordenes = [];
let inventario = [];
let chart;

/* ================= AUTH ================= */

onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "/";
    return;
  }
  iniciarERP();
});

/* ================= INICIALIZAR ERP ================= */

function iniciarERP(){

  // ORDENES
  onSnapshot(
    collection(db,"empresas",empresaId,"sucursales",sucursalId,"ordenes"),
    (snapshot)=>{
      ordenes=[];
      snapshot.forEach(d=>ordenes.push({id:d.id,...d.data()}));
      renderOrdenes();
      renderMetricas();
      renderGrafico();
    },
    (error)=>{
      alert("Error permisos órdenes: "+error.message);
    }
  );

  // INVENTARIO
  onSnapshot(
    collection(db,"empresas",empresaId,"sucursales",sucursalId,"inventario"),
    (snapshot)=>{
      inventario=[];
      snapshot.forEach(d=>inventario.push({id:d.id,...d.data()}));
    }
  );
}

/* ================= CREAR ORDEN ================= */

document.getElementById("formOrden").addEventListener("submit", async (e) => {
  e.preventDefault();

  try {

    if (!auth.currentUser) {
      alert("Sesión inválida.");
      return;
    }

    const clienteNombre = document.getElementById("cliente").value.trim();
    const clienteTelefono = document.getElementById("telefono").value.trim();
    const placa = document.getElementById("placa").value.trim();
    const vehiculo = document.getElementById("vehiculo").value.trim();
    const totalOrden = parseFloat(document.getElementById("total").value) || 0;

    const repuestosArray = document.getElementById("repuestos").value
      .split(",")
      .map(r => r.trim())
      .filter(r => r.length > 0);

    await addDoc(
      collection(db,"empresas",empresaId,"sucursales",sucursalId,"ordenes"),
      {
        clienteNombre,
        clienteTelefono,
        placa,
        vehiculo,
        repuestos: repuestosArray,
        totalOrden,
        pagado: 0,
        estado: "activa",
        creadoEn: serverTimestamp(),
        creadoPor: uid
      }
    );

    await descontarInventario(repuestosArray);

    e.target.reset();
    alert("Orden creada correctamente");

  } catch (err) {
    console.error(err);
    alert("Error creando orden: " + err.message);
  }
});

/* ================= INVENTARIO ================= */

async function descontarInventario(lista){

  for(const nombre of lista){

    const item = inventario.find(i =>
      i.nombre?.toLowerCase() === nombre.toLowerCase()
    );

    if(item){

      await updateDoc(
        doc(db,"empresas",empresaId,"sucursales",sucursalId,"inventario",item.id),
        { stockActual:(item.stockActual||0)-1 }
      );

      await addDoc(
        collection(db,"empresas",empresaId,"sucursales",sucursalId,"movimientosInventario"),
        {
          tipo:"salida",
          producto:item.nombre,
          cantidad:1,
          fecha:serverTimestamp()
        }
      );
    }
  }
}

/* ================= MÉTRICAS ================= */

function renderMetricas(){

  const totalOrdenes = ordenes.length;
  const ingresos = ordenes.reduce((a,o)=>a+(o.pagado||0),0);
  const pendientes = ordenes.reduce((a,o)=>a+((o.totalOrden||0)-(o.pagado||0)),0);

  document.getElementById("metricas").innerHTML=`
  <div class="col-md-4">
  <div class="glass"><h6>Órdenes</h6><h2>${totalOrdenes}</h2></div>
  </div>
  <div class="col-md-4">
  <div class="glass"><h6>Ingresos</h6><h2>$${ingresos.toLocaleString()}</h2></div>
  </div>
  <div class="col-md-4">
  <div class="glass"><h6>Pendientes</h6><h2>$${pendientes.toLocaleString()}</h2></div>
  </div>`;
}

/* ================= LISTADO ================= */

function renderOrdenes(){
  const ul=document.getElementById("listaOrdenes");
  ul.innerHTML="";
  ordenes.forEach(o=>{
    const li=document.createElement("li");
    li.className="list-group-item bg-transparent text-white mb-2";
    li.innerHTML=`
    <strong>${o.placa}</strong> - ${o.vehiculo}<br>
    ${o.clienteNombre}<br>
    Total: $${o.totalOrden}
    `;
    ul.appendChild(li);
  });
}

/* ================= GRÁFICO ================= */

function renderGrafico(){

  const meses={};

  ordenes.forEach(o=>{
    if(!o.creadoEn?.seconds) return;
    const d=new Date(o.creadoEn.seconds*1000);
    const mes=d.getMonth()+1;
    meses[mes]=(meses[mes]||0)+(o.pagado||0);
  });

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("grafico"),{
    type:"line",
    data:{
      labels:Object.keys(meses),
      datasets:[{label:"Ingresos",data:Object.values(meses)}]
    }
  });
}

</script>

</body>
</html>
