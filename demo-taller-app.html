<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TallerPRO360</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-950 text-white p-6">

<h1 class="text-3xl text-green-400 mb-6">
TallerPRO360
</h1>


<div class="grid grid-cols-3 gap-4 mb-6">

<div class="bg-slate-900 p-4 rounded">
Vehículos
<div id="kpiVehiculos" class="text-green-400 text-xl">0</div>
</div>

<div class="bg-slate-900 p-4 rounded">
Órdenes
<div id="kpiOrdenes" class="text-green-400 text-xl">0</div>
</div>

<div class="bg-slate-900 p-4 rounded">
Ingresos
<div id="kpiIngresos" class="text-green-400 text-xl">$0</div>
</div>

</div>


<h2 class="text-xl mb-2">Nuevo vehículo</h2>

<input id="marca" placeholder="Marca"
class="p-2 text-black mb-2 w-full">

<input id="falla" placeholder="Falla"
class="p-2 text-black mb-2 w-full">

<input id="precio" placeholder="Precio"
class="p-2 text-black mb-2 w-full">

<button onclick="guardar()"
class="bg-green-500 px-4 py-2 rounded mb-6">
Guardar
</button>


<h2 class="text-xl mb-2">Vehículos registrados</h2>

<div id="lista"></div>


<script>

let data=JSON.parse(localStorage.getItem("taller")) || []

function guardar(){

const marca=document.getElementById("marca").value
const falla=document.getElementById("falla").value
const precio=parseInt(document.getElementById("precio").value)

data.push({marca,falla,precio})

localStorage.setItem("taller",JSON.stringify(data))

mostrar()

}

function mostrar(){

const lista=document.getElementById("lista")

lista.innerHTML=""

let ingresos=0

data.forEach(v=>{

ingresos+=v.precio

const div=document.createElement("div")

div.className="bg-slate-900 p-3 rounded mb-2"

div.innerHTML=
"🚗 "+v.marca+
"<br>🔧 "+v.falla+
"<br>💰 $"+v.precio

lista.appendChild(div)

})

document.getElementById("kpiVehiculos").innerText=data.length
document.getElementById("kpiOrdenes").innerText=data.length
document.getElementById("kpiIngresos").innerText="$"+ingresos

}

mostrar()

</script>

</body>

</html>
