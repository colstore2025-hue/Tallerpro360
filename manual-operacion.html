<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus-X | Operative Training Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@300&family=Outfit:wght@300;900&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #00f2ff; --dark: #010409; --amber: #fbbf24; }
        body { font-family: 'Outfit', sans-serif; background: var(--dark); color: white; overflow-x: hidden; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(13, 17, 23, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .progress-bar { height: 4px; background: rgba(255,255,255,0.05); position: fixed; top: 0; left: 0; z-index: 1000; width: 0%; transition: width 0.5s ease; background: var(--cyan); box-shadow: 0 0 10px var(--cyan); }
    </style>
</head>
<body class="p-4 md:p-12 pb-32">
    <div class="progress-bar" id="mainProgress"></div>

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-end mb-16 gap-8 border-b border-white/10 pb-10">
            <div>
                <span class="orbitron text-[8px] text-cyan-500 tracking-[0.5em] uppercase">Manual de Despliegue TallerPRO360</span>
                <h1 class="orbitron text-6xl font-black italic tracking-tighter uppercase mt-2">
                    NEXUS <span class="text-cyan-400">OPERATIONS</span>
                </h1>
                <p class="text-[10px] text-slate-500 uppercase tracking-[0.3em] mt-2">Misión: Automatización Total del Taller</p>
            </div>
            
            <div class="glass p-6 rounded-3xl border-cyan-500/20 w-full md:w-72">
                <div class="flex justify-between items-center mb-2">
                    <span class="orbitron text-[9px] font-black uppercase text-slate-400">Salud del Nodo AI</span>
                    <span id="saludPorcentaje" class="text-cyan-400 orbitron text-[10px]">0%</span>
                </div>
                <div class="w-full bg-white/5 h-2 rounded-full overflow-hidden">
                    <div id="saludBarra" class="h-full bg-cyan-500 shadow-[0_0_10px_#00f2ff] transition-all duration-1000" style="width: 0%"></div>
                </div>
                <p class="text-[8px] text-slate-500 mt-2 uppercase italic leading-tight">Nota: Si la salud es inferior al 80%, el Gerente AI operará con datos limitados.</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 space-y-6">
                <div class="glass p-8 rounded-[2.5rem] border-amber-500/10 sticky top-10">
                    <h3 class="orbitron text-xs font-black mb-6 text-amber-400 uppercase italic underline">Ruta de Inducción</h3>
                    <div id="checklist" class="space-y-4"></div>
                </div>
            </div>
            <div class="lg:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-6" id="gridModulos"></div>
        </div>
    </div>

    <div id="videoModal" class="fixed inset-0 bg-black/95 backdrop-blur-xl hidden z-[2000] flex items-center justify-center p-4">
        <div class="max-w-4xl w-full bg-[#0d1117] rounded-[3rem] border border-white/10 p-2 relative animate-in zoom-in duration-300">
            <button onclick="cerrarVideo()" class="absolute -top-12 right-0 text-white orbitron text-[10px] hover:text-cyan-400">CERRAR [X]</button>
            <div class="aspect-video w-full bg-black rounded-[2.5rem] overflow-hidden border border-white/5 relative" id="playerContainer">
                <p class="absolute inset-0 flex items-center justify-center orbitron text-cyan-500 text-[10px] animate-pulse">CARGANDO MICRO-TUTORIAL NEXUS-X...</p>
            </div>
        </div>
    </div>

    <script>
        const modulos = [
            // REEMPLAZA LOS IDs DE YOUTUBE AQUÍ:
            { id: 'config', title: 'CONFIG ADN', icon: 'fa-cogs', youtubeId: 'VIDEO_ID_YOUTUBE_1', desc: 'Centraliza tu identidad legal, logo y WhatsApp API. Es el cimiento de tu firma digital.' },
            { id: 'ordenes', title: 'ÓRDENES PRO', icon: 'fa-file-invoice', youtubeId: 'VIDEO_ID_YOUTUBE_2', desc: 'Ingreso por placa, diagnóstico visual y liquidación. Envía el reporte PDF en 1 segundo.' },
            { id: 'inventario', title: 'STOCK ELITE', icon: 'fa-box-open', youtubeId: 'VIDEO_ID_YOUTUBE_3', desc: 'Control de repuestos propios y del cliente. Alertas de stock crítico automáticas.' },
            { id: 'contabilidad', title: 'LIBRO MAYOR', icon: 'fa-vault', youtubeId: 'VIDEO_ID_YOUTUBE_4', desc: 'Flujo de caja real. Sin cifras de muestra. El espejo financiero de tu taller.' },
            { id: 'finanzas', title: 'FINANZAS IA', icon: 'fa-chart-pie', youtubeId: 'VIDEO_ID_YOUTUBE_5', desc: 'Análisis de utilidad neta. Cruza órdenes con gastos para saber cuánto ganas de verdad.' },
            { id: 'gerente', title: 'GERENTE AI', icon: 'fa-brain', youtubeId: 'VIDEO_ID_YOUTUBE_6', desc: 'Tu socio digital 24/7. Audita el taller y te da consejos de crecimiento.' }
        ];

        function init() {
            const grid = document.getElementById('gridModulos');
            const checklist = document.getElementById('checklist');

            grid.innerHTML = modulos.map(m => `
                <div class="glass p-8 rounded-[2.5rem] border border-white/5 hover:border-cyan-500/50 transition-all group">
                    <div class="flex justify-between items-start mb-6">
                        <i class="fas ${m.icon} text-cyan-400 text-2xl"></i>
                        <button onclick="verVideo('${m.youtubeId}')" class="bg-white/5 hover:bg-cyan-500 hover:text-black p-3 rounded-xl transition-all shadow-xl shadow-cyan-500/0 hover:shadow-cyan-500/50">
                            <i class="fas fa-play text-[10px]"></i>
                        </button>
                    </div>
                    <h4 class="orbitron text-xs font-black uppercase mb-4">${m.title}</h4>
                    <p class="text-[11px] text-slate-500 leading-relaxed mb-6">${m.desc}</p>
                    <div class="flex gap-2">
                        <span class="text-[7px] orbitron bg-cyan-500/10 text-cyan-400 px-2 py-1 rounded">AUTOMATIZADO</span>
                        <span class="text-[7px] orbitron bg-white/5 text-slate-500 px-2 py-1 rounded">V.21</span>
                    </div>
                </div>
            `).join('');

            checklist.innerHTML = modulos.map(m => `
                <div class="flex items-center gap-4 opacity-50 transition-all cursor-pointer hover:opacity-100" onclick="completar('${m.id}')">
                    <div id="check-${m.id}" class="w-5 h-5 border-2 border-white/10 rounded-lg flex items-center justify-center text-[10px] transition-all"></div>
                    <span class="text-[10px] font-black orbitron uppercase text-slate-400">${m.title}</span>
                </div>
            `).join('');
        }

        let completados = new Set();
        function completar(id) {
            const el = document.getElementById(`check-${id}`);
            if (completados.has(id)) {
                completados.delete(id);
                el.innerHTML = "";
                el.className = "w-5 h-5 border-2 border-white/10 rounded-lg flex items-center justify-center text-[10px] transition-all";
            } else {
                completados.add(id);
                el.innerHTML = '<i class="fas fa-check text-black"></i>';
                el.className = "w-5 h-5 border-2 border-emerald-500 rounded-lg flex items-center justify-center text-[10px] bg-emerald-500 shadow-[0_0_10px_#10b981] transition-all";
            }
            actualizarProgreso();
        }

        function actualizarProgreso() {
            const p = (completados.size / modulos.length) * 100;
            document.getElementById('mainProgress').style.width = p + "%";
            document.getElementById('saludBarra').style.width = p + "%";
            document.getElementById('saludPorcentaje').innerText = Math.round(p) + "%";
        }

        // --- EXPLICACIÓN DE CÓMO FUNCIONA EL VIDEO ---
        function verVideo(youtubeId) {
            const playerContainer = document.getElementById('playerContainer');
            const modal = document.getElementById('videoModal');

            // 1. Inyectamos el reproductor de YouTube con reproducción automática (autoplay) activada.
            // Esto es lo que "carga" el video real dentro del modal.
            playerContainer.innerHTML = `
                <iframe 
                    width="100%" 
                    height="100%" 
                    src="https://www.youtube.com/embed/${youtubeId}?autoplay=1&rel=0&modestbranding=1" 
                    title="Nexus-X Micro-Tutorial" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                    allowfullscreen>
                </iframe>`;
            
            // 2. Mostramos el modal.
            modal.classList.remove('hidden');
        }

        function cerrarVideo() {
            const playerContainer = document.getElementById('playerContainer');
            const modal = document.getElementById('videoModal');

            // CRÍTICO: Limpiamos el contenedor del reproductor.
            // Si no hacemos esto, el video seguirá reproduciéndose "en segundo plano" aunque el modal esté oculto.
            playerContainer.innerHTML = `<p class="absolute inset-0 flex items-center justify-center orbitron text-cyan-500 text-[10px] animate-pulse">CARGANDO MICRO-TUTORIAL NEXUS-X...</p>`;
            
            // Ocultamos el modal.
            modal.classList.add('hidden');
        }

        init();
    </script>
</body>
</html>
