<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TallerPRO360 Super Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#020617;
color:white;
font-family:system-ui;
}

.card{
background:#0f172a;
border:1px solid #1e293b;
border-radius:16px;
padding:20px;
}

.glow{
color:#22c55e;
}

.chat{
height:220px;
overflow:auto;
background:#020617;
border:1px solid #1e293b;
border-radius:12px;
padding:12px;
}

.vehicle{
padding:8px;
border-bottom:1px solid #1e293b;
}

</style>

</head>

<body class="p-10">

<!-- HEADER -->

<div class="flex justify-between mb-10">

<h1 class="text-3xl font-bold glow">
TallerPRO360 AI Dashboard
</h1>

<div class="text-slate-400">
Plataforma Inteligente de Talleres
</div>

</div>


<!-- KPIs -->

<div class="grid md:grid-cols-4 gap-6 mb-8">

<div class="card">
Vehículos activos
<div id="vehiculos" class="text-3xl glow mt-2">0</div>
</div>

<div class="card">
Órdenes
<div id="ordenes" class="text-3xl glow mt-2">0</div>
</div>

<div class="card">
Clientes
<div id="clientes" class="text-3xl glow mt-2">0</div>
</div>

<div class="card">
Ingresos
<div id="ingresos" class="text-3xl glow mt-2">$0</div>
</div>

</div>


<div class="grid md:grid-cols-2 gap-6 mb-8">

<!-- GRAFICO -->

<div class="card">

<h3 class="mb-4">
Ingresos en tiempo real
</h3>

<canvas id="chart"></canvas>

</div>


<!-- IA PREDICTIVA -->

<div class="card">

<h3 class="mb-4">
Predicción IA
</h3>

<div id="prediction" class="text-slate-300"></div>

</div>

</div>



<div class="grid md:grid-cols-2 gap-6">

<!-- VEHICULOS -->

<div class="card">

<h3 class="mb-4">
Vehículos en taller
</h3>

<div id="vehicles"></div>

</div>


<!-- CHAT -->

<div class="card">

<h3 class="mb-4">
Chat cliente
</h3>

<div id="chat" class="chat"></div>

</div>

</div>



<script>

let vehiculos=0
let ordenes=0
let clientes=0
let ingresos=0

const autos=[
"Toyota Hilux",
"Kia Rio",
"Mazda CX5",
"Renault Duster",
"Chevrolet Onix"
]

const fallas=[
"Sensor ABS defectuoso",
"Pastillas de freno desgastadas",
"Filtro de aire sucio",
"Fuga de aceite",
"Batería descargada"
]

const precios=[90000,120000,180000,220000,300000]

const ctx=document.getElementById("chart")

const chart=new Chart(ctx,{
type:"line",
data:{
labels:[],
datasets:[{
label:"Ingresos",
data:[],
borderColor:"#22c55e"
}]
}
})

function updateChart(){

let t=new Date().toLocaleTimeString()

chart.data.labels.push(t)
chart.data.datasets[0].data.push(ingresos)

chart.update()

}

function chat(msg){

const area=document.getElementById("chat")

let m=document.createElement("div")

m.innerHTML=msg

area.prepend(m)

}

function addVehicle(auto,falla){

const area=document.getElementById("vehicles")

let v=document.createElement("div")

v.className="vehicle"

v.innerHTML="🚗 "+auto+" — "+falla

area.prepend(v)

}

function predict(){

const p=document.getElementById("prediction")

const random=fallas[Math.floor(Math.random()*fallas.length)]

p.innerHTML="La IA predice aumento de reparaciones por: <span class='glow'>"+random+"</span>"

}

function simulate(){

const auto=autos[Math.floor(Math.random()*autos.length)]
const falla=fallas[Math.floor(Math.random()*fallas.length)]
const precio=precios[Math.floor(Math.random()*precios.length)]

vehiculos++
ordenes++
clientes++
ingresos+=precio

document.getElementById("vehiculos").innerText=vehiculos
document.getElementById("ordenes").innerText=ordenes
document.getElementById("clientes").innerText=clientes
document.getElementById("ingresos").innerText="$"+ingresos.toLocaleString("es-CO")

addVehicle(auto,falla)

chat("Cliente: Traje mi "+auto)
chat("IA: Detectamos "+falla)
chat("Sistema: Cotización $"+precio.toLocaleString("es-CO"))

predict()

updateChart()

}

setInterval(simulate,5000)

</script>

</body>

</html>
