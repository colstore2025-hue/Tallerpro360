<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TallerPRO360 · ERP SaaS</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body { background:#0f172a; font-family:Inter,system-ui; color:#cbd5e1; margin:0; }
    header { background:#111827; padding:10px 20px; display:flex; justify-content:space-between; align-items:center; }
    #menu button { margin-right:5px; background:#1f2937; padding:6px 10px; border:none; border-radius:6px; cursor:pointer; color:#0ff; transition:.2s; }
    #menu button:hover { background:#0ff; color:#111; }
    #appContainer { padding:20px; min-height:calc(100vh - 60px); }
  </style>
</head>

<body>

<header>
  <h1 class="text-2xl font-bold text-emerald-400">TallerPRO360</h1>
  <div id="menu"></div>
  <button id="logoutBtn" class="bg-red-500 px-3 py-1 rounded">Salir</button>
</header>

<main id="appContainer">
  <p class="text-slate-400">Cargando sistema...</p>
</main>

<script type="module">

/* ================== FIREBASE ================== */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔥 CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyAdk-s-OXu57MiobzRGBRu-TlF2KYeicWQ",
  authDomain: "tallerpro360.firebaseapp.com",
  projectId: "tallerpro360",
  storageBucket: "tallerpro360.firebasestorage.app",
  messagingSenderId: "636224778184",
  appId: "1:636224778184:web:9bd7351b6458a1ef625afd",
  measurementId: "G-VEC2C0QX2G"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ================== AUTH ================== */

onAuthStateChanged(auth, async (user)=>{

  console.log("🔥 Auth detectado:", user);

  const container = document.getElementById("appContainer");

  if(!user){
    console.warn("❌ No hay usuario");
    window.location.href = "/login.html";
    return;
  }

  const uid = user.uid;

  try{

    container.innerHTML = "🔄 Cargando usuario...";

    const ref = doc(db,"usuariosGlobal",uid);

    const snap = await getDoc(ref);

    console.log("📄 Snapshot:", snap.exists());

    if(!snap.exists()){
      container.innerHTML = "❌ Usuario no existe en Firestore";
      await signOut(auth);
      return;
    }

    const userData = snap.data();

    console.log("👤 userData:", userData);

    // 🔥 VALIDACIÓN CRÍTICA
    if(!userData.empresaId){
      container.innerHTML = "❌ Usuario sin empresaId";
      return;
    }

    // 💾 SESSION
    localStorage.setItem("uid", uid);
    localStorage.setItem("empresaId", userData.empresaId);
    localStorage.setItem("rolGlobal", userData.rolGlobal || "user");

    console.log("✅ INIT APP");

    initApp(userData);

  }catch(e){

    console.error("🔥 ERROR GLOBAL:", e);

    container.innerHTML = `
      <div style="color:red">
        <h2>Error inicializando app</h2>
        <pre>${e.stack || e.message}</pre>
      </div>
    `;
  }

});

/* ================== LOGOUT ================== */

document.getElementById("logoutBtn").onclick = async ()=>{
  await signOut(auth);
  localStorage.clear();
  window.location.href = "/login.html";
};

</script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</body>
</html>
