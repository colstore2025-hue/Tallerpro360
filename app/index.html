<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TallerPRO360 · ERP SaaS</title>

<!-- Base FIX CLAVE -->
<base href="/app/">

<!-- UI -->
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
  body { margin:0; font-family:Inter,system-ui; background:#0b1220; color:#cbd5e1; }

  header {
    background:#0f172a;
    padding:14px 24px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 0 25px #000;
  }

  #logoutBtn {
    background:#ef4444;
    color:#fff;
    padding:8px 16px;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
  }

  #logoutBtn:hover { background:#dc2626; }

  #mainLayout { display:flex; min-height:calc(100vh - 70px); }

  /* SIDEBAR TESLA STYLE */
  #sidebar {
    width:260px;
    background:#0f172a;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-top:25px;
    box-shadow:2px 0 30px #000;
  }

  #sidebar button {
    width:200px;
    margin:12px 0;
    padding:16px;
    border:none;
    border-radius:14px;
    font-size:18px;
    font-weight:700;
    cursor:pointer;
    color:#00ffff;
    background:#1e293b;
    transition:.3s;
  }

  #sidebar button:hover {
    background:#00ffff;
    color:#000;
    transform:scale(1.06);
  }

  #appContainer {
    flex:1;
    padding:30px;
    overflow-y:auto;
  }
</style>
</head>

<body>

<header>
  <h1 class="text-2xl font-bold text-emerald-400">TallerPRO360</h1>
  <button id="logoutBtn">Salir</button>
</header>

<div id="mainLayout">
  <div id="sidebar"></div>

  <main id="appContainer">
    <p class="text-center mt-20 text-slate-400">Inicializando sistema...</p>
  </main>
</div>

<script type="module">

/* ================= FIREBASE CORE ================= */
import { auth, db } from "./js/core/firebase-config.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ================= AUTH ================= */
onAuthStateChanged(auth, async (user) => {

  const container = document.getElementById("appContainer");

  if (!user) {
    window.location.href = "/login.html";
    return;
  }

  try {

    container.innerHTML = "🔄 Cargando usuario...";

    const snap = await getDoc(doc(db, "usuariosGlobal", user.uid));

    if (!snap.exists()) {
      container.innerHTML = "❌ Usuario no autorizado";
      await signOut(auth);
      return;
    }

    const userData = snap.data();

    if (!userData.empresaId) {
      container.innerHTML = "❌ Usuario sin empresaId";
      return;
    }

    /* SESSION GLOBAL */
    localStorage.setItem("uid", user.uid);
    localStorage.setItem("empresaId", userData.empresaId);
    localStorage.setItem("rolGlobal", userData.rolGlobal || "user");

    initApp(userData);

  } catch (e) {
    console.error(e);
    container.innerHTML = `
      <h2 style="color:red">❌ Error inicializando</h2>
      <pre>${e.message}</pre>
    `;
  }

});

/* ================= INIT ================= */
function initApp(user) {
  renderMenu(user);
  loadModule("dashboard");
}

/* ================= MENU ================= */
function renderMenu(user) {

  const sidebar = document.getElementById("sidebar");

  const baseModules = [
    { id:"dashboard", label:"📊 Dashboard" },
    { id:"ordenes", label:"🧾 Órdenes" },
    { id:"clientes", label:"👥 Clientes" },
    { id:"inventario", label:"📦 Inventario" },
    { id:"ia", label:"🧠 IA" }
  ];

  const adminModules = [
    { id:"ceoAI", label:"👑 CEO AI" },
    { id:"contabilidad", label:"📊 Contabilidad" },
    { id:"finanzas", label:"💰 Finanzas" },
    { id:"reportes", label:"📈 Reportes" },
    { id:"pagosTaller", label:"💳 Pagos" },
    { id:"vehiculos", label:"🚗 Vehículos" }
  ];

  const modules = user.rolGlobal === "superadmin"
    ? [...baseModules, ...adminModules]
    : baseModules;

  sidebar.innerHTML = modules.map(m =>
    `<button onclick="loadModule('${m.id}')">${m.label}</button>`
  ).join("");

}

/* ================= LOADER PRO ================= */
window.loadModule = async function(name) {

  const container = document.getElementById("appContainer");

  container.innerHTML = `
    <div style="text-align:center; margin-top:60px;">
      <p style="font-size:20px;">🔄 Cargando ${name}...</p>
    </div>
  `;

  try {

    console.log("📦 Loading:", name);

    const module = await import(`./js/modules/${name}.js`);

    const mod = module.default || module;

    if (typeof mod === "function") {

      await mod(container, {
        uid: localStorage.getItem("uid"),
        empresaId: localStorage.getItem("empresaId"),
        rolGlobal: localStorage.getItem("rolGlobal")
      });

    } else {

      container.innerHTML = "❌ Módulo inválido";

    }

  } catch (e) {

    console.error("ERROR MODULO:", e);

    container.innerHTML = `
      <div style="color:red; text-align:center;">
        <h2>❌ Error cargando módulo</h2>
        <p>${name}</p>
        <pre>${e.message}</pre>
      </div>
    `;
  }

};

/* ================= LOGOUT ================= */
document.getElementById("logoutBtn").onclick = async () => {
  await signOut(auth);
  localStorage.clear();
  window.location.href = "/login.html";
};

</script>

<!-- Charts -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</body>
</html>
