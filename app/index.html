<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TallerPRO360 ERP</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#16a34a">

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#0f172a;
  color:white;
  display:flex;
  height:100vh;
  overflow:hidden;
}

/* MAIN CONTAINER */
#appContent{
  flex:1;
  padding:0;
  display:flex;
  width:100%;
  height:100%;
}

/* BOTÓN SALIR */
#btnSalir{
  margin-top:20px;
  background:#dc2626;
  border:none;
  padding:10px;
  border-radius:6px;
  color:white;
  cursor:pointer;
}

/* CARD */
.card{
  background:#020617;
  padding:20px;
  border-radius:10px;
  border:1px solid #1e293b;
  text-align:center;
}
</style>
</head>

<body>

<div id="appContent">
  <div style="flex:1;display:flex;justify-content:center;align-items:center;">
    <div class="card">
      <h2>Bienvenido a TallerPRO360</h2>
      <p>ERP Inteligente para talleres automotrices.</p>
      <button id="btnSalir">Salir</button>
    </div>
  </div>
</div>

<!-- SCRIPT PRINCIPAL DEL PANEL -->
<script type="module">
import { panel } from "./js/panel.js";

const userId = localStorage.getItem("uid");

// Si hay sesión activa, cargar panel, si no enviar a login
if(userId){
  const appContainer = document.getElementById("appContent");
  appContainer.innerHTML = ""; // Limpiar mensaje de bienvenida
  panel(appContainer, userId);
} else {
  window.location.href = "./login.html";
}

// Botón salir
document.getElementById("btnSalir")?.addEventListener("click",()=>{
  localStorage.removeItem("uid");
  localStorage.removeItem("empresaId");
  window.location.href = "./login.html";
});
</script>

<!-- PWA -->
<script>
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("./service-worker.js")
    .then(()=>console.log("📱 PWA activa"))
    .catch(e=>console.log("SW error",e));
}
</script>

</body>
</html>
