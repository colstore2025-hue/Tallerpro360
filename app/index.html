<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TallerPRO360 · Nexus-X Enterprise</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root { --neon-cyan: #00ffff; --dark-bg: #050a14; --sidebar-bg: #0a0f1d; }
        body { margin:0; font-family:'Inter', sans-serif; background: var(--dark-bg); color:#cbd5e1; overflow: hidden; }
        
        header { 
            background: var(--sidebar-bg); padding:10px 24px; display:flex; justify-content:space-between; 
            align-items:center; border-bottom: 1px solid #1e293b; z-index: 100; position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        #mainLayout { display:flex; height:calc(100vh - 60px); }
        
        #sidebar { width:250px; background: var(--sidebar-bg); display:flex; flex-direction:column; padding:20px 12px; border-right: 1px solid #1e293b; transition: all 0.3s ease; }
        
        #appContainer { flex:1; padding:20px; overflow-y:auto; background: radial-gradient(circle at 50% 0%, #111827, #050a14); position: relative; }
        
        .nav-link { 
            display: flex; align-items: center; gap: 12px; padding: 10px 15px; border-radius: 14px; 
            color: #64748b; font-size: 13px; font-weight: 600; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent; margin-bottom: 4px; text-decoration: none;
        }
        .nav-link i { font-size: 16px; width: 20px; text-align: center; }
        .nav-link:hover { background: rgba(255,255,255,0.03); color: white; }
        .nav-link.active { 
            background: rgba(0, 255, 255, 0.05); color: var(--neon-cyan); 
            border: 1px solid rgba(0, 255, 255, 0.15); box-shadow: 0 0 15px rgba(0, 255, 255, 0.05);
        }

        .spinner { width: 44px; height: 44px; border: 3px solid rgba(0,255,255,0.05); border-top-color: var(--neon-cyan); border-radius: 50%; animation: spin 0.7s cubic-bezier(0.5, 0.1, 0.4, 0.9) infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>

<body>

<header>
    <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-gradient-to-br from-cyan-500 to-blue-700 rounded-xl flex items-center justify-center shadow-[0_0_20px_rgba(6,182,212,0.3)]">
            <i class="fas fa-microchip text-white text-lg"></i>
        </div>
        <div>
            <h1 class="text-md font-black text-white leading-none tracking-tighter uppercase">PRO360 <span class="text-cyan-400 font-light">Core</span></h1>
            <span class="text-[8px] text-slate-500 font-bold uppercase tracking-[0.3em]">Nexus-X Starlink</span>
        </div>
    </div>
    
    <div class="flex items-center gap-6">
        <div class="hidden md:block text-right">
            <p id="userName" class="text-xs font-black text-white m-0 tracking-tighter uppercase font-mono italic">Syncing...</p>
            <p id="userRole" class="text-[9px] text-cyan-500/80 uppercase font-black tracking-widest italic leading-none">Access Level</p>
        </div>
        <button id="logoutBtn" class="w-10 h-10 rounded-full bg-slate-800/50 hover:bg-red-500/20 text-slate-400 hover:text-red-500 transition-all flex items-center justify-center border border-slate-700 active:scale-90">
            <i class="fas fa-power-off"></i>
        </button>
    </div>
</header>

<div id="mainLayout">
    <nav id="sidebar">
        <p class="text-[9px] font-black text-slate-600 uppercase tracking-[4px] mb-6 px-4 italic">Operaciones</p>
        <div id="navMenu" class="space-y-1">
            <a href="#dashboard" class="nav-link active"><i class="fas fa-th-large"></i> Dashboard</a>
            <a href="#ordenes" class="nav-link"><i class="fas fa-clipboard-list"></i> Órdenes</a>
            <a href="#inventario" class="nav-link"><i class="fas fa-boxes"></i> Inventario</a>
            <a href="#clientes" class="nav-link"><i class="fas fa-users"></i> Clientes</a>
            <a href="#pagos" class="nav-link"><i class="fas fa-credit-card"></i> Recaudos</a>
            <a href="#contabilidad" class="nav-link"><i class="fas fa-chart-pie"></i> Finanzas</a>
            <a href="#gerencia" class="nav-link text-yellow-500"><i class="fas fa-brain text-yellow-500"></i> IA Gerente</a>
        </div>
        
        <div class="mt-auto pt-6 border-t border-slate-800/50 px-4">
            <a href="#configuracion" class="nav-link mb-4"><i class="fas fa-cog"></i> Configuración</a>
            <div class="bg-cyan-500/5 p-3 rounded-2xl border border-cyan-500/10 text-center">
                <p class="text-[8px] text-cyan-400 font-black uppercase tracking-widest mb-1">Status</p>
                <span class="text-[10px] text-slate-400 font-bold uppercase tracking-tighter italic">Cloud Active</span>
            </div>
        </div>
    </nav>

    <main id="appContainer">
        </main>
</div>

<script type="module">
    import { auth } from "./js/core/firebase-config.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const VERSION = "10.4.0";
    
    // MAPA DE RUTAS - Asegúrate que los nombres coincidan con tus archivos en js/modules/
    const routes = {
        dashboard:     () => import(`./js/modules/dashboard.js?v=${VERSION}`),
        ordenes:       () => import(`./js/modules/ordenes.js?v=${VERSION}`),
        inventario:    () => import(`./js/modules/inventario.js?v=${VERSION}`),
        clientes:      () => import(`./js/modules/clientes.js?v=${VERSION}`),
        pagos:         () => import(`./js/modules/pagosTaller.js?v=${VERSION}`),
        contabilidad:  () => import(`./js/modules/contabilidad.js?v=${VERSION}`),
        gerencia:      () => import(`./js/modules/gerenteAI.js?v=${VERSION}`),
        configuracion: () => import(`./js/modules/config.js?v=${VERSION}`)
    };

    async function navigate(hash) {
        const container = document.getElementById("appContainer");
        const moduleName = hash.replace("#", "") || "dashboard";
        
        // Loader inter-módulo
        container.innerHTML = `
            <div class="flex flex-col items-center justify-center h-full animate-pulse">
                <div class="spinner mb-4"></div>
                <p class="text-[9px] font-black text-cyan-400 uppercase tracking-[0.3em]">Cargando ${moduleName}...</p>
            </div>`;

        // UI: Link activo
        document.querySelectorAll('.nav-link').forEach(link => {
            link.classList.toggle('active', link.getAttribute('href') === `#${moduleName}`);
        });

        try {
            if (!routes[moduleName]) throw new Error(`El módulo [${moduleName}] no existe en el Core.`);
            
            const module = await routes[moduleName]();
            const render = module.default;

            if (typeof render !== 'function') {
                throw new Error(`El módulo ${moduleName}.js debe tener un 'export default async function'`);
            }

            // RECUERDA: Este 'state' es el que hace que la app funcione.
            const state = {
                uid: localStorage.getItem("uid"),
                empresaId: localStorage.getItem("empresaId") || "TALLER_DEMO_NEXUS",
                rol: localStorage.getItem("rol") || "ADMIN",
                version: VERSION
            };

            container.innerHTML = ""; 
            // Inyectamos el módulo
            await render(container, state);
            
        } catch (err) {
            console.error("🔥 Error Nexus-X:", err);
            container.innerHTML = `
                <div class="flex flex-col items-center justify-center h-full text-center">
                    <i class="fas fa-exclamation-triangle text-yellow-500 text-4xl mb-4"></i>
                    <h2 class="text-white font-black uppercase text-xs">Error de Sincronización</h2>
                    <p class="text-slate-500 text-[10px] mt-2 italic">${err.message}</p>
                    <button onclick="location.hash='#dashboard'; location.reload();" class="mt-8 bg-cyan-500 text-black px-10 py-3 rounded-full text-[10px] font-black uppercase tracking-widest active:scale-95 shadow-lg">Reiniciar Protocolo</button>
                </div>`;
        }
    }

    // Seguridad de Sesión
    onAuthStateChanged(auth, (user) => {
        if (user) {
            localStorage.setItem("uid", user.uid);
            // Sincronizar Info de Usuario en UI
            document.getElementById("userName").innerText = user.displayName || user.email.split('@')[0];
            document.getElementById("userRole").innerText = localStorage.getItem("rol") || "LEVEL: OWNER";
            
            // Cargar Dashboard por defecto
            navigate(window.location.hash || "#dashboard");
        } else {
            // Si no hay usuario, fuera.
            window.location.href = "../login.html"; 
        }
    });

    // Escuchas de Navegación
    window.addEventListener("hashchange", () => navigate(window.location.hash));

    // Logout
    document.getElementById("logoutBtn").onclick = async () => {
        if(confirm("¿Confirmas cierre de sesión en Nexus-X?")) {
            await signOut(auth);
            localStorage.clear();
            window.location.href = "../login.html";
        }
    };
</script>

</body>
</html>
