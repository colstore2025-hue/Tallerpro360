<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TallerPRO360 - ERP + IA + CRM</title>

  <!-- Estilos globales -->
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0b0c17;
      color: #fff;
      overflow: hidden;
    }

    h1, h2, h3 {
      text-shadow: 0 0 8px #00ffcc;
    }

    button {
      width: 100%;
      margin: 6px 0;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #0f172a;
      color: #00ffcc;
      cursor: pointer;
      transition: 0.3s;
      font-weight: bold;
    }

    button:hover {
      background: #00ffcc;
      color: #000;
      box-shadow: 0 0 10px #00ffcc;
    }

    /* Loader global */
    #globalLoader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #0b0c17;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      color: #00ffcc;
      font-size: 20px;
    }
  </style>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

  <!-- Loader inicial -->
  <div id="globalLoader">⚡ Iniciando TallerPRO360...</div>

  <!-- App Root -->
  <div id="app"></div>

  <!-- Firebase INIT GLOBAL -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAdk-s-OXu57MiobzRGBRu-TlF2KYeicWQ",
      authDomain: "tallerpro360.firebaseapp.com",
      projectId: "tallerpro360",
      storageBucket: "tallerpro360.firebasestorage.app",
      messagingSenderId: "636224778184",
      appId: "1:636224778184:web:9bd7351b6458a1ef625afd",
      measurementId: "G-VEC2C0QX2G"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Hacer global para todos los módulos
    window.db = db;
  </script>

  <!-- APP LOADER -->
  <script type="module">
    import { initApp } from "./js/system/moduleLoader.js";

    async function startApp() {
      try {
        await initApp();

        // Ocultar loader
        document.getElementById("globalLoader").style.display = "none";

      } catch (error) {
        console.error("Error iniciando app:", error);
        document.getElementById("globalLoader").innerHTML =
          "❌ Error cargando ERP";
      }
    }

    startApp();
  </script>

</body>
</html>
