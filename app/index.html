<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TallerPRO360 · ERP SaaS</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root { --neon-cyan: #00ffff; --dark-bg: #0b1220; --sidebar-bg: #0f172a; }
        body { margin:0; font-family:'Inter', sans-serif; background: var(--dark-bg); color:#cbd5e1; overflow: hidden; }
        
        header { 
            background: var(--sidebar-bg); padding:12px 24px; display:flex; justify-content:space-between; 
            align-items:center; border-bottom: 1px solid #1e293b; z-index: 100; position: relative;
        }

        #mainLayout { display:flex; height:calc(100vh - 65px); }
        
        #sidebar { width:260px; background: var(--sidebar-bg); display:flex; flex-direction:column; padding:20px 15px; border-right: 1px solid #1e293b; }
        
        #appContainer { flex:1; padding:20px; overflow-y:auto; background: radial-gradient(circle at 50% 0%, #161e2e, #0b1220); position: relative; }
        
        .nav-link { 
            display: flex; items-center; gap: 10px; padding: 12px 15px; border-radius: 12px; 
            color: #94a3b8; font-size: 13px; font-weight: 600; transition: all 0.3s; 
        }
        .nav-link:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-link.active { background: rgba(0, 255, 255, 0.1); color: var(--neon-cyan); border-left: 3px solid var(--neon-cyan); }

        /* Loader Neón */
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(0,255,255,0.1); border-top-color: var(--neon-cyan); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>

<body>

<header>
    <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-gradient-to-br from-cyan-500 to-blue-600 rounded-lg flex items-center justify-center shadow-[0_0_15px_rgba(6,182,212,0.4)]">
            <i class="fas fa-car-wrench text-white text-sm"></i>
        </div>
        <div>
            <h1 class="text-md font-black text-white leading-none tracking-tighter">TallerPRO360</h1>
            <span class="text-[9px] text-cyan-400 font-bold uppercase tracking-[0.2em]">Enterprise Cloud</span>
        </div>
    </div>
    
    <div class="flex items-center gap-5">
        <div class="hidden sm:block text-right">
            <p id="userName" class="text-xs font-bold text-white m-0">Iniciando...</p>
            <p id="userRole" class="text-[9px] text-slate-500 uppercase font-black">Verificando Rol</p>
        </div>
        <button id="logoutBtn" class="text-slate-500 hover:text-red-500 transition-colors">
            <i class="fas fa-power-off text-lg"></i>
        </button>
    </div>
</header>

<div id="mainLayout">
    <nav id="sidebar">
        <p class="text-[9px] font-black text-slate-600 uppercase tracking-[3px] mb-4 px-4">Navegación</p>
        <div class="space-y-1">
            <a href="#dashboard" class="nav-link"><i class="fas fa-chart-pie w-5"></i> Dashboard</a>
            <a href="#ordenes" class="nav-link"><i class="fas fa-file-invoice w-5"></i> Órdenes</a>
            <a href="#clientes" class="nav-link"><i class="fas fa-users w-5"></i> Clientes</a>
            <a href="#contabilidad" class="nav-link"><i class="fas fa-wallet w-5"></i> Contabilidad</a>
            <a href="#configuracion" class="nav-link"><i class="fas fa-cog w-5"></i> Ajustes</a>
        </div>
    </nav>

    <main id="appContainer">
        <div id="boot-loader" class="flex flex-col items-center justify-center h-full pt-40">
            <div class="spinner mb-4"></div>
            <h2 class="text-white font-bold tracking-widest text-sm uppercase animate-pulse">Sincronizando Nexus-X</h2>
        </div>
    </main>
</div>

<script type="module">
    // 💡 IMPORTACIÓN DEL CORE ÚNICO
    import { auth } from "./js/core/firebase-config.js?v=10.2";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    // Mapeo de módulos para carga bajo demanda (Económico)
    const routes = {
        dashboard: () => import("./js/modules/dashboard.js?v=10.2"),
        ordenes: () => import("./js/modules/ordenes.js?v=10.2"),
        contabilidad: () => import("./js/modules/contabilidad.js?v=10.2"),
        configuracion: () => import("./js/modules/config.js?v=10.2"),
        clientes: () => import("./js/modules/clientes.js?v=10.2")
    };

    async function navigate(hash) {
        const container = document.getElementById("appContainer");
        const moduleName = hash.replace("#", "") || "dashboard";
        
        // 1. Loader visual (UX de calidad)
        container.innerHTML = `<div class="flex items-center justify-center h-full"><div class="spinner"></div></div>`;

        // 2. Marcar botón activo en sidebar
        document.querySelectorAll('.nav-link').forEach(link => {
            link.classList.toggle('active', link.getAttribute('href') === `#${moduleName}`);
        });

        try {
            if (!routes[moduleName]) throw new Error("Módulo no disponible");
            
            // 3. Importación dinámica (Eficacia)
            const module = await routes[moduleName]();
            const render = module.default;

            const state = {
                uid: localStorage.getItem("uid"),
                empresaId: localStorage.getItem("empresaId") || "taller_001",
                rol: localStorage.getItem("rol") || "admin"
            };

            container.innerHTML = ""; // Limpiamos loader
            await render(container, state);
            
            console.log(`✅ Módulo [${moduleName}] cargado.`);
        } catch (err) {
            console.error("🔥 Error de navegación:", err);
            container.innerHTML = `<div class="p-10 text-center text-red-400 font-bold">⚠️ Error al cargar ${moduleName}.<br><small class="text-slate-500">${err.message}</small></div>`;
        }
    }

    // --- INICIALIZACIÓN ---
    onAuthStateChanged(auth, (user) => {
        if (user) {
            console.log("👤 Sesión Activa:", user.email);
            document.getElementById("userName").innerText = user.displayName || "Usuario";
            document.getElementById("userRole").innerText = localStorage.getItem("rol") || "ADMIN";
            
            // Si hay un hash en la URL lo usamos, si no, vamos al dashboard
            navigate(window.location.hash || "#dashboard");
        } else {
            console.warn("🚫 Sin sesión. Redirigiendo...");
            window.location.href = "../login.html"; // Ajustar ruta según tu carpeta
        }
    });

    // Escuchadores de cambio de ruta
    window.addEventListener("hashchange", () => navigate(window.location.hash));

    // Botón de salida
    document.getElementById("logoutBtn").onclick = () => {
        signOut(auth).then(() => window.location.href = "../login.html");
    };
</script>

</body>
</html>
