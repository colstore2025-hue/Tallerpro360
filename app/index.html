<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>TallerPRO360 ERP</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

#loader{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

.spinner{
width:50px;
height:50px;
border:5px solid #1e293b;
border-top:5px solid #10b981;
border-radius:50%;
animation:giro 1s linear infinite;
margin-bottom:20px;
}

@keyframes giro{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>

</head>

<body>

<div id="appContent">

<div id="loader">

<div class="spinner"></div>

<h2>Cargando TallerPRO360</h2>
<p>Inicializando sistema ERP</p>

</div>

</div>

<script type="module">

import { iniciarApp } from "/app/js/core/app-init.js";

document.addEventListener("DOMContentLoaded",async()=>{

console.log("🚀 iniciando sistema");

await iniciarApp();

});

</script>

</body>
</html>
