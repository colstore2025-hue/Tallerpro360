<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>TallerPRO360 ERP</title>

<link rel="manifest" href="../manifest.json">

<meta name="theme-color" content="#16a34a">

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#020617;
padding:20px;
border-right:1px solid #1e293b;
}

.sidebar h2{
color:#38bdf8;
margin-bottom:30px;
}

.sidebar button{

display:block;
width:100%;
margin:8px 0;
padding:12px;
background:#0f172a;
border:1px solid #1e293b;
color:white;
cursor:pointer;
border-radius:8px;

}

.sidebar button:hover{
background:#1e293b;
}

/* PANEL */

.main{
flex:1;
padding:30px;
overflow:auto;
}

.card{
background:#020617;
padding:20px;
margin-bottom:20px;
border-radius:10px;
border:1px solid #1e293b;
}

</style>

</head>


<body>


<!-- SIDEBAR -->

<div class="sidebar">

<h2>TallerPRO360</h2>

<button onclick="loadModule('dashboard')">Dashboard</button>

<button onclick="loadModule('ordenes')">Órdenes</button>

<button onclick="loadModule('clientes')">Clientes</button>

<button onclick="loadModule('inventario')">Inventario</button>

<button onclick="loadModule('finanzas')">Finanzas</button>

<button onclick="loadModule('pagos')">Pagos</button>

<button onclick="loadModule('ia')">IA Mecánica</button>

<button onclick="loadModule('ceo')">CEO Panel</button>

<button onclick="logout()">Salir</button>

</div>



<!-- CONTENIDO -->

<div class="main" id="contenido">

<div class="card">

<h2>Bienvenido a TallerPRO360</h2>

<p>ERP Inteligente para talleres automotrices.</p>

</div>

</div>



<!-- APP SCRIPT -->

<script type="module">

import { auth } from "./js/core/firebase-config.js";

import {

onAuthStateChanged,
signOut

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


// ============================
// VALIDAR LOGIN
// ============================

onAuthStateChanged(auth,(user)=>{

if(!user){

window.location.href="../login.html";

return;

}

console.log("Usuario activo:",user.email);

});


// ============================
// LOGOUT
// ============================

window.logout=async function(){

await signOut(auth);

localStorage.clear();

window.location.href="../login.html";

}


// ============================
// SERVICE WORKER
// ============================

if("serviceWorker" in navigator){

navigator.serviceWorker.register("../service-worker.js")

.then(()=>{

console.log("PWA activa");

});

}


// ============================
// CARGAR MODULOS
// ============================

window.loadModule=function(modulo){

const contenido=document.getElementById("contenido");

contenido.innerHTML="Cargando módulo...";

switch(modulo){

case "dashboard":
dashboardModule();
break;

case "ordenes":
ordenesModule();
break;

case "clientes":
clientesModule();
break;

case "inventario":
inventarioModule();
break;

case "finanzas":
finanzasModule();
break;

case "pagos":
pagosModule();
break;

case "ceo":
ceoModule();
break;

case "ia":
iaModule();
break;

}

}

</script>



<!-- IA GLOBAL -->

<script src="./js/dashboardIA.js"></script>

<script src="./js/motorIAglobal.js"></script>

<script src="./js/cotizacionIA.js"></script>

<script src="./js/workshopBrain.js"></script>

<script src="./js/autoPartsAI.js"></script>

<script src="./js/customerRetentionAI.js"></script>

<script src="./js/workshopRevenueOptimizer.js"></script>

<script src="./js/globalDiagnosticsAI.js"></script>

<script src="./js/workshopRankingAI.js"></script>

<script src="./js/superAI-orchestrator.js"></script>

<script src="./js/predictiveMaintenance.js"></script>

<script src="./js/pricingAI.js"></script>

<script src="./js/voiceAssistant.js"></script>



<!-- MODULOS ERP -->

<script src="./modules/dashboard.js"></script>

<script src="./modules/ordenes.js"></script>

<script src="./modules/clientes.js"></script>

<script src="./modules/inventario.js"></script>

<script src="./modules/finanzas.js"></script>

<script src="./modules/pagos.js"></script>

<script src="./modules/ceo.js"></script>

<script src="./modules/ia.js"></script>



</body>
</html>
