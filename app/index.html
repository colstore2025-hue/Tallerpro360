<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TallerPRO360 · ERP SaaS</title>
  <meta name="description" content="ERP SaaS para talleres automotrices · Dashboard, Órdenes, Clientes, Inventario, IA">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <style>
    body { background:#0f172a; font-family:Inter,system-ui; color:#cbd5e1; margin:0; }
    header { background:#111827; padding:10px 20px; display:flex; justify-content:space-between; align-items:center; }
    #menu button { margin-right:5px; background:#1f2937; padding:6px 10px; border:none; border-radius:6px; cursor:pointer; color:#0ff; transition:0.2s; }
    #menu button:hover { background:#0ff; color:#111; }
    #appContainer { padding:20px; min-height:calc(100vh - 60px); }
  </style>
</head>
<body>

  <!-- HEADER + MENÚ -->
  <header>
    <div>
      <h1 class="text-2xl font-bold text-emerald-400">TallerPRO360 · ERP SaaS</h1>
    </div>
    <div id="menu"></div>
    <button id="logoutBtn" class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded">Cerrar sesión</button>
  </header>

  <!-- CONTENEDOR PRINCIPAL -->
  <main id="appContainer"></main>

  <!-- FIREBASE CORE -->
  <script type="module" src="./js/core/firebase-config.js"></script>

  <!-- APP INIT -->
  <script type="module" src="./js/core/app-init.js"></script>

  <!-- CHARTS -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
</body>
</html>
