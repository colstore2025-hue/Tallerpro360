<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TallerPRO360 · ERP SaaS</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root { --neon-cyan: #00ffff; --dark-bg: #0b1220; --sidebar-bg: #0f172a; }
        body { margin:0; font-family:'Inter', system-ui, sans-serif; background: var(--dark-bg); color:#cbd5e1; overflow: hidden; }
        
        header { 
            background: var(--sidebar-bg); padding:14px 24px; display:flex; justify-content:space-between; 
            align-items:center; border-bottom: 1px solid #1e293b; z-index: 100; position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        #mainLayout { display:flex; height:calc(100vh - 70px); }
        
        #sidebar { width:260px; background: var(--sidebar-bg); display:flex; flex-direction:column; padding:20px 15px; border-right: 1px solid #1e293b; overflow-y: auto; }
        
        /* Contenedor de módulos dinámico */
        #appContainer { flex:1; padding:25px; overflow-y:auto; background: radial-gradient(circle at 50% 0%, #161e2e, #0b1220); position: relative; }
        
        /* Scrollbar Neón */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--sidebar-bg); }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-spin-custom { animation: spin 1s linear infinite; }
        .fade-out { opacity: 0; transition: opacity 0.4s ease; pointer-events: none; }

        /* Estilo para botones activos en el menú */
        .menu-btn-active { color: var(--neon-cyan) !important; background: rgba(0, 255, 255, 0.05) !important; border-left: 3px solid var(--neon-cyan) !important; }
    </style>
</head>

<body>

<header>
    <div style="display:flex; align-items:center; gap:12px;">
        <div style="width:38px; height:38px; background: linear-gradient(135deg, #06b6d4, #0891b2); border-radius:10px; display:flex; align-items:center; justify-content:center; box-shadow: 0 0 15px rgba(6, 182, 212, 0.3);">
            <i class="fas fa-car-wrench text-white"></i>
        </div>
        <div>
            <h1 class="text-lg font-bold text-white leading-none tracking-tighter">TallerPRO360</h1>
            <span class="text-[10px] text-cyan-400 font-black uppercase tracking-widest">Enterprise Cloud</span>
        </div>
    </div>
    
    <div style="display:flex; align-items:center; gap:24px;">
        <div style="text-align: right;" class="hidden sm:block">
            <p id="userName" style="font-size:13px; font-weight:700; color:white; margin:0;">Cargando...</p>
            <p id="userRole" style="font-size:10px; color:#64748b; margin:0; text-transform: uppercase;">Rol</p>
        </div>
        <button id="logoutBtn" class="bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white px-4 py-2 rounded-xl text-xs font-bold transition-all border border-red-500/20">
            <i class="fas fa-power-off"></i>
        </button>
    </div>
</header>

<div id="mainLayout">
    <nav id="sidebar">
        <p style="color:#475569; font-size:9px; font-weight:900; margin-bottom:15px; padding-left:15px; letter-spacing:3px; text-transform: uppercase;">Módulos</p>
        <div id="menuItems" class="space-y-1">
            </div>
    </nav>

    <main id="appContainer">
        <div id="boot-loader" class="text-center mt-[25vh] transition-opacity duration-500">
            <div class="inline-block w-12 h-12 border-[3px] border-cyan-500/10 border-t-cyan-400 rounded-full animate-spin-custom mb-6"></div>
            <h2 id="boot-text" class="text-xl text-white font-bold tracking-tight">🚀 Inicializando Nexus-X</h2>
            <p id="boot-subtext" class="text-slate-500 text-xs mt-2 font-medium">Validando seguridad App Check y Sesión...</p>
        </div>
    </main>
</div>

<script type="module">
    // Importamos las piezas básicas
    import { auth } from "./js/core/firebase-config.js?v=2.0";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import dashboard from "./js/modules/dashboard.js?v=2.0";

    async function startSystem() {
        const container = document.getElementById("appContainer");
        const loader = document.getElementById("boot-loader");
        
        console.log("🚀 Iniciando Secuencia de Despegue...");

        // 1. SEGURO DE VIDA: Si en 3 segundos nada pasa, borramos el cohete a la fuerza
        const forcedEntry = setTimeout(() => {
            if (document.getElementById("boot-loader")) {
                console.warn("⚠️ Timeout: Forzando visibilidad del Dashboard");
                limpiarYEntrar();
            }
        }, 3000);

        // 2. ESCUCHA DE SESIÓN
        onAuthStateChanged(auth, (user) => {
            if (user) {
                console.log("✅ Usuario detectado:", user.email);
                clearTimeout(forcedEntry);
                limpiarYEntrar(user);
            } else {
                console.warn("❌ Sin sesión activa. Al login...");
                window.location.href = "login.html";
            }
        });

        async function limpiarYEntrar(user = null) {
            // Borramos el loader
            const l = document.getElementById("boot-loader");
            if (l) l.remove();

            // Pintamos los datos en el header (si los hay)
            if (user) {
                document.getElementById("userName").innerText = user.displayName || "William";
                document.getElementById("userRole").innerText = "ADMIN";
            }

            // CARGAMOS EL DASHBOARD
            try {
                // Pasamos los datos mínimos para que el dashboard no explote
                const state = { 
                    uid: user?.uid || "manual", 
                    empresaId: "taller_001", 
                    nombre: user?.displayName || "William" 
                };
                dashboard(container, state);
                console.log("🏁 Dashboard Renderizado");
            } catch (err) {
                console.error("🔥 Error cargando el dashboard:", err);
                container.innerHTML = `<div class="p-10 text-white">Error en Dashboard: ${err.message}</div>`;
            }
        }
    }

    // Arrancamos
    startSystem();
</script>

</body>
</html>
