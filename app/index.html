<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>TallerPRO360 ERP</title>

<meta name="description" content="ERP SaaS para talleres automotrices">

<style>

body{
margin:0;
font-family:Inter,system-ui,Arial;
background:#0f172a;
color:white;
}

/* loader */

#loader{
display:flex;
align-items:center;
justify-content:center;
height:100vh;
flex-direction:column;
gap:20px;
}

.spinner{
width:40px;
height:40px;
border:4px solid #1e293b;
border-top:4px solid #10b981;
border-radius:50%;
animation:girar 1s linear infinite;
}

@keyframes girar{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

</style>

</head>


<body>


<!-- CONTENEDOR ERP -->

<div id="appContent">

<div id="loader">

<div class="spinner"></div>

<h2>Cargando TallerPRO360...</h2>

<p style="color:#94a3b8;font-size:14px">
Inicializando sistema ERP
</p>

</div>

</div>



<!-- ==============================
BOOT DEL ERP
============================== -->

<script type="module">

import { iniciarApp } from "./js/core/app-init.js";


/* ====================================
ARRANQUE DEL SISTEMA
==================================== */

window.addEventListener("DOMContentLoaded", async ()=>{

console.log("🚀 boot erp iniciado");

try{

await iniciarApp();

}
catch(error){

console.error("❌ error iniciando sistema",error);

const container=document.getElementById("appContent");

container.innerHTML=`

<div style="
display:flex;
align-items:center;
justify-content:center;
height:100vh;
flex-direction:column;
">

<h2>Error iniciando el ERP</h2>

<p style="color:#94a3b8">
No se pudo cargar el sistema
</p>

<button
onclick="location.reload()"
style="
margin-top:20px;
padding:10px 20px;
background:#10b981;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
">

Reintentar

</button>

</div>

`;

}

});

</script>


</body>
</html>
