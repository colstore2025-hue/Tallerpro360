<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>TallerPRO360</title>

<link rel="manifest" href="../manifest.json">

<script src="../service-worker.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{

width:240px;
background:#020617;
padding:20px;
border-right:1px solid #1e293b;
}

.sidebar h2{
color:#38bdf8;
margin-bottom:30px;
}

.sidebar button{

display:block;
width:100%;
margin:8px 0;
padding:12px;
background:#0f172a;
border:1px solid #1e293b;
color:white;
cursor:pointer;
border-radius:8px;

}

.sidebar button:hover{

background:#1e293b;

}

/* PANEL */

.main{

flex:1;
padding:30px;
overflow:auto;

}

.card{

background:#020617;
padding:20px;
margin-bottom:20px;
border-radius:10px;
border:1px solid #1e293b;

}

</style>

</head>


<body>


<!-- SIDEBAR -->

<div class="sidebar">

<h2>TallerPRO360</h2>

<button onclick="loadModule('dashboard')">Dashboard</button>

<button onclick="loadModule('ordenes')">Ordenes</button>

<button onclick="loadModule('clientes')">Clientes</button>

<button onclick="loadModule('inventario')">Inventario</button>

<button onclick="loadModule('finanzas')">Finanzas</button>

<button onclick="loadModule('pagos')">Pagos</button>

<button onclick="loadModule('ia')">IA Mecánica</button>

<button onclick="loadModule('ceo')">CEO Panel</button>

</div>



<!-- CONTENIDO -->

<div class="main" id="contenido">

<div class="card">

<h2>Bienvenido a TallerPRO360</h2>

<p>ERP Inteligente para talleres automotrices.</p>

</div>

</div>



<!-- FIREBASE -->

<script src="app/js/firebase-config.js"></script>



<!-- IA GLOBAL -->

<script src="app/js/dashboardIA.js"></script>

<script src="app/js/motorIAglobal.js"></script>

<script src="app/js/cotizacionIA.js"></script>

<script src="app/js/workshopBrain.js"></script>

<script src="app/js/autoPartsAI.js"></script>

<script src="app/js/customerRetentionAI.js"></script>

<script src="app/js/workshopRevenueOptimizer.js"></script>

<script src="app/js/globalDiagnosticsAI.js"></script>

<script src="app/js/workshopRankingAI.js"></script>

<script src="app/js/superAI-orchestrator.js"></script>

<script src="app/js/predictiveMaintenance.js"></script>

<script src="app/js/pricingAI.js"></script>

<script src="app/js/voiceAssistant.js"></script>



<!-- MODULOS ERP -->

<script src="modules/dashboard.js"></script>

<script src="modules/ordenes.js"></script>

<script src="modules/clientes.js"></script>

<script src="modules/inventario.js"></script>

<script src="modules/finanzas.js"></script>

<script src="modules/pagos.js"></script>

<script src="modules/ceo.js"></script>

<script src="modules/ia.js"></script>



<script>

function loadModule(modulo){

const contenido=document.getElementById("contenido");

contenido.innerHTML="Cargando...";

switch(modulo){

case "dashboard":
dashboardModule();
break;

case "ordenes":
ordenesModule();
break;

case "clientes":
clientesModule();
break;

case "inventario":
inventarioModule();
break;

case "finanzas":
finanzasModule();
break;

case "pagos":
pagosModule();
break;

case "ceo":
ceoModule();
break;

case "ia":
iaModule();
break;

}

}

</script>


</body>
</html>
