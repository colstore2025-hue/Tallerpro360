  <style>
    body {
      margin: 0;

      color: #fff;

    .card {
      background: #111827;
      padding: 20px;

      margin-bottom: 15px;
      box-shadow: 0 0 10px rgba(0,255,153,0.3);
    }
    #kpiContainer {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      margin-top: 30px;
    }
    .kpiCard {
      text-align: center;
      padding: 20px;

      font-size: 18px;

    canvas {
