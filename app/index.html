<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TallerPRO360 · ERP SaaS</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body { 
      background:#0f172a; 
      font-family:Inter,system-ui; 
      color:#cbd5e1; 
      margin:0; 
    }
    header { 
      background:#111827; 
      padding:10px 20px; 
      display:flex; 
      justify-content:space-between; 
      align-items:center; 
    }
    #logoutBtn { 
      background:#ef4444; 
      padding:6px 12px; 
      border-radius:6px; 
      font-weight:bold; 
      cursor:pointer; 
      transition:.2s; 
    }
    #logoutBtn:hover { background:#dc2626; }

    /* Layout lateral */
    #appWrapper {
      display:flex;
      height:calc(100vh - 60px);
    }

    #menu {
      width:220px;
      background:#111827;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding-top:20px;
      gap:20px;
    }

    #menu button {
      background:#1f2937; 
      padding:12px 20px; 
      border:none; 
      border-radius:10px; 
      cursor:pointer; 
      color:#0ff; 
      font-size:18px;
      font-weight:bold;
      width:90%;
      text-align:center;
      transition:.2s;
    }

    #menu button:hover { 
      background:#0ff; 
      color:#111; 
      transform:scale(1.05);
    }

    #appContainer {
      flex:1;
      padding:30px;
      overflow-y:auto;
    }
  </style>
</head>

<body>

<header>
  <h1 class="text-2xl font-bold text-emerald-400">TallerPRO360</h1>
  <button id="logoutBtn">Salir</button>
</header>

<div id="appWrapper">
  <!-- MENÚ LATERAL -->
  <div id="menu">
    <p class="text-slate-400">Cargando menú...</p>
  </div>

  <!-- CONTENEDOR DE MÓDULOS -->
  <main id="appContainer">
    <p class="text-slate-400">Cargando sistema...</p>
  </main>
</div>

<script type="module">

/* ================== CORE FIREBASE ================== */
import { auth, db } from "./js/core/firebase-config.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ================== AUTH ================== */
onAuthStateChanged(auth, async (user)=>{

  const container = document.getElementById("appContainer");
  console.log("🔥 Auth:", user);

  if(!user){
    window.location.href = "/login.html";
    return;
  }

  try{
    container.innerHTML = "🔄 Cargando usuario...";

    const snap = await getDoc(doc(db,"usuariosGlobal",user.uid));

    if(!snap.exists()){
      container.innerHTML = "❌ Usuario no autorizado";
      await signOut(auth);
      return;
    }

    const userData = snap.data();

    if(!userData.empresaId){
      container.innerHTML = "❌ Usuario sin empresaId";
      return;
    }

    // Guardar sesión
    localStorage.setItem("uid", user.uid);
    localStorage.setItem("empresaId", userData.empresaId);
    localStorage.setItem("rolGlobal", userData.rolGlobal || "user");

    // Iniciar app
    initApp(userData);

  }catch(e){
    console.error("ERROR INIT:", e);
    container.innerHTML = `<div style="color:red"><h2>❌ Error inicializando app</h2><pre>${e.message}</pre></div>`;
  }

});

/* ================== LOGOUT ================== */
document.getElementById("logoutBtn").onclick = async ()=>{
  await signOut(auth);
  localStorage.clear();
  window.location.href = "/login.html";
};

/* ================== INIT APP ================== */
function initApp(user){
  console.log("🚀 App lista");

  renderMenu(user);

  // Cargar dashboard por defecto
  loadModule("dashboard");
}

/* ================== MENÚ LATERAL ================== */
function renderMenu(user){
  const menu = document.getElementById("menu");

  let botones = [
    { id:"dashboard", label:"Dashboard" },
    { id:"ordenes", label:"Órdenes" },
    { id:"clientes", label:"Clientes" },
    { id:"inventario", label:"Inventario" },
    { id:"ia", label:"IA" }
  ];

  if(user.rolGlobal === "superadmin"){
    botones.push({ id:"ceo", label:"CEO AI" });
  }

  menu.innerHTML = botones.map(b =>
    `<button onclick="loadModule('${b.id}')">${b.label}</button>`
  ).join("");
}

/* ================== LOAD MODULE ================== */
window.loadModule = async function(name){
  const container = document.getElementById("appContainer");
  container.innerHTML = "🔄 Cargando módulo...";

  try{
    console.log("📦 Cargando módulo:", name);

    // Ruta correcta relativa a index.html
    const module = await import(`./js/modules/${name}.js`);
    const mod = module.default || module;

    if(typeof mod === "function"){
      await mod(container, {
        uid: localStorage.getItem("uid"),
        empresaId: localStorage.getItem("empresaId"),
        rolGlobal: localStorage.getItem("rolGlobal")
      });
    }else{
      container.innerHTML = "❌ Módulo inválido";
    }

  }catch(e){
    console.error("❌ ERROR MODULO:", e);
    container.innerHTML = `
      <h2 style="color:red">❌ Error cargando módulo</h2>
      <p><b>${name}</b></p>
      <pre>${e.message}</pre>
    `;
  }
};

</script>

<!-- Charts -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</body>
</html>
