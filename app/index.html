<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>TallerPRO360 ERP</title>

<link rel="manifest" href="./manifest.json">

<meta name="theme-color" content="#16a34a">

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#020617;
padding:20px;
border-right:1px solid #1e293b;
}

.sidebar h2{
color:#38bdf8;
margin-bottom:30px;
}

#menu button{
display:block;
width:100%;
margin:8px 0;
padding:12px;
background:#0f172a;
border:1px solid #1e293b;
color:white;
cursor:pointer;
border-radius:8px;
}

#menu button:hover{
background:#1e293b;
}

/* PANEL */

.main{
flex:1;
padding:30px;
overflow:auto;
}

.card{
background:#020617;
padding:20px;
margin-bottom:20px;
border-radius:10px;
border:1px solid #1e293b;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<h2>TallerPRO360</h2>

<div id="menu"></div>

<button onclick="logout()" style="margin-top:20px;background:#dc2626">
Salir
</button>

</div>

<!-- CONTENIDO -->

<div class="main">

<div id="appContent">

<div class="card">

<h2>Bienvenido a TallerPRO360</h2>

<p>ERP Inteligente para talleres automotrices.</p>

</div>

</div>

</div>

<!-- APP INIT -->

<script type="module">

import { iniciarApp } from "./js/core/app-init.js";
import { buildMenu, initRouter } from "./js/router.js";
import "./js/ai/superAI-orchestrator.js";

iniciarApp();
buildMenu();
initRouter();

</script>

<!-- LOGOUT -->

<script>

window.logout=function(){

localStorage.removeItem("uid");
localStorage.removeItem("empresaId");

window.location.href="/login.html";

}

</script>

<!-- SERVICE WORKER -->

<script>

if("serviceWorker" in navigator){

navigator.serviceWorker
.register("./service-worker.js")
.then(()=>{

console.log("PWA activa");

})
.catch(e=>{

console.log("SW error",e);

});

}

</script>

</body>
</html>
