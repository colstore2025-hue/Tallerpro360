<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TallerPRO360 · ERP SaaS</title>
<base href="/app/">

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body { margin:0; font-family:Inter,system-ui; background:#0b1220; color:#cbd5e1; }
header { background:#0f172a; padding:14px 24px; display:flex; justify-content:space-between; align-items:center; box-shadow:0 0 25px #000; }
#logoutBtn { background:#ef4444; color:#fff; padding:8px 16px; border-radius:10px; font-weight:bold; cursor:pointer; }
#mainLayout { display:flex; min-height:calc(100vh - 70px); }
#sidebar { width:260px; background:#0f172a; display:flex; flex-direction:column; align-items:center; padding-top:25px; }
#sidebar button { width:200px; margin:12px 0; padding:16px; border:none; border-radius:14px; font-size:18px; font-weight:700; cursor:pointer; color:#00ffff; background:#1e293b; }
#sidebar button:hover { background:#00ffff; color:#000; }
#appContainer { flex:1; padding:30px; overflow:auto; }
</style>
</head>

<body>
<header>
  <h1 class="text-2xl font-bold text-emerald-400">TallerPRO360</h1>
  <button id="logoutBtn">Salir</button>
</header>

<div id="mainLayout">
  <div id="sidebar"></div>
  <main id="appContainer">
    <div style="text-align:center;margin-top:80px;">
      <p style="font-size:22px;">🚀 Inicializando PRO360...</p>
      <p style="opacity:.6;">Cargando sistema...</p>
    </div>
  </main>
</div>

<!-- ================= INIT MODULE LOADER ================= -->
<script type="module">
  import { initApp } from "./js/system/moduleLoader.js";
  import { setStore } from "./js/core/store.js";

  // 1. Recuperar datos del almacenamiento local
  const state = {
    uid: localStorage.getItem("uid"),
    empresaId: localStorage.getItem("empresaId"),
    rolGlobal: localStorage.getItem("rol"),
    plan: localStorage.getItem("plan")
  };

  // 2. Si no hay sesión, abortar antes de cargar el CORE
  if (!state.uid || !state.empresaId) {
    window.location.href = "login.html";
  } else {
    // 3. Sincronizar con el Store global
    setStore("user", { uid: state.uid, rol: state.rolGlobal });
    setStore("empresa", { id: state.empresaId });
    
    // 4. Inyectar en ventana global para que el Sidebar funcione
    window.state = state; 

    // 5. Arrancar el motor ULTRA PRO360
    initApp(state);
  }

  // 6. Configurar botón de salida
  document.getElementById("logoutBtn")?.addEventListener("click", () => {
    localStorage.clear();
    window.location.href = "login.html";
  });
</script>

</body>
</html>
