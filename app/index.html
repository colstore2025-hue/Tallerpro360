<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>TallerPRO360 · Nexus-X Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --neon-cyan: #00ffff; --dark-bg: #050a14; --sidebar-bg: #0a0f1d; }
        body { margin:0; font-family:'Inter', sans-serif; background: var(--dark-bg); color:#cbd5e1; overflow: hidden; }
        header { background: var(--sidebar-bg); padding:10px 24px; display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid #1e293b; z-index: 100; position: relative; }
        #mainLayout { display:flex; height:calc(100vh - 60px); }
        #sidebar { width:250px; background: var(--sidebar-bg); display:flex; flex-direction:column; padding:20px 12px; border-right: 1px solid #1e293b; transition: all 0.3s ease; }
        #appContainer { flex:1; padding:20px; overflow-y:auto; background: radial-gradient(circle at 50% 0%, #111827, #050a14); }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 15px; border-radius: 14px; color: #64748b; font-size: 13px; font-weight: 600; transition: 0.2s; margin-bottom: 4px; text-decoration: none; border: 1px solid transparent; }
        .nav-link:hover { background: rgba(255,255,255,0.03); color: white; }
        .nav-link.active { background: rgba(0, 255, 255, 0.05); color: var(--neon-cyan); border: 1px solid rgba(0, 255, 255, 0.15); }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(0,255,255,0.1); border-top-color: var(--neon-cyan); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 768px) { #sidebar { display: none; } }
    </style>
</head>
<body>

<header>
    <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-gradient-to-br from-cyan-500 to-blue-700 rounded-xl flex items-center justify-center shadow-lg shadow-cyan-500/20">
            <i class="fas fa-microchip text-white text-lg"></i>
        </div>
        <div>
            <h1 class="text-md font-black text-white leading-none tracking-tighter uppercase">PRO360 <span class="text-cyan-400 font-light">Core</span></h1>
            <span class="text-[8px] text-slate-500 font-black uppercase tracking-[0.3em]">Nexus-X Enterprise</span>
        </div>
    </div>
    <div class="flex items-center gap-4">
        <div class="text-right leading-none">
            <p id="userName" class="text-[10px] font-black text-white uppercase italic font-mono">Syncing...</p>
            <span id="userRole" class="text-[7px] text-cyan-500 font-black uppercase tracking-widest">Verificando...</span>
        </div>
        <button id="logoutBtn" class="w-9 h-9 rounded-full bg-slate-800/50 border border-white/5 text-slate-400 hover:text-red-400 active:scale-90 transition-all">
            <i class="fas fa-power-off text-xs"></i>
        </button>
    </div>
</header>

<div id="mainLayout">
    <nav id="sidebar">
        <p class="text-[8px] font-black text-slate-600 uppercase tracking-[3px] mb-4 px-4 italic">Operaciones</p>
        <div id="navMenu" class="space-y-1">
            <a href="#dashboard" class="nav-link active"><i class="fas fa-th-large w-5"></i> Dashboard</a>
            <a href="#ordenes" class="nav-link"><i class="fas fa-clipboard-list w-5"></i> Órdenes</a>
            <a href="#inventario" class="nav-link"><i class="fas fa-boxes w-5"></i> Inventario</a>
            <a href="#clientes" class="nav-link"><i class="fas fa-users w-5"></i> Clientes</a>
            <a href="#pagos" class="nav-link"><i class="fas fa-credit-card w-5"></i> Recaudos</a>
            <a href="#contabilidad" class="nav-link"><i class="fas fa-chart-pie w-5"></i> Finanzas</a>
            <a href="#gerencia" class="nav-link text-yellow-500/80"><i class="fas fa-brain w-5"></i> IA Gerente</a>
        </div>
        <div class="mt-auto pt-4 border-t border-white/5 px-2">
            <a href="#configuracion" class="nav-link mb-2"><i class="fas fa-cog w-5"></i> Configuración</a>
        </div>
    </nav>
    <main id="appContainer"></main>
</div>

<script type="module">
    import { auth } from "./js/core/firebase-config.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const VERSION = "10.4.5";
    const routes = {
        dashboard: () => import(`./js/modules/dashboard.js?v=${VERSION}`),
        ordenes: () => import(`./js/modules/ordenes.js?v=${VERSION}`),
        inventario: () => import(`./js/modules/inventario.js?v=${VERSION}`),
        clientes: () => import(`./js/modules/clientes.js?v=${VERSION}`),
        pagos: () => import(`./js/modules/pagosTaller.js?v=${VERSION}`),
        contabilidad: () => import(`./js/modules/contabilidad.js?v=${VERSION}`),
        gerencia: () => import(`./js/modules/gerenteAI.js?v=${VERSION}`),
        configuracion: () => import(`./js/modules/config.js?v=${VERSION}`)
    };

    async function router() {
        const container = document.getElementById("appContainer");
        
        // FIX 1: Autocorrección de URL para evitar pantallas blancas
        if (!window.location.hash || window.location.hash === "#") {
            window.location.hash = "#dashboard";
            return;
        }

        const hash = window.location.hash.replace("#", "");
        container.innerHTML = `<div class="flex h-full flex-col items-center justify-center animate-pulse"><div class="spinner mb-4"></div><p class="text-[9px] font-black uppercase text-cyan-500 tracking-widest">Nexus Linking...</p></div>`;

        // UI: Actualizar clase activa
        document.querySelectorAll('.nav-link').forEach(link => {
            link.classList.toggle('active', link.getAttribute('href') === `#${hash}`);
        });

        try {
            const moduleLoader = routes[hash] || routes.dashboard;
            const module = await moduleLoader();
            
            const state = {
                empresaId: localStorage.getItem("empresaId") || "TALLER_DEMO_01",
                uid: localStorage.getItem("uid"),
                rol: localStorage.getItem("rol") || "ADMIN",
                version: VERSION
            };

            container.innerHTML = ""; 
            await module.default(container, state);
        } catch (err) {
            console.error("🔥 Nexus-X Sync Error:", err);
            container.innerHTML = `<div class="p-10 text-center"><p class="text-red-500 font-black text-[10px] uppercase">Falla de Enlace en módulo: ${hash}</p><button onclick="location.reload()" class="mt-4 bg-white/5 px-6 py-2 rounded-full text-[9px] font-black uppercase text-white border border-white/10">Reintentar</button></div>`;
        }
    }

    onAuthStateChanged(auth, (user) => {
        if (user) {
            localStorage.setItem("uid", user.uid);
            document.getElementById("userName").innerText = user.email.split('@')[0];
            document.getElementById("userRole").innerText = "SISTEMA ACTIVO";
            router();
        } else {
            window.location.href = "../login.html";
        }
    });

    window.addEventListener("hashchange", router);
    document.getElementById("logoutBtn").onclick = () => signOut(auth).then(() => { localStorage.clear(); location.reload(); });
</script>
</body>
</html>
