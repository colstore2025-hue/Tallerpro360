<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TallerPRO360 - ERP + CRM + IA</title>

  <!-- Estilos globales -->
  <style>
    body {
      margin:0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0b0c17;
      color: #fff;
      overflow: hidden;
    }
    h1,h2,h3 { text-shadow: 0 0 8px #00ffcc; }
    button {
      width: 100%;
      margin: 6px 0;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #111827;
      color: #00ffcc;
      cursor: pointer;
      transition: 0.3s;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    button:hover {
      background: #00ffcc;
      color: #000;
      box-shadow: 0 0 10px #00ffcc;
    }
    #globalLoader {
      position: fixed;
      top: 0; left:0;
      width:100vw; height:100vh;
      background:#0b0c17;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:9999;
      color:#00ffcc;
      font-size:22px;
    }
  </style>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
  <!-- Loader inicial -->
  <div id="globalLoader">⚡ Iniciando TallerPRO360...</div>

  <!-- Contenedor app -->
  <div id="app"></div>

  <!-- Firestore y Firebase Global -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAdk-s-OXu57MiobzRGBRu-TlF2KYeicWQ",
      authDomain: "tallerpro360.firebaseapp.com",
      projectId: "tallerpro360",
      storageBucket: "tallerpro360.firebasestorage.app",
      messagingSenderId: "636224778184",
      appId: "1:636224778184:web:9bd7351b6458a1ef625afd",
      measurementId: "G-VEC2C0QX2G"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    window.db = db; // Acceso global para todos los módulos
  </script>

  <!-- Cargador principal de la app -->
  <script type="module">
    import { initApp } from "./js/system/moduleLoader.js";

    async function startApp() {
      try {
        await initApp();
        document.getElementById("globalLoader").style.display = "none";
      } catch(e) {
        console.error("Error iniciando app:", e);
        document.getElementById("globalLoader").innerHTML = "❌ Error cargando ERP";
      }
    }

    startApp();
  </script>
</body>
</html>
