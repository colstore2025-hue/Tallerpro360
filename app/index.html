<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>TallerPRO360 ERP</title>

<link rel="manifest" href="../manifest.json">
<meta name="theme-color" content="#16a34a">

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0f172a;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#020617;
padding:20px;
border-right:1px solid #1e293b;
display:flex;
flex-direction:column;
}

.sidebar h2{
color:#38bdf8;
margin-bottom:30px;
}

#menu{
flex:1;
overflow:auto;
}

/* BOTONES */

#menu button{
display:block;
width:100%;
margin:8px 0;
padding:12px;
background:#0f172a;
border:1px solid #1e293b;
color:white;
cursor:pointer;
border-radius:8px;
text-align:left;
}

#menu button:hover{
background:#1e293b;
}

#menu button.activo{
background:#16a34a;
border-color:#16a34a;
}

/* MAIN */

.main{
flex:1;
padding:30px;
overflow:auto;
}

/* CARDS */

.card{
background:#020617;
padding:20px;
margin-bottom:20px;
border-radius:10px;
border:1px solid #1e293b;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>TallerPRO360</h2>

<div id="menu"></div>

<button onclick="logout()" style="margin-top:20px;background:#dc2626;border:none;padding:10px;border-radius:6px;color:white;">
Salir
</button>

</div>

<div class="main">

<div id="appContent">

<div class="card">
<h2>Bienvenido a TallerPRO360</h2>
<p>ERP Inteligente para talleres automotrices.</p>
</div>

</div>

</div>


<!-- LOADER DEL SISTEMA -->
<script type="module" src="./system-loader.js"></script>


<script>

window.logout=function(){

localStorage.removeItem("uid");
localStorage.removeItem("empresaId");

window.location.href="/login.html";

}

</script>


<script>

/* PWA */

if("serviceWorker" in navigator){

navigator.serviceWorker
.register("../service-worker.js")
.then(()=>{

console.log("📱 PWA activa");

})
.catch(e=>{

console.log("SW error",e);

});

}

</script>

</body>
</html>
