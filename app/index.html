<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TallerPRO360 · ERP SaaS</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body { margin:0; font-family:'Inter', system-ui, sans-serif; background:#0b1220; color:#cbd5e1; overflow: hidden; }
        header { background:#0f172a; padding:14px 24px; display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid #1e293b; z-index: 100; position: relative; }
        #mainLayout { display:flex; height:calc(100vh - 70px); }
        
        /* Sidebar Estilo Neón */
        #sidebar { width:260px; background:#0f172a; display:flex; flex-direction:column; padding:20px 15px; border-right: 1px solid #1e293b; overflow-y: auto; }
        #sidebar button { 
            width:100%; margin:8px 0; padding:12px 15px; border:none; border-radius:12px; 
            font-size:14px; font-weight:600; cursor:pointer; text-align: left;
            transition: all 0.3s; color:#94a3b8; background:transparent;
        }
        #sidebar button:hover { background: rgba(0, 255, 255, 0.1); color:#00ffff; }
        #sidebar button.active { background:#1e293b; color:#00ffff; box-shadow: inset 4px 0 0 #00ffff; }
        
        /* Contenedor Principal */
        #appContainer { flex:1; padding:25px; overflow-y:auto; background: radial-gradient(circle at top right, #111827, #0b1220); }
        
        /* Scrollbar Personalizado */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>

<body>

<header>
    <div style="display:flex; align-items:center; gap:12px;">
        <div style="width:35px; height:35px; background:#10b981; border-radius:8px; display:flex; align-items:center; justify-content:center;">
            <i class="fas fa-car-wrench text-white"></i>
        </div>
        <h1 class="text-xl font-bold text-white tracking-tight">TallerPRO360 <span class="text-emerald-400 text-xs">SaaS</span></h1>
    </div>
    <div style="display:flex; align-items:center; gap:20px;">
        <span id="userName" style="font-size:13px; color:#94a3b8;"></span>
        <button id="logoutBtn" class="bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white px-4 py-2 rounded-lg text-sm font-bold transition-all">
            <i class="fas fa-sign-out-alt mr-2"></i> Salir
        </button>
    </div>
</header>

<div id="mainLayout">
    <nav id="sidebar">
        <p style="color:#475569; font-size:10px; font-weight:bold; margin-bottom:10px; padding-left:15px; letter-spacing:1px;">MENÚ PRINCIPAL</p>
        <div id="menuItems"></div>
    </nav>

    <main id="appContainer">
        <div id="boot-loader" style="text-align:center; margin-top:15vh;">
            <div style="display:inline-block; width:50px; height:50px; border:3px solid rgba(0,255,255,0.2); border-top-color:#00ffff; border-radius:50%; animation: spin 1s linear infinite; margin-bottom:20px;"></div>
            <p id="boot-text" style="font-size:18px; color:#00ffff; font-weight:500;">🚀 Inicializando Núcleo...</p>
            <p id="boot-subtext" style="opacity:.5; font-size:12px;">Estabilizando servicios de IA y Datos</p>
        </div>
    </main>
</div>

<style> @keyframes spin { to { transform: rotate(360deg); } } </style>

<script type="module">
    // Importamos el inicializador desde la ruta corregida
    import { initApp } from "./js/core/app-init.js";

    async function bootstrap() {
        const loader = document.getElementById("boot-loader");
        const loaderText = document.getElementById("boot-text");
        const container = document.getElementById("appContainer");
        
        try {
            // 1. Captura de datos de sesión desde el almacenamiento local
            const state = {
                uid: localStorage.getItem("uid"),
                empresaId: localStorage.getItem("empresaId"),
                rol: localStorage.getItem("rol"),
                rolGlobal: localStorage.getItem("rolGlobal"),
                nombre: localStorage.getItem("nombre") || "Usuario"
            };

            // 2. Validación de Seguridad Previa al Arranque
            // Nota: Si es Superadmin, puede entrar sin empresaId asignado inicialmente
            if (!state.uid || (!state.empresaId && state.rolGlobal !== 'superadmin')) {
                console.warn("🔐 Sesión incompleta o inválida, redirigiendo a login...");
                window.location.href = "login.html";
                return;
            }

            // UI Feedback: Mostrar nombre del usuario en el header
            const userDisplay = document.getElementById("userName");
            if (userDisplay) userDisplay.innerText = state.nombre;
            
            if (loaderText) loaderText.innerText = "🔌 Sincronizando Núcleo...";

            // 3. Ejecutar el arranque del motor (App-Init)
            // Este proceso resuelve la promesa cuando onAuthStateChanged responde
            const success = await initApp(); 

            if (success) {
                console.log("✅ TallerPRO360: Motor iniciado.");
                
                // 4. LIMPIEZA FORZADA: Eliminar loader de inicialización si sigue presente
                if (loader) {
                    loader.style.transition = "opacity 0.5s ease";
                    loader.style.opacity = "0";
                    setTimeout(() => loader.remove(), 500);
                }
            }

        } catch (error) {
            console.error("🔥 FALLO CRÍTICO EN BOOTSTRAP:", error);
            
            // Render de Error en pantalla para diagnóstico rápido
            if (container) {
                container.innerHTML = `
                    <div style="text-align:center; margin-top:10vh; background:rgba(239, 68, 68, 0.05); padding:40px; border-radius:20px; border:1px solid #ef444455; max-width:600px; margin-left:auto; margin-right:auto;">
                        <i class="fas fa-engine-warning text-red-500" style="font-size:40px; margin-bottom:20px;"></i>
                        <h2 style="color:#ef4444; font-size:20px; font-weight:bold; letter-spacing:1px;">ERROR DE ARRANQUE</h2>
                        <p style="color:#94a3b8; margin:15px 0; font-family:monospace; font-size:13px;">${error.message}</p>
                        <div style="display:flex; gap:10px; justify-content:center; margin-top:25px;">
                            <button onclick="location.reload()" style="background:#1e293b; color:white; padding:10px 20px; border-radius:10px; font-weight:bold; font-size:12px; cursor:pointer; border:1px solid #334155;">
                                <i class="fas fa-sync-alt mr-2"></i> REINTENTAR
                            </button>
                            <button onclick="localStorage.clear(); location.href='login.html';" style="background:#ef4444; color:white; padding:10px 20px; border-radius:10px; font-weight:bold; font-size:12px; cursor:pointer; border:none;">
                                <i class="fas fa-sign-out-alt mr-2"></i> LIMPIAR SESIÓN
                            </button>
                        </div>
                    </div>
                `;
            }
        }
    }

    // Encender el sistema
    bootstrap();

    // Configuración global del botón de salida
    document.getElementById("logoutBtn")?.addEventListener("click", async () => {
        try {
            // Intentamos cerrar sesión en Firebase si el SDK está disponible
            const { auth } = await import("./js/core/firebase-config.js");
            const { signOut } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js");
            await signOut(auth);
        } catch (e) {
            console.log("Cierre de sesión local");
        } finally {
            localStorage.clear();
            window.location.href = "login.html";
        }
    });
</script>

</body>
</html>
