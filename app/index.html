<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TallerPRO360 · Nexus-X Enterprise</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root { --neon-cyan: #00ffff; --dark-bg: #050a14; --sidebar-bg: #0a0f1d; }
        body { margin:0; font-family:'Inter', sans-serif; background: var(--dark-bg); color:#cbd5e1; overflow: hidden; }
        
        header { 
            background: var(--sidebar-bg); padding:10px 24px; display:flex; justify-content:space-between; 
            align-items:center; border-bottom: 1px solid #1e293b; z-index: 100; position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        #mainLayout { display:flex; height:calc(100vh - 60px); }
        
        #sidebar { width:250px; background: var(--sidebar-bg); display:flex; flex-direction:column; padding:20px 12px; border-right: 1px solid #1e293b; transition: all 0.3s ease; }
        
        #appContainer { flex:1; padding:20px; overflow-y:auto; background: radial-gradient(circle at 50% 0%, #111827, #050a14); position: relative; }
        
        /* Navegación Estilizada */
        .nav-link { 
            display: flex; align-items: center; gap: 12px; padding: 10px 15px; border-radius: 14px; 
            color: #64748b; font-size: 13px; font-weight: 600; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent; margin-bottom: 4px;
        }
        .nav-link i { font-size: 16px; width: 20px; text-align: center; }
        .nav-link:hover { background: rgba(255,255,255,0.03); color: white; border-color: rgba(255,255,255,0.05); }
        .nav-link.active { 
            background: rgba(0, 255, 255, 0.05); color: var(--neon-cyan); 
            border: 1px solid rgba(0, 255, 255, 0.15); box-shadow: 0 0 15px rgba(0, 255, 255, 0.05);
        }

        /* Spinner de carga Nexus-X */
        .spinner { width: 44px; height: 44px; border: 3px solid rgba(0,255,255,0.05); border-top-color: var(--neon-cyan); border-radius: 50%; animation: spin 0.7s cubic-bezier(0.5, 0.1, 0.4, 0.9) infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Scrollbar Minimalista */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--neon-cyan); }
    </style>
</head>

<body>

<header>
    <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-gradient-to-br from-cyan-500 to-blue-700 rounded-xl flex items-center justify-center shadow-[0_0_20px_rgba(6,182,212,0.3)]">
            <i class="fas fa-microchip text-white text-lg"></i>
        </div>
        <div>
            <h1 class="text-md font-black text-white leading-none tracking-tighter uppercase">PRO360 <span class="text-cyan-400 font-light">Core</span></h1>
            <span class="text-[8px] text-slate-500 font-bold uppercase tracking-[0.3em]">Nexus-X Starlink</span>
        </div>
    </div>
    
    <div class="flex items-center gap-6">
        <div class="hidden md:block text-right">
            <p id="userName" class="text-xs font-black text-white m-0">Autenticando...</p>
            <p id="userRole" class="text-[9px] text-cyan-500/80 uppercase font-black tracking-widest">Sincronizando...</p>
        </div>
        <button id="logoutBtn" class="w-10 h-10 rounded-full bg-slate-800/50 hover:bg-red-500/20 text-slate-400 hover:text-red-500 transition-all flex items-center justify-center border border-slate-700">
            <i class="fas fa-power-off"></i>
        </button>
    </div>
</header>

<div id="mainLayout">
    <nav id="sidebar">
        <p class="text-[9px] font-black text-slate-600 uppercase tracking-[4px] mb-6 px-4">Sistemas</p>
        <div id="navMenu" class="space-y-1">
            <a href="#dashboard" class="nav-link"><i class="fas fa-th-large"></i> Dashboard</a>
            <a href="#ordenes" class="nav-link"><i class="fas fa-clipboard-list"></i> Órdenes</a>
            <a href="#clientes" class="nav-link"><i class="fas fa-address-book"></i> Clientes</a>
            <a href="#vehiculos" class="nav-link"><i class="fas fa-car"></i> Vehículos</a>
            <a href="#contabilidad" class="nav-link"><i class="fas fa-chart-line"></i> Finanzas</a>
            <a href="#configuracion" class="nav-link"><i class="fas fa-sliders-h"></i> Ajustes</a>
        </div>
        
        <div class="mt-auto pt-6 border-t border-slate-800/50 px-4">
            <div class="bg-cyan-500/5 p-3 rounded-2xl border border-cyan-500/10">
                <p class="text-[8px] text-cyan-400 font-black uppercase tracking-widest mb-1">Status</p>
                <div class="flex items-center gap-2">
                    <div class="w-1.5 h-1.5 bg-cyan-400 rounded-full animate-pulse"></div>
                    <span class="text-[10px] text-slate-400 font-bold">Cloud Active</span>
                </div>
            </div>
        </div>
    </nav>

    <main id="appContainer">
        <div id="boot-loader" class="flex flex-col items-center justify-center h-full">
            <div class="spinner mb-6"></div>
            <h2 class="text-white font-black tracking-[0.3em] text-[10px] uppercase animate-pulse">Iniciando Protocolo Nexus-X</h2>
            <p class="text-slate-600 text-[9px] mt-2 font-bold uppercase tracking-widest">Asegurando Canal Encriptado</p>
        </div>
    </main>
</div>

<script type="module">
    import { auth } from "./js/core/firebase-config.js?v=10.3";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    // Mapeo dinámico con cache-busting para actualizaciones inmediatas
    const VERSION = "10.3.1";
    const routes = {
        dashboard: () => import(`./js/modules/dashboard.js?v=${VERSION}`),
        ordenes: () => import(`./js/modules/ordenes.js?v=${VERSION}`),
        clientes: () => import(`./js/modules/clientes.js?v=${VERSION}`),
        vehiculos: () => import(`./js/modules/vehiculos.js?v=${VERSION}`),
        contabilidad: () => import(`./js/modules/contabilidad.js?v=${VERSION}`),
        configuracion: () => import(`./js/modules/config.js?v=${VERSION}`)
    };

    /**
     * NAVEGADOR PRINCIPAL (Protocolo Seguro)
     */
    async function navigate(hash) {
        const container = document.getElementById("appContainer");
        const moduleName = hash.replace("#", "") || "dashboard";
        
        // 1. Mostrar loader interno
        container.innerHTML = `<div class="flex items-center justify-center h-full"><div class="spinner"></div></div>`;

        // 2. Gestión visual de botones
        document.querySelectorAll('.nav-link').forEach(link => {
            link.classList.toggle('active', link.getAttribute('href') === `#${moduleName}`);
        });

        try {
            if (!routes[moduleName]) throw new Error("Módulo no disponible");
            
            // 3. Importación y ejecución del módulo
            const module = await routes[moduleName]();
            const render = module.default;

            const state = {
                uid: localStorage.getItem("uid"),
                empresaId: localStorage.getItem("empresaId") || "taller_001",
                rol: localStorage.getItem("rol") || "operario"
            };

            container.innerHTML = ""; 
            await render(container, state);
            
            console.log(`📡 [Nexus-X]: Módulo ${moduleName} desplegado.`);
        } catch (err) {
            console.error("🔥 Error de carga modular:", err);
            container.innerHTML = `
                <div class="flex flex-col items-center justify-center h-full text-center">
                    <i class="fas fa-exclamation-triangle text-red-500 text-2xl mb-4"></i>
                    <h3 class="text-white font-bold text-sm uppercase">Falla en Módulo ${moduleName}</h3>
                    <p class="text-slate-500 text-xs mt-1 mb-6">${err.message}</p>
                    <button onclick="location.reload()" class="bg-cyan-500 text-black px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest hover:scale-105 transition-transform">Forzar Reinicio</button>
                </div>`;
        }
    }

    /**
     * INICIALIZACIÓN DE SEGURIDAD
     */
    onAuthStateChanged(auth, (user) => {
        if (user) {
            // Guardar contexto mínimo
            localStorage.setItem("uid", user.uid);
            
            // UI Update
            document.getElementById("userName").innerText = user.displayName || user.email.split('@')[0];
            document.getElementById("userRole").innerText = localStorage.getItem("rol")?.toUpperCase() || "ADMIN";
            
            // Disparar navegación inicial
            navigate(window.location.hash || "#dashboard");
        } else {
            console.warn("🔒 Acceso denegado. Reautenticando...");
            window.location.href = "../login.html"; 
        }
    });

    // Eventos de Sistema
    window.addEventListener("hashchange", () => navigate(window.location.hash));

    document.getElementById("logoutBtn").onclick = () => {
        if(confirm("¿Cerrar sesión en Nexus-X?")) {
            signOut(auth).then(() => window.location.href = "../login.html");
        }
    };
</script>

</body>
</html>
