<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP TallerPRO360 | Operativo IA</title>
<link rel="icon" href="logo-tallerpro360.png">

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">

<!-- Leaflet para mapas -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  background:#0f172a;
  font-family:'Inter',sans-serif;
  color:#f1f5f9;
}
.font-nexus{ font-family:'Orbitron',sans-serif; }
.glass{
  background:rgba(15,23,42,.7);
  backdrop-filter:blur(20px);
  border-radius:1.5rem;
  border:1px solid rgba(255,255,255,.05);
  padding:1rem;
}
.status-activo{
  color:#10b981;
  background:rgba(16,185,129,.1);
  border:1px solid rgba(16,185,129,.3);
  padding:2px 8px;
  border-radius:8px;
  font-size:10px;
  font-weight:700;
}
.status-suspendido{
  color:#ef4444;
  background:rgba(239,68,68,.1);
  border:1px solid rgba(239,68,68,.3);
  padding:2px 8px;
  border-radius:8px;
  font-size:10px;
  font-weight:700;
}
#mapa{height:350px;border-radius:1rem;}
</style>
</head>
<body class="p-6">

<header class="flex justify-between items-center mb-8">
<h1 class="text-3xl font-nexus font-black text-amber-500">
TallerPRO360 <span class="text-white">ERP Operativo</span>
</h1>
<button onclick="logout()" class="bg-red-600 px-4 py-2 rounded font-bold hover:bg-red-700">
<i class="fas fa-power-off"></i> Salir
</button>
</header>

<!-- ================= KPIs PRINCIPALES ================= -->
<section class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
  <div class="glass text-center"><p class="text-xs text-gray-400">Órdenes Mes</p><h2 id="kpiOrdenes" class="text-4xl font-nexus text-amber-500">0</h2></div>
  <div class="glass text-center"><p class="text-xs text-gray-400">Ingresos</p><h2 id="kpiIngresos" class="text-4xl font-nexus text-green-500">0</h2></div>
  <div class="glass text-center"><p class="text-xs text-gray-400">Costo</p><h2 id="kpiCostos" class="text-4xl font-nexus text-red-500">0</h2></div>
  <div class="glass text-center"><p class="text-xs text-gray-400">Utilidad</p><h2 id="kpiUtilidad" class="text-4xl font-nexus text-blue-500">0</h2></div>
</section>

<!-- ================= GRÁFICOS ================= -->
<section class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
  <div class="glass p-4">
    <div class="font-bold mb-2">Órdenes por Taller</div>
    <canvas id="chartOrdenes"></canvas>
  </div>
  <div class="glass p-4">
    <div class="font-bold mb-2">Ingresos vs Costos</div>
    <canvas id="chartFinanzas"></canvas>
  </div>
</section>

<!-- ================= INVENTARIO Y REPUESTOS ================= -->
<section class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
  <div class="glass p-4">
    <div class="font-bold mb-2">Top Repuestos</div>
    <div id="topRepuestos"></div>
  </div>
  <div class="glass p-4">
    <div class="font-bold mb-2">Alerta de Inventario</div>
    <div id="alertaInventario"></div>
  </div>
</section>

<!-- ================= MAPA ================= -->
<section class="glass p-4 mb-8">
  <div class="font-bold mb-2">Mapa de Talleres</div>
  <div id="mapa"></div>
</section>

<footer class="text-center text-xs text-gray-500">
© 2026 TallerPRO360 · ERP Operativo
</footer>

<script type="module">
// ==========================================
// IMPORTAR TODOS LOS JS DE APP/JS
// ==========================================
import { db, auth } from "./js/firebase-config.js";

import { iniciarDashboardIA } from "./js/dashboardIA.js";
import { detectarRepuestos } from "./js/motorIAglobal.js";
import { calcularPrecioInteligente } from "./js/pricingAI.js";
import { iniciarVoz } from "./js/voiceAssistant.js";
import { crearPedido, buscarRepuestos } from "./js/autoPartsAI.js";
import { predecirClientes } from "./js/customerRetentionAI.js";
import { optimizarIngresos } from "./js/workshopRevenueOptimizer.js";
import { obtenerRankingTalleres } from "./js/workshopRankingAI.js";

// Firestore
import {
collection,
onSnapshot,
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// Chart.js
let chartOrdenes, chartFinanzas;
let map, markers=[];

// ================= AUTH =================
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

onAuthStateChanged(auth, async(user)=>{
  if(!user){ window.location="login.html"; return; }
  const snap = await getDoc(doc(db,"usuarios",user.uid));
  if(!snap.exists()){ window.location="login.html"; return; }
  initDashboard();
});

// ================= INIT =================
function initDashboard(){
  initMap();
  iniciarDashboardIA();
  cargarTalleres();
  mostrarTopRepuestos();
  iniciarVoz();
}

// ================= MAPA =================
function initMap(){
  map=L.map("mapa").setView([4.57,-74.29],6);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:18}).addTo(map);
}

// ================= TALLERES =================
async function cargarTalleres(){
  const talleresCol=collection(db,"talleres");
  onSnapshot(talleresCol,snap=>{
    let ordenesMes=0, ingresos=0, costos=0, utilidad=0;
    const ciudades={};
    markers.forEach(m=>map.removeLayer(m));
    markers=[];
    snap.forEach(docSnap=>{
      const t=docSnap.data();
      ordenesMes+=t.ordenesMes||0;
      ingresos+=t.metricas?.ingresos||0;
      costos+=t.metricas?.costos||0;
      utilidad+=t.metricas?.utilidad||0;
      if(t.lat && t.lng){
        const m=L.marker([t.lat,t.lng]).addTo(map).bindPopup(`<b>${t.nombreTaller}</b><br>${t.ciudad}`);
        markers.push(m);
      }
      if(t.ciudad) ciudades[t.ciudad]=(ciudades[t.ciudad]||0)+1;
    });
    document.getElementById("kpiOrdenes").innerText=ordenesMes;
    document.getElementById("kpiIngresos").innerText=new Intl.NumberFormat("es-CO",{style:"currency",currency:"COP"}).format(ingresos);
    document.getElementById("kpiCostos").innerText=new Intl.NumberFormat("es-CO",{style:"currency",currency:"COP"}).format(costos);
    document.getElementById("kpiUtilidad").innerText=new Intl.NumberFormat("es-CO",{style:"currency",currency:"COP"}).format(utilidad);
    renderCharts(ciudades, ingresos, costos);
  });
}

// ================= CHARTS =================
function renderCharts(ciudades, ingresos, costos){
  if(chartOrdenes) chartOrdenes.destroy();
  if(chartFinanzas) chartFinanzas.destroy();
  chartOrdenes=new Chart(document.getElementById("chartOrdenes"),{
    type:"doughnut",
    data:{labels:Object.keys(ciudades),datasets:[{data:Object.values(ciudades),backgroundColor:["#f59e0b","#10b981","#3b82f6","#ef4444","#8b5cf6"]}]},
    options:{plugins:{legend:{position:"bottom"}}}
  });
  chartFinanzas=new Chart(document.getElementById("chartFinanzas"),{
    type:"bar",
    data:{labels:["Ingresos","Costos"],datasets:[{label:"COP",data:[ingresos,costos],backgroundColor:["#10b981","#ef4444"]}]},
    options:{plugins:{legend:{display:false}}}
  });
}

// ================= TOP REPUESTOS =================
async function mostrarTopRepuestos(){
  const repuestos=await buscarRepuestos();
  const cont=document.getElementById("topRepuestos");
  if(!cont) return;
  cont.innerHTML="";
  repuestos.slice(0,5).forEach(r=>{
    const div=document.createElement("div");
    div.className="flex justify-between p-1 border-b border-gray-600";
    div.innerHTML=`<span>${r.nombre}</span><span>${new Intl.NumberFormat("es-CO",{style:"currency",currency:"COP"}).format(r.precio)}</span>`;
    cont.appendChild(div);
  });
}

// ================= LOGOUT =================
function logout(){ signOut(auth).then(()=>window.location="login.html"); }
window.logout=logout;

</script>
</body>
</html>
