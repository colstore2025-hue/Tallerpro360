<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CEO Dashboard - Nexus X</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  background:#020617;
  color:#e5e7eb;
  font-family:Inter,sans-serif;
  margin:0;
  padding:20px;
}

h1{color:#00ffff;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  margin-bottom:20px;
}

.card{
  background:#111827;
  padding:18px;
  border-radius:14px;
  border:1px solid #1f2937;
}

.ia-box{
  background:#020617;
  border:1px solid #1e293b;
  padding:20px;
  border-radius:14px;
  margin-top:20px;
}

button{
  background:#00ffff;
  color:#000;
  border:none;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  margin-right:10px;
  margin-top:10px;
}
</style>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { analizarSaaS } from "./js/ai/ceoGlobalAI.js";
import { ejecutarGrowthEngine } from "./js/ai/growthEngine.js";
import { enviarWhatsApp } from "./js/services/whatsappSender.js";

const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "tallerpro360.firebaseapp.com",
  projectId: "tallerpro360",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let pagosGlobal = [];
let talleresGlobal = [];

async function cargarDashboard(){

  document.getElementById("status").innerText="Cargando...";

  const pagosSnap = await getDocs(collection(db,"pagos"));
  const talleresSnap = await getDocs(collection(db,"talleres"));

  const pagos = pagosSnap.docs.map(d=>d.data());
  const talleres = talleresSnap.docs.map(d=>d.data());

  pagosGlobal = pagos;
  talleresGlobal = talleres;

  /* ================= KPIs ================= */

  let ingresos=0;
  let ingresosPorDia={};

  pagos.forEach(p=>{
    if(p.estado==="aprobado"){
      ingresos+=Number(p.monto||0);

      const fecha = p.creadoEn?.toDate().toISOString().slice(0,10);
      ingresosPorDia[fecha]=(ingresosPorDia[fecha]||0)+Number(p.monto||0);
    }
  });

  const activos = talleres.filter(t=>t.estadoPlan==="ACTIVO").length;
  const freemium = talleres.filter(t=>t.plan==="freemium").length;

  const conversion = activos ? ((activos-freemium)/activos)*100 : 0;
  const mrr = ingresos/30;

  document.getElementById("kpis").innerHTML=`
    <div class="card"><h3>Ingresos</h3><p>$${format(ingresos)}</p></div>
    <div class="card"><h3>MRR</h3><p>$${format(mrr)}</p></div>
    <div class="card"><h3>Activos</h3><p>${activos}</p></div>
    <div class="card"><h3>Conversión</h3><p>${conversion.toFixed(1)}%</p></div>
  `;

  /* ================= GRÁFICA ================= */

  const labels = Object.keys(ingresosPorDia);
  const data = Object.values(ingresosPorDia);

  new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels,
      datasets:[{label:"Ingresos",data}]
    }
  });

  /* ================= IA ================= */

  const ia = await analizarSaaS({pagos,talleres});

  const prediccion = Math.round(mrr*30*1.15);

  document.getElementById("ia").innerHTML=`
    <h2>🧠 CEO AI</h2>
    <p>${ia.resumen}</p>

    <h3>📈 Predicción 30 días</h3>
    <p>$${format(prediccion)}</p>

    <h3>🚨 Alertas</h3>
    ${ia.alertas.map(a=>`<div>⚠️ ${a}</div>`).join("")}

    <h3>💡 Recomendaciones</h3>
    ${ia.recomendaciones.map(r=>`<div>💡 ${r}</div>`).join("")}

    <button onclick="optimizar()">⚡ Optimizar negocio</button>
    <button onclick="growth()">🚀 Growth Engine</button>

    <div id="logsIA" style="margin-top:15px;color:#0ff;"></div>
  `;

  window.optimizacionesIA = ia;

  document.getElementById("status").innerText="✅ Listo";
}

/* ================= OPTIMIZACIÓN ================= */

window.optimizar = function(){

  const acciones = [];

  if(window.optimizacionesIA.recomendaciones.length > 0){
    acciones.push("Subir precios estratégicamente");
    acciones.push("Activar campaña WhatsApp");
    acciones.push("Reducir plan freemium");
  }

  alert("IA ejecutaría:\n\n"+acciones.join("\n"));
};

/* ================= GROWTH ENGINE ================= */

window.growth = async function(){

  document.getElementById("logsIA").innerHTML = "🚀 Ejecutando Growth Engine...";

  const acciones = await ejecutarGrowthEngine(db);

  await enviarWhatsApp(db);

  document.getElementById("logsIA").innerHTML = `
    <h4>📡 Acciones ejecutadas:</h4>
    ${acciones.map(a=>`<div>⚡ ${a}</div>`).join("")}
  `;
};

/* ================= UTIL ================= */

function format(num){
  return new Intl.NumberFormat("es-CO").format(num||0);
}

window.onload=cargarDashboard;

</script>
</head>

<body>

<h1>🚀 CEO Dashboard - Nexus X Starlink</h1>

<p id="status">Inicializando...</p>

<div id="kpis" class="grid"></div>

<canvas id="chart" height="100"></canvas>

<div id="ia" class="ia-box"></div>

</body>
</html>
