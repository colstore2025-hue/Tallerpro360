<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comercial IA | TallerPRO360</title>
<link rel="icon" href="logo-tallerpro360.png">

<!-- Tailwind y FontAwesome -->
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  background:#0f172a;
  font-family:'Inter',sans-serif;
  color:#f1f5f9;
}
.font-nexus{font-family:'Orbitron',sans-serif;}
.glass{
  background:rgba(15,23,42,.7);
  backdrop-filter:blur(20px);
  border-radius:1.5rem;
  border:1px solid rgba(255,255,255,.05);
}
.kpi-card{
  text-align:center;
  padding:1rem;
  border-radius:1rem;
  backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,.1);
}
.status-activo{
  color:#10b981;
  background:rgba(16,185,129,.1);
  border:1px solid rgba(16,185,129,.3);
  padding:2px 8px;
  border-radius:8px;
  font-size:10px;
  font-weight:700;
}
.status-inactivo{
  color:#ef4444;
  background:rgba(239,68,68,.1);
  border:1px solid rgba(239,68,68,.3);
  padding:2px 8px;
  border-radius:8px;
  font-size:10px;
  font-weight:700;
}
</style>
</head>
<body class="p-6">

<header class="flex justify-between items-center mb-6">
  <h1 class="text-3xl font-nexus font-black text-amber-500">TallerPRO360 <span class="text-white">Comercial</span></h1>
  <button onclick="logout()" class="bg-red-600 px-4 py-2 rounded font-bold hover:bg-red-700">
    <i class="fas fa-power-off"></i> Salir
  </button>
</header>

<!-- ================= KPIs CLIENTES & VENTAS ================= -->
<section class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-6">
  <div class="kpi-card text-amber-500">
    <p class="text-xs text-gray-400">Clientes activos</p>
    <h2 id="kpiClientes" class="text-4xl font-nexus">0</h2>
  </div>
  <div class="kpi-card text-green-500">
    <p class="text-xs text-gray-400">Nuevos clientes</p>
    <h2 id="kpiNuevos" class="text-4xl font-nexus">0</h2>
  </div>
  <div class="kpi-card text-blue-500">
    <p class="text-xs text-gray-400">Ingresos</p>
    <h2 id="kpiIngresos" class="text-4xl font-nexus">0</h2>
  </div>
  <div class="kpi-card text-red-500">
    <p class="text-xs text-gray-400">Alertas</p>
    <h2 id="kpiAlertas" class="text-4xl font-nexus">0</h2>
  </div>
</section>

<!-- ================= GRAFICOS ================= -->
<section class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
  <div class="glass p-6">
    <h3 class="font-bold mb-2 border-b border-white/30 pb-2">Ingresos por taller</h3>
    <canvas id="chartIngresosTalleres"></canvas>
  </div>
  <div class="glass p-6">
    <h3 class="font-bold mb-2 border-b border-white/30 pb-2">Predicción de ventas</h3>
    <canvas id="chartPredicciones"></canvas>
  </div>
</section>

<section class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
  <div class="glass p-6">
    <h3 class="font-bold mb-2 border-b border-white/30 pb-2">Clientes más rentables</h3>
    <div id="topClientes"></div>
  </div>
  <div class="glass p-6">
    <h3 class="font-bold mb-2 border-b border-white/30 pb-2">Alertas de fraude</h3>
    <div id="alertasFraude"></div>
  </div>
</section>

<footer class="text-center text-xs text-gray-500 mt-6">
  © 2026 TallerPRO360 · Panel Comercial IA
</footer>

<!-- ================= SCRIPTS ================= -->
<script type="module">
import { auth, db } from "./js/firebase-config.js";
import { iniciarDashboardIA } from "./js/dashboardIA.js";
import { detectarRepuestos } from "./js/autoPartsAI.js";
import { predecirClientes } from "./js/customerRetentionAI.js";
import { optimizarIngresos } from "./js/workshopRevenueOptimizer.js";
import { crearCotizacion } from "./js/cotizacionIA.js";

import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { collection, onSnapshot, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

let chartIngresos, chartPredicciones;

onAuthStateChanged(auth, async(user)=>{
  if(!user){ window.location="login.html"; return; }

  // verificar rol
  // aquí podrías agregar validación de rol superadmin o comercial
  initPanel();
});

function initPanel(){
  iniciarDashboardIA(); // carga datos generales IA

  cargarTopClientes();
  cargarAlertasFraude();
  renderCharts();
}

// ================= TOP CLIENTES =================
function cargarTopClientes(){
  const cont = document.getElementById("topClientes");
  cont.innerHTML="";
  // simulación de ejemplo
  const clientes = [
    {nombre:"Juan Perez", total:350000},
    {nombre:"Maria Gomez", total:280000},
    {nombre:"Taller Los Andes", total:180000},
  ];
  clientes.forEach(c=>{
    const div=document.createElement("div");
    div.className="flex justify-between text-sm py-1 border-b border-white/10";
    div.innerHTML=`<span>${c.nombre}</span><span class="text-green-400">${formatoCOP(c.total)}</span>`;
    cont.appendChild(div);
  });
}

// ================= ALERTAS FRAUDE =================
function cargarAlertasFraude(){
  const cont = document.getElementById("alertasFraude");
  cont.innerHTML="";
  // simulación de ejemplo
  const alertas = [
    "Factura duplicada taller Los Andes",
    "Descuento anómalo en Taller Central"
  ];
  alertas.forEach(a=>{
    const div=document.createElement("div");
    div.className="text-xs py-1 border-b border-white/10 text-red-400";
    div.innerText=a;
    cont.appendChild(div);
  });
}

// ================= CHARTS =================
function renderCharts(){
  const ingresosData=[350000,280000,180000];
  const labels=["Taller A","Taller B","Taller C"];
  const prediccionesData=[400000,300000,200000];

  if(chartIngresos) chartIngresos.destroy();
  chartIngresos=new Chart(document.getElementById("chartIngresosTalleres"),{
    type:"bar",
    data:{labels, datasets:[{label:"Ingresos", data:ingresosData, backgroundColor:"#f59e0b"}]},
    options:{plugins:{legend:{display:false}}}
  });

  if(chartPredicciones) chartPredicciones.destroy();
  chartPredicciones=new Chart(document.getElementById("chartPredicciones"),{
    type:"line",
    data:{labels, datasets:[{label:"Predicción", data:prediccionesData, borderColor:"#3b82f6", fill:false, tension:0.4}]},
    options:{plugins:{legend:{display:false}}}
  });
}

// ================= FORMATO COP =================
function formatoCOP(valor){
  return new Intl.NumberFormat("es-CO",{style:"currency",currency:"COP",minimumFractionDigits:0}).format(valor);
}

// ================= LOGOUT =================
function logout(){
  signOut(auth).then(()=>window.location="login.html");
}
</script>
</body>
</html>
