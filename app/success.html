<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago Exitoso · Nexus-X</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #020617; 
            font-family: 'Inter', sans-serif; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            overflow: hidden;
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .success-glow {
            box-shadow: 0 0 50px rgba(16, 185, 129, 0.2);
        }
        .confetti {
            position: absolute; width: 10px; height: 10px; background: #00f2ff;
            opacity: 0.5; animation: fall 3s linear infinite;
        }
        @keyframes fall { to { transform: translateY(100vh) rotate(360deg); } }
    </style>
</head>
<body>

    <div class="max-w-md w-full p-8 text-center relative z-10 animate-in fade-in zoom-in duration-700">
        <div class="w-24 h-24 bg-emerald-500/10 border border-emerald-500/30 rounded-[2.5rem] flex items-center justify-center mx-auto mb-8 success-glow">
            <i class="fas fa-check-double text-4xl text-emerald-400"></i>
        </div>

        <h1 class="orbitron text-2xl text-white font-black tracking-widest mb-2 uppercase">TRANSACCIÓN <span class="text-emerald-400">OK</span></h1>
        <p class="text-slate-400 text-sm mb-10 leading-relaxed uppercase tracking-widest font-bold text-[10px]">Protocolo de pago completado con éxito vía <span class="text-red-500">Bold</span></p>

        <div class="bg-white/5 border border-white/10 rounded-3xl p-6 mb-10 backdrop-blur-xl">
            <div class="flex justify-between items-center mb-4 pb-4 border-b border-white/5">
                <span class="text-[9px] text-slate-500 font-black uppercase">Estado</span>
                <span class="text-[9px] text-emerald-400 font-black orbitron uppercase tracking-tighter italic text-xs">Confirmado</span>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-[9px] text-slate-500 font-black uppercase">Referencia</span>
                <span id="refId" class="text-[9px] text-white font-mono">NEXUS-360-B-1290</span>
            </div>
        </div>

        <div class="space-y-4">
            <button onclick="window.close();" class="w-full py-5 bg-emerald-500 text-black font-black orbitron text-[10px] uppercase tracking-[3px] rounded-2xl shadow-xl active:scale-95 transition-all">
                Cerrar Ventana
            </button>
            <p class="text-[8px] text-slate-600 font-black uppercase tracking-widest">TallerPRO360 · Nexus-X Intelligence System</p>
        </div>
    </div>

    <div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_50%,#064e3b,transparent)] opacity-20"></div>

    <script>
    // Automatismo: Redirigir al dashboard tras 5 segundos
    setTimeout(() => {
        window.location.href = "/app/dashboard.html";
    }, 5000);
</script>
</body>
</html>
