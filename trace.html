<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS-X | TERMINAL DE TELEMETRÍA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #030508; color: #00f2ff; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(5, 15, 25, 0.9); border: 1px solid #00f2ff33; box-shadow: 0 0 20px #00f2ff11; }
        .neon-text { text-shadow: 0 0 10px #00f2ff; }
        .status-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .glow-btn { transition: 0.3s; border: 1px solid #00f2ff55; }
        .glow-btn:hover { background: #00f2ff; color: #000; box-shadow: 0 0 20px #00f2ff; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto flex justify-between items-center mb-6 border-b border-cyan-900 pb-4">
        <div>
            <h1 class="orbitron text-2xl font-bold neon-text">NEXUS-X <span class="text-xs font-light opacity-50 text-white">V.2030</span></h1>
            <p id="fecha-mision" class="text-[10px] tracking-[0.3em] uppercase opacity-60">SISTEMA_ACTIVO</p>
        </div>
        <div class="text-right">
            <div id="status-label" class="orbitron text-[10px] px-3 py-1 border border-cyan-500 rounded status-pulse uppercase">Sincronizando...</div>
        </div>
    </div>

    <main class="max-w-4xl mx-auto space-y-6">
        
        <div class="glass p-6 rounded-lg relative">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="text-[10px] orbitron opacity-50">UNIDAD_DETECTADA</label>
                    <div id="placa" class="text-6xl font-black orbitron italic text-white">---</div>
                    <div id="cliente" class="text-sm mt-2 opacity-80 uppercase tracking-widest">---</div>
                </div>
                <div class="flex flex-col justify-end text-right">
                    <span id="progreso-txt" class="orbitron text-3xl font-bold">0%</span>
                    <div class="w-full bg-cyan-900/30 h-1 mt-2">
                        <div id="progreso-bar" class="bg-cyan-500 h-full transition-all duration-1000" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="glass p-6 rounded-lg border-l-4 border-cyan-500">
            <h3 class="orbitron text-xs mb-4 flex items-center gap-2">
                <i class="fas fa-terminal"></i> TRANSMISIÓN_IA_TERMINAL
            </h3>
            <div id="bitacora-display" class="font-mono text-sm md:text-base text-cyan-100 leading-relaxed min-h-[100px]">
                <span class="status-pulse">_</span> Cargando registros de telemetría...
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <button id="btn-coti" class="glow-btn p-3 rounded text-[10px] orbitron opacity-30 cursor-not-allowed">
                <i class="fas fa-file-invoice block text-lg mb-1"></i> COTIZACIÓN
            </button>
            <button id="btn-check" class="glow-btn p-3 rounded text-[10px] orbitron opacity-30 cursor-not-allowed">
                <i class="fas fa-clipboard-check block text-lg mb-1"></i> CHECK-LIST
            </button>
            <button id="btn-orden" class="glow-btn p-3 rounded text-[10px] orbitron opacity-30 cursor-not-allowed">
                <i class="fas fa-tools block text-lg mb-1"></i> ORDEN_TRABAJO
            </button>
            <button id="btn-factura" class="glow-btn p-3 rounded text-[10px] orbitron opacity-30 cursor-not-allowed">
                <i class="fas fa-file-signature block text-lg mb-1"></i> FACTURA_LEGAL
            </button>
        </div>

        <div class="glass p-6 rounded-lg border-t-2 border-cyan-500 flex justify-between items-center">
            <div>
                <p class="text-[10px] orbitron opacity-50">SALDO_PENDIENTE</p>
                <h2 id="saldo-total" class="text-4xl font-bold orbitron text-white">$ 0</h2>
            </div>
            <button onclick="window.open('https://wa.me/573000000000')" class="bg-white text-black px-6 py-2 orbitron font-bold text-xs hover:bg-cyan-400 transition">
                CONTACTAR ASESOR
            </button>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

        const firebaseConfig = { /* TU CONFIGURACIÓN DE FIREBASE AQUÍ */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const params = new URLSearchParams(window.location.search);
        const idOrden = params.get("id");

        if (idOrden) {
            // BUSQUEDA DIRECTA POR ID (Largo o Corto según venga en la URL)
            onSnapshot(doc(db, "ordenes", idOrden), (docSnap) => {
                if (docSnap.exists()) {
                    const d = docSnap.data();
                    
                    // Inyección Maestra
                    document.getElementById("placa").innerText = d.placa || "N/A";
                    document.getElementById("cliente").innerText = d.cliente || "CLIENTE NO IDENTIFICADO";
                    document.getElementById("saldo-total").innerText = `$ ${Math.round(d.saldo_pendiente || 0).toLocaleString()}`;
                    
                    // Lógica de Bitácora (Efecto IA)
                    const bitacoraTexto = d.bitacora_ia || "Iniciando análisis de sensores...";
                    document.getElementById("bitacora-display").innerHTML = `> ${bitacoraTexto.replace(/\n/g, '<br>> ')}`;

                    // Lógica de Estados y Documentos
                    let progreso = 10;
                    const estado = d.estado || "INGRESO";
                    document.getElementById("status-label").innerText = estado;

                    if(estado === "DIAGNOSTICO") { progreso = 30; habilitarBtn("btn-coti"); }
                    if(estado === "REPARACION") { progreso = 65; habilitarBtn("btn-coti"); habilitarBtn("btn-orden"); }
                    if(estado === "FINALIZADO") { progreso = 90; habilitarBtn("btn-coti"); habilitarBtn("btn-orden"); habilitarBtn("btn-check"); }
                    if(estado === "ENTREGADO") { progreso = 100; habilitarBtn("btn-factura"); }

                    document.getElementById("progreso-bar").style.width = progreso + "%";
                    document.getElementById("progreso-txt").innerText = progreso + "%";
                } else {
                    document.getElementById("bitacora-display").innerHTML = "<span class='text-red-500'>ERROR_404: Misión no encontrada en la nube.</span>";
                }
            });
        }

        function habilitarBtn(id) {
            const el = document.getElementById(id);
            el.classList.remove("opacity-30", "cursor-not-allowed");
            el.classList.add("opacity-100", "cursor-pointer");
        }
    </script>
</body>
</html>
