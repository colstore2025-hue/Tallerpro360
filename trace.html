<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS-X | LIVE TRACKING SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root { --neon-cyan: #00f2ff; --neon-green: #10b981; --dark-bg: #05070a; }
        body { background: radial-gradient(circle at top, #0d1117 0%, var(--dark-bg) 100%); color: #e2e8f0; font-family: 'JetBrains Mono', monospace; min-height: 100vh; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .log-system { border-left: 2px solid var(--neon-cyan); background: rgba(0, 242, 255, 0.05); }
        .log-tech { border-right: 2px solid #ffffff; background: rgba(255, 255, 255, 0.03); text-align: right; }
        .glow-text { text-shadow: 0 0 10px rgba(0, 242, 255, 0.5); }
        .hud-border { border-left: 4px solid var(--neon-cyan); clip-path: polygon(0 0, 100% 0, 100% 90%, 95% 100%, 0 100%); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--neon-cyan); border-radius: 10px; }
    </style>
</head>
<body class="p-4 lg:p-10 relative overflow-x-hidden">
    
    <header class="max-w-5xl mx-auto flex justify-between items-end mb-10 border-b border-white/10 pb-6">
        <div>
            <h1 class="orbitron text-4xl font-black italic tracking-tighter glow-text">NEXUS<span class="text-red-600">_X</span></h1>
            <p class="text-[8px] orbitron tracking-[0.5em] text-cyan-400 uppercase">Quantum-Logistics Operational Interface</p>
        </div>
        <div class="text-right">
            <p id="timestamp" class="text-[9px] text-white/50 font-bold uppercase"></p>
        </div>
    </header>

    <main class="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div class="lg:col-span-7 space-y-6">
            <div class="glass hud-border p-8 relative overflow-hidden">
                <div class="flex justify-between items-start">
                    <div>
                        <label class="text-[9px] orbitron text-cyan-500 tracking-widest uppercase">Unit_Plate_Identifier</label>
                        <h2 id="placa" class="orbitron text-7xl font-black italic tracking-tighter">---</h2>
                    </div>
                    <div id="badge-estado" class="px-6 py-2 bg-cyan-500 text-black orbitron text-[12px] font-black italic rounded-bl-2xl shadow-[0_0_20px_rgba(0,242,255,0.4)]">---</div>
                </div>
                
                <div class="mt-10">
                    <div class="h-2 w-full bg-white/5 rounded-full p-[2px]">
                        <div id="progreso-bar" class="h-full bg-cyan-500 shadow-[0_0_15px_#00f2ff] transition-all duration-1000" style="width: 5%"></div>
                    </div>
                </div>
            </div>

            <div class="glass p-6 rounded-3xl border-b-4 border-cyan-500/30">
                <h3 class="orbitron text-[10px] text-cyan-500 font-bold mb-6 uppercase tracking-widest">
                    <i class="fas fa-stream mr-2"></i> Live_Mission_Log
                </h3>
                <div id="timeline-container" class="space-y-4 max-h-[500px] overflow-y-auto pr-2">
                    </div>
            </div>
        </div>

        <div class="lg:col-span-5 space-y-6">
            <div id="area-financiera" class="glass p-8 rounded-[2rem] border-t-2 border-green-500 hidden">
                <h3 class="orbitron text-[11px] text-green-500 font-black mb-6 uppercase">Estructura de Costos</h3>
                <div id="lista-items" class="space-y-3 mb-10"></div>
                <div class="border-t border-white/10 pt-6">
                    <p class="text-[10px] orbitron text-slate-500">NET_TOTAL_DUE</p>
                    <div id="total-final" class="text-6xl font-black orbitron text-white italic text-right">$ 0</div>
                </div>
                <div class="mt-10 space-y-4">
                    <button id="btn-aprobar" class="hidden w-full bg-white text-black py-5 orbitron font-black text-sm rounded-2xl uppercase">Autorizar Reparación <i class="fas fa-bolt ml-2"></i></button>
                    <button id="btn-pagar" class="hidden w-full bg-green-600 text-white py-5 orbitron font-black text-sm rounded-2xl uppercase">Pagar con BOLD <i class="fas fa-credit-card ml-2"></i></button>
                </div>
            </div>

            <div id="waiting-msg" class="glass p-10 rounded-[2rem] text-center">
                <i class="fas fa-satellite animate-bounce text-cyan-500 text-4xl mb-6"></i>
                <p class="orbitron text-[10px] text-slate-400">ESCANER SATELITAL EN PROGRESO...</p>
            </div>
        </div>
    </main>

    <script type="module">
        import { db } from "./core/firebase-config.js";
        import { doc, onSnapshot, query, collection, where, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const params = new URLSearchParams(window.location.search);
        const rawId = params.get("id"); // Puede venir como OT_PLACA_ID

        if (!rawId) {
            document.body.innerHTML = "<div class='p-20 text-center orbitron text-red-500'>ERROR: NO_ID</div>";
        } else {
            iniciarNexus(rawId);
        }

        async function iniciarNexus(idInput) {
            // Extraer el ID numérico que es el que manda en Firebase
            const partes = idInput.split('_');
            const idNumerico = partes[partes.length - 1]; 

            const docRef = doc(db, "ordenes", idNumerico);
            
            onSnapshot(docRef, async (snap) => {
                if (snap.exists()) {
                    actualizarInterfaz(snap.data(), snap.id);
                } else {
                    // Si el ID numérico falla, buscar por placa (segunda opción)
                    const placa = partes.length > 1 ? partes[1] : idInput;
                    const q = query(collection(db, "ordenes"), where("placa", "==", placa.toUpperCase()));
                    const querySnap = await getDocs(q);
                    if (!querySnap.empty) {
                        actualizarInterfaz(querySnap.docs[0].data(), querySnap.docs[0].id);
                    } else {
                        document.getElementById("waiting-msg").innerHTML = "<p class='orbitron text-red-500'>ORDEN NO ENCONTRADA</p>";
                    }
                }
            });
        }

        function actualizarInterfaz(data, docId) {
            document.getElementById("timestamp").innerText = `Sync: ${new Date().toLocaleTimeString()}`;
            document.getElementById("placa").innerText = data.placa || "N/A";
            
            // BITÁCORA INVERTIDA (Lo último que dictaste va arriba)
            const logContainer = document.getElementById("timeline-container");
            const rawContent = `${data.bitacora_ia || ''}\n${data.notas || ''}\n${data.observaciones || ''}`;
            const lineas = rawContent.split('\n').filter(l => l.trim() !== "").reverse();

            logContainer.innerHTML = lineas.map(linea => {
                const esIA = linea.includes('[NEXUS') || linea.includes('[SISTEMA]');
                return `
                    <div class="flex ${esIA ? 'justify-start' : 'justify-end'} mb-4">
                        <div class="p-4 rounded-2xl max-w-[90%] ${esIA ? 'log-system' : 'log-tech'}">
                            <p class="text-[7px] orbitron opacity-50 mb-1 uppercase">${esIA ? 'Nexus_System' : 'Taller_Update'}</p>
                            <p class="text-[11px] leading-tight">${linea.replace(/\[.*?\]:?/, '').trim()}</p>
                        </div>
                    </div>
                `;
            }).join('');

            // ESTADO Y BARRA
            const est = (data.estado || 'INGRESO').toUpperCase();
            document.getElementById("badge-estado").innerText = est;
            const niveles = { 'COTIZACION': 15, 'INGRESO': 30, 'DIAGNOSTICO': 50, 'REPARACION': 75, 'LISTO': 90, 'ENTREGADO': 100 };
            document.getElementById("progreso-bar").style.width = `${niveles[est] || 5}%`;

            // COSTOS
            const total = Number(data.costos_totales?.total || data.total || 0);
            if (total > 0) {
                document.getElementById("area-financiera").classList.remove("hidden");
                document.getElementById("waiting-msg").classList.add("hidden");
                document.getElementById("total-final").innerText = `$${total.toLocaleString('es-CO')}`;
                
                if (data.items) {
                    document.getElementById("lista-items").innerHTML = data.items.map(i => `
                        <div class="flex justify-between items-center bg-white/5 p-3 rounded-xl">
                            <p class="text-[10px] font-bold uppercase">${i.desc || i.descripcion}</p>
                            <p class="text-xs font-black text-cyan-400">$${(Number(i.venta) * Number(i.cantidad || 1)).toLocaleString()}</p>
                        </div>
                    `).join('');
                }
                
                // BOTONES
                const btnA = document.getElementById("btn-aprobar");
                const btnP = document.getElementById("btn-pagar");
                
                if (est === 'COTIZACION' && !data.aprobada) {
                    btnA.classList.remove("hidden");
                    btnA.onclick = async () => { if(confirm("¿Autorizar?")) await updateDoc(doc(db, "ordenes", docId), { aprobada: true, estado: 'DIAGNOSTICO' }); };
                } else { btnA.classList.add("hidden"); }

                if (est === 'LISTO') {
                    btnP.classList.remove("hidden");
                    btnP.onclick = () => window.open(`https://checkout.bold.co/payment/OT_${data.placa}`, '_blank');
                } else { btnP.classList.add("hidden"); }
            }
        }
    </script>
</body>
</html>
