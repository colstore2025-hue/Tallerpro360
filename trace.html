<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS-X | DOCUMENTO DIGITAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #e5e7eb; color: #1f2937; padding: 10px; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .document-page { 
            background: white; 
            max-width: 800px;
            margin: 1rem auto;
            padding: 30px;
            position: relative;
            border-radius: 4px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        /* Colores Dinámicos según Tipo de Documento */
        .doc-OT { border-top: 10px solid #1e3a8a; } /* Azul - Orden */
        .doc-COT { border-top: 10px solid #f59e0b; } /* Naranja - Cotización */
        .doc-FAC { border-top: 10px solid #10b981; } /* Verde - Factura */
        
        .bitacora-entry { border-left: 2px solid #3b82f6; background: #f8fafc; padding: 10px; margin-bottom: 8px; font-size: 0.85rem; }
        .logo-app { position: absolute; bottom: 20px; right: 20px; opacity: 0.4; filter: grayscale(100%); width: 60px; }
    </style>
</head>
<body>

<div id="main-doc" class="document-page doc-OT">
    <img src="https://tallerpro360.vercel.app/logo.png" class="logo-app" alt="TallerPRO360">

    <header class="flex justify-between items-start border-b pb-6 mb-6">
        <div>
            <h1 id="doc-title" class="text-2xl font-extrabold tracking-tighter text-slate-800">ORDEN DE TRABAJO</h1>
            <div class="text-sm text-gray-500 mt-1">
                <p class="font-bold text-gray-800 uppercase" id="taller-nombre">CARGANDO TALLER...</p>
                <p id="taller-dir" class="text-[10px]">VERIFICANDO CONEXIÓN STARLINK...</p>
            </div>
        </div>
        <div class="text-right">
            <div id="status-pill" class="bg-blue-900 text-white px-3 py-1 text-[10px] font-bold rounded mb-1">ID_GLOBAL</div>
            <p class="text-lg font-bold mono" id="doc-number">#---</p>
        </div>
    </header>

    <div class="grid grid-cols-2 gap-4 mb-6 bg-slate-50 p-4 rounded border border-slate-200">
        <div>
            <p class="text-[9px] text-gray-400 font-black uppercase">Unidad / Placa</p>
            <p class="text-xl font-black mono text-slate-900" id="placa">---</p>
        </div>
        <div class="text-right">
            <p class="text-[9px] text-gray-400 font-black uppercase">Fecha de Emisión</p>
            <p class="text-xs font-bold" id="fecha">--/--/----</p>
        </div>
    </div>

    <div class="mb-8">
        <h3 class="text-[10px] font-black text-slate-500 mb-3 border-b pb-1 uppercase tracking-widest">Trazabilidad de Misión</h3>
        <div id="timeline-container" class="space-y-2"></div>
    </div>

    <div id="cost-section" class="hidden">
        <table class="w-full text-left text-xs mb-4">
            <thead class="bg-slate-100 uppercase text-[9px] font-black">
                <tr>
                    <th class="p-2">Descripción</th>
                    <th class="p-2 text-center">Cant.</th>
                    <th class="p-2 text-right">Total</th>
                </tr>
            </thead>
            <tbody id="item-list" class="divide-y text-slate-700"></tbody>
        </table>
        <div class="flex justify-end pt-4 border-t-2 border-slate-800">
            <div class="text-right">
                <p class="text-[10px] font-bold text-slate-400 uppercase">Total a Pagar</p>
                <p class="text-4xl font-black text-slate-900" id="grand-total">$ 0</p>
            </div>
        </div>
    </div>

    <div id="action-area" class="mt-10 flex flex-col gap-3"></div>

    <footer class="mt-16 text-[8px] text-gray-300 text-center uppercase mono italic">
        Cloud Security Hash: Nexus-X-V4-Starlink-Verified
    </footer>
</div>

<script type="module">
    import { db } from "./core/firebase-config.js";
    import { doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id")?.split('_').pop();

    if (id) {
        onSnapshot(doc(db, "ordenes", id), (snap) => {
            if (snap.exists()) buildNexusDoc(snap.data(), snap.id);
        });
    }

    function buildNexusDoc(data, docId) {
        const docFrame = document.getElementById("main-doc");
        const title = document.getElementById("doc-title");
        const actions = document.getElementById("action-area");
        const est = data.estado || "INGRESO";

        // 1. LÓGICA DE TRANSFORMACIÓN SEGÚN ESTADO
        docFrame.className = "document-page"; // Reset
        actions.innerHTML = ""; // Limpiar botones

        if (est === "COTIZACION") {
            docFrame.classList.add("doc-COT");
            title.innerText = "COTIZACIÓN DE SERVICIOS";
            if (!data.aprobada) {
                actions.innerHTML = `<button onclick="approve()" class="w-full bg-amber-500 text-white py-4 font-black rounded-lg shadow-lg">AUTORIZAR PRESUPUESTO VIA SATELLITE</button>`;
            }
        } else if (est === "LISTO") {
            docFrame.classList.add("doc-FAC");
            title.innerText = "COBRO DE SERVICIOS";
            actions.innerHTML = `<button onclick="window.open('https://checkout.bold.co/payment/OT_${data.placa}')" class="w-full bg-emerald-600 text-white py-4 font-black rounded-lg shadow-lg uppercase">Pagar con BOLD <i class="fas fa-credit-card ml-2"></i></button>`;
        } else if (est === "ENTREGADO" || est === "FACTURADO") {
            docFrame.classList.add("doc-FAC");
            title.innerText = "FACTURA DE SERVICIO / RESUMEN";
        } else {
            docFrame.classList.add("doc-OT");
            title.innerText = "ORDEN DE TRABAJO TÉCNICA";
        }

        // 2. RELLENO DE DATOS
        document.getElementById("taller-nombre").innerText = data.taller_aliado || "CENTRO TECNOLÓGICO";
        document.getElementById("doc-number").innerText = `#${docId.slice(-6).toUpperCase()}`;
        document.getElementById("placa").innerText = data.placa;
        document.getElementById("fecha").innerText = new Date().toLocaleDateString();

        // 3. BITÁCORA (TRAZABILIDAD)
        const logContent = `${data.bitacora_ia || ''}\n${data.notas || ''}`;
        document.getElementById("timeline-container").innerHTML = logContent.split('\n')
            .filter(l => l.trim()).reverse().map(l => `
                <div class="bitacora-entry">
                    <p class="text-[8px] font-black text-slate-400 mb-1">DATA_LOG_STAMP</p>
                    <p>${l}</p>
                </div>`).join('');

        // 4. ITEMS Y COSTOS
        if (data.items && data.items.length > 0) {
            document.getElementById("cost-section").classList.remove("hidden");
            document.getElementById("item-list").innerHTML = data.items.map(i => `
                <tr><td class="p-2 font-bold">${i.desc}</td><td class="p-2 text-center">${i.cantidad}</td><td class="p-2 text-right">$${(i.venta * i.cantidad).toLocaleString()}</td></tr>
            `).join('');
            document.getElementById("grand-total").innerText = `$${(data.costos_totales?.total || 0).toLocaleString()}`;
        }
    }

    // Acción de aprobación remota
    window.approve = async () => {
        if(confirm("¿Confirma la autorización de este presupuesto?")) {
            await updateDoc(doc(db, "ordenes", id), { aprobada: true, estado: 'REPARACION' });
        }
    };
</script>

</body>
</html>
