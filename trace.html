<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS-X | STATUS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { background: #05070a; color: #e2e8f0; font-family: 'JetBrains Mono', monospace; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .neon-border { border: 1px solid rgba(0, 242, 255, 0.2); box-shadow: 0 0 15px rgba(0, 242, 255, 0.05); }
        .bitacora-line { border-left: 2px solid #00f2ff; background: rgba(255,255,255,0.02); padding: 12px; margin-bottom: 8px; border-radius: 0 8px 8px 0; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-end mb-10 border-b border-cyan-500/30 pb-6">
            <div>
                <h1 class="orbitron text-3xl font-black italic text-white uppercase">NEXUS<span class="text-red-600">_X</span></h1>
                <p id="ui-taller" class="text-[9px] orbitron text-cyan-400 tracking-[0.3em]">CARGANDO_SISTEMA...</p>
            </div>
            <div class="text-right">
                <span id="ui-placa" class="orbitron text-4xl font-black text-white">---</span>
                <div id="ui-estado" class="text-[10px] font-bold bg-cyan-500 text-black px-2 py-0.5 rounded mt-1">SINC...</div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="space-y-6">
                <div class="neon-border p-5 rounded-2xl bg-white/5">
                    <p class="text-[8px] text-slate-500 orbitron mb-1 uppercase font-bold">Registro de Odómetro</p>
                    <p id="ui-km" class="text-2xl font-black text-white">0 KM</p>
                </div>
                <div id="ui-area-cobro" class="neon-border p-5 rounded-2xl bg-cyan-500/5 hidden border-t-2 border-cyan-500">
                    <p class="text-[8px] text-cyan-500 orbitron mb-1 uppercase font-bold">Total a Liquidar</p>
                    <p id="ui-total" class="text-4xl font-black text-white">$ 0</p>
                    <div id="ui-items" class="mt-4 space-y-2 text-[10px] border-t border-white/10 pt-4"></div>
                </div>
            </div>

            <div class="md:col-span-2">
                <div class="neon-border p-6 rounded-3xl bg-white/5 min-h-[400px]">
                    <h3 class="orbitron text-[10px] text-cyan-400 mb-6 font-black uppercase tracking-widest">
                        <i class="fas fa-satellite-dish mr-2 animate-pulse"></i> Bitácora Técnica de Misión
                    </h3>
                    <div id="ui-bitacora" class="space-y-4 text-sm leading-relaxed">
                        <p class="text-slate-600 italic">Esperando telemetría de taller...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script type="module">
    import { db } from "./core/firebase-config.js";
    import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const getParam = (p) => new URLSearchParams(window.location.search).get(p);

    const ejecutarTrace = () => {
        const rawId = getParam("id");
        if (!rawId) return;

        // MANIOBRA DE LIMPIEZA: Extraer el ID real de cualquier string sucio
        const cleanId = rawId.split('_').pop();
        console.log("🛰️ Nexus-X Trace activado para:", cleanId);

        onSnapshot(doc(db, "ordenes", cleanId), (snap) => {
            if (snap.exists()) {
                const data = snap.data();
                
                // Mapeo Visual
                document.getElementById("ui-taller").innerText = data.taller_aliado || "NEXUS-X LOGISTICS";
                document.getElementById("ui-placa").innerText = data.placa || "S/P";
                document.getElementById("ui-estado").innerText = (data.estado || "PROCESO").toUpperCase();
                
                // MANIOBRA KM: Mapeo inteligente (soporta km o kilometraje)
                const km = data.kilometraje || data.km || "0";
                document.getElementById("ui-km").innerText = `${Number(km).toLocaleString()} KM`;

                // MANIOBRA BITÁCORA: El núcleo del reporte
                const log = data.bitacora_ia || "";
                const logContainer = document.getElementById("ui-bitacora");
                if (log) {
                    logContainer.innerHTML = log.split('\n').filter(t => t.trim()).reverse().map(line => `
                        <div class="bitacora-line">
                            <span class="text-[8px] text-cyan-500 font-bold orbitron block mb-1">REPORTE_TECNICO_OK</span>
                            ${line}
                        </div>
                    `).join('');
                }

                // MANIOBRA FINANCIERA
                const total = data.total || data.costos_totales?.total || 0;
                if (total > 0) {
                    document.getElementById("ui-area-cobro").classList.remove("hidden");
                    document.getElementById("ui-total").innerText = `$${Math.round(total).toLocaleString()}`;
                    
                    const items = data.items || [];
                    document.getElementById("ui-items").innerHTML = items.map(i => `
                        <div class="flex justify-between text-slate-400">
                            <span>${(i.desc || 'Servicio').toUpperCase()}</span>
                            <span class="text-white font-bold">$${(Number(i.venta) * Number(i.cantidad || 1)).toLocaleString()}</span>
                        </div>
                    `).join('');
                }
            }
        });
    };

    ejecutarTrace();
</script>
</body>
</html>
