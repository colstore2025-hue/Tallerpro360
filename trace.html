<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS-X | LIVE TRACKING SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-green: #10b981;
            --neon-red: #ff003c;
            --dark-bg: #05070a;
        }
        body {
            background: radial-gradient(circle at top, #0d1117 0%, var(--dark-bg) 100%);
            color: #e2e8f0;
            font-family: 'JetBrains Mono', monospace;
            min-height: 100vh;
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        
        /* Animación de escaneo */
        .scanline {
            width: 100%; height: 2px; background: rgba(0, 242, 255, 0.1);
            position: absolute; animation: scan 4s linear infinite; pointer-events: none;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        /* Estilo de burbujas Neón para Bitácora */
        .log-system { border-left: 2px solid var(--neon-cyan); background: rgba(0, 242, 255, 0.05); }
        .log-tech { border-right: 2px solid #ffffff; background: rgba(255, 255, 255, 0.03); text-align: right; }
        
        .glow-text { text-shadow: 0 0 10px rgba(0, 242, 255, 0.5); }
        .hud-border { border-left: 4px solid var(--neon-cyan); clip-path: polygon(0 0, 100% 0, 100% 90%, 95% 100%, 0 100%); }
        
        /* Custom Scroll */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--neon-cyan); border-radius: 10px; }
    </style>
</head>
<body class="p-4 lg:p-10 relative overflow-x-hidden">
    <div class="scanline"></div>

    <header class="max-w-5xl mx-auto flex justify-between items-end mb-10 border-b border-white/10 pb-6">
        <div>
            <h1 class="orbitron text-4xl font-black italic tracking-tighter glow-text">NEXUS<span class="text-red-600">_X</span></h1>
            <p class="text-[8px] orbitron tracking-[0.5em] text-cyan-400 uppercase">Quantum-Logistics Operational Interface</p>
        </div>
        <div class="text-right">
            <p class="text-[10px] text-slate-500 orbitron">SATELLITE_LINK: <span class="text-green-500 animate-pulse">ACTIVE</span></p>
            <p id="timestamp" class="text-[9px] text-white/50 font-bold"></p>
        </div>
    </header>

    <main class="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-7 space-y-6">
            
            <div class="glass hud-border p-8 relative overflow-hidden">
                <div class="flex justify-between items-start">
                    <div>
                        <label class="text-[9px] orbitron text-cyan-500 tracking-widest uppercase">Unit_Plate_Identifier</label>
                        <h2 id="placa" class="orbitron text-7xl font-black italic tracking-tighter">---</h2>
                    </div>
                    <div id="badge-estado" class="px-6 py-2 bg-cyan-500 text-black orbitron text-[12px] font-black italic rounded-bl-2xl shadow-[0_0_20px_rgba(0,242,255,0.4)]">---</div>
                </div>
                
                <div class="mt-10">
                    <div class="flex justify-between mb-3 text-[10px] orbitron font-bold text-slate-500">
                        <span id="step-1">INGRESO</span>
                        <span id="step-2">DIAGNÓSTICO</span>
                        <span id="step-3">REPARACIÓN</span>
                        <span id="step-4">LISTO</span>
                    </div>
                    <div class="h-2 w-full bg-white/5 rounded-full p-[2px]">
                        <div id="progreso-bar" class="h-full bg-cyan-500 shadow-[0_0_15px_#00f2ff] transition-all duration-1000" style="width: 5%"></div>
                    </div>
                </div>
            </div>

            <div class="glass p-6 rounded-3xl border-b-4 border-cyan-500/30">
                <h3 class="orbitron text-[10px] text-cyan-500 font-bold mb-6 flex items-center gap-2">
                    <i class="fas fa-stream"></i> LIVE_MISSION_LOG
                </h3>
                <div id="timeline-container" class="space-y-4 max-h-[500px] overflow-y-auto pr-2">
                    </div>
            </div>
        </div>

        <div class="lg:col-span-5 space-y-6">
            
            <div id="area-financiera" class="glass p-8 rounded-[2rem] border-t-2 border-green-500 hidden">
                <div class="flex justify-between items-center mb-8">
                    <h3 class="orbitron text-[11px] text-green-500 font-black">ESTRUCTURA DE COSTOS</h3>
                    <i class="fas fa-file-invoice-dollar text-green-500/30 text-2xl"></i>
                </div>
                
                <div id="lista-items" class="space-y-4 mb-10">
                    </div>

                <div class="border-t border-white/10 pt-6 space-y-2">
                    <div class="flex justify-between text-[10px] orbitron text-slate-500">
                        <span>NET_TOTAL_DUE</span>
                        <span id="tax-info">INC. IVA 19%</span>
                    </div>
                    <div id="total-final" class="text-6xl font-black orbitron text-white italic text-right">$ 0</div>
                </div>

                <div id="acciones-cliente" class="mt-10 space-y-4">
                    <button id="btn-aprobar" class="hidden w-full bg-white text-black py-5 orbitron font-black text-sm hover:bg-cyan-400 transition-all rounded-2xl shadow-[0_10px_30px_rgba(255,255,255,0.1)] uppercase">
                        Autorizar Reparación <i class="fas fa-bolt ml-2"></i>
                    </button>
                    
                    <button id="btn-pagar" class="hidden w-full bg-green-600 text-white py-5 orbitron font-black text-sm hover:bg-green-400 transition-all rounded-2xl shadow-[0_10px_30px_rgba(34,197,94,0.3)] uppercase">
                        Pagar con BOLD <i class="fas fa-credit-card ml-2"></i>
                    </button>
                </div>
            </div>

            <div id="waiting-msg" class="glass p-10 rounded-[2rem] text-center">
                <i class="fas fa-satellite animate-bounce text-cyan-500 text-4xl mb-6"></i>
                <p class="orbitron text-xs text-slate-400">ESPERANDO DESGLOSE TÉCNICO...</p>
            </div>

        </div>
    </main>

    <script type="module">
        import { db } from "./core/firebase-config.js";
        import { doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const params = new URLSearchParams(window.location.search);
        const orderId = params.get("id");

        if (orderId) {
            // ESCUCHA EN TIEMPO REAL (onSnapshot)
            onSnapshot(doc(db, "ordenes", orderId), (snap) => {
                if (snap.exists()) {
                    renderTrazabilidad(snap.data());
                } else {
                    document.body.innerHTML = "<div class='p-20 text-center orbitron text-red-500'>ERROR: MISSION_ID_NOT_FOUND</div>";
                }
            });
        }

        function renderTrazabilidad(o) {
            document.getElementById("timestamp").innerText = `LAST_SYNC: ${new Date().toLocaleTimeString()}`;
            document.getElementById("placa").innerText = o.placa;
            
            // 1. Render Timeline Dinámico
            const timelineContainer = document.getElementById("timeline-container");
            const lineas = (o.bitacora_ia || "").split('\n');
            timelineContainer.innerHTML = lineas.filter(l => l.trim() !== "").map(linea => {
                const esSistema = linea.includes('[NEXUS') || linea.includes('[SISTEMA]');
                return `
                    <div class="flex ${esSistema ? 'justify-start' : 'justify-end'} animate-in slide-in-from-bottom-2 duration-500">
                        <div class="p-4 rounded-2xl max-w-[90%] ${esSistema ? 'log-system' : 'log-tech shadow-xl'}">
                            <p class="text-[8px] orbitron opacity-50 mb-1">${esSistema ? 'CORE_ENGINE' : 'CHIEF_TECHNICIAN'}</p>
                            <p class="text-[11px] font-medium tracking-tight">${linea.replace(/\[.*?\]:?/, '')}</p>
                        </div>
                    </div>
                `;
            }).join('');
            timelineContainer.scrollTop = timelineContainer.scrollHeight;

            // 2. Estado y Barra
            const badge = document.getElementById("badge-estado");
            badge.innerText = o.estado;
            const niveles = { 'COTIZACION': 15, 'INGRESO': 30, 'DIAGNOSTICO': 50, 'REPARACION': 75, 'LISTO': 100, 'ENTREGADO': 100 };
            document.getElementById("progreso-bar").style.width = `${niveles[o.estado] || 5}%`;
            
            // Colores por fase
            if(o.estado === 'REPARACION') badge.className = "px-6 py-2 bg-red-600 text-white orbitron text-[12px] font-black italic rounded-bl-2xl";
            if(o.estado === 'LISTO') badge.className = "px-6 py-2 bg-green-500 text-black orbitron text-[12px] font-black italic rounded-bl-2xl";

            // 3. Área Financiera e Interacción
            if (o.items && o.items.length > 0) {
                document.getElementById("area-financiera").classList.remove("hidden");
                document.getElementById("waiting-msg").classList.add("hidden");
                renderItems(o.items);
                document.getElementById("total-final").innerText = `$${Math.round(o.costos_totales?.total || 0).toLocaleString()}`;
                
                // Lógica de botones
                const btnAprobar = document.getElementById("btn-aprobar");
                const btnPagar = document.getElementById("btn-pagar");

                if (!o.aprobada && o.estado === 'COTIZACION') {
                    btnAprobar.classList.remove("hidden");
                    btnAprobar.onclick = async () => {
                        if(confirm("¿Autoriza el presupuesto para iniciar la intervención técnica?")) {
                            await updateDoc(doc(db, "ordenes", o.id), { 
                                aprobada: true, 
                                bitacora_ia: (o.bitacora_ia || "") + `\n[SISTEMA]: MISIÓN AUTORIZADA POR CLIENTE - ${new Date().toLocaleString()}`
                            });
                        }
                    };
                } else {
                    btnAprobar.classList.add("hidden");
                }

                if (o.estado === 'LISTO') {
                    btnPagar.classList.remove("hidden");
                    btnPagar.onclick = () => window.open(`https://checkout.bold.co/payment/OT_${o.placa}`, '_blank');
                }
            }
        }

        function renderItems(items) {
            const container = document.getElementById("lista-items");
            container.innerHTML = items.map(i => `
                <div class="flex justify-between items-center bg-white/[0.03] p-4 rounded-xl border border-white/5 hover:bg-white/[0.06] transition-all">
                    <div>
                        <p class="text-[11px] font-bold text-white uppercase tracking-tighter">${i.desc}</p>
                        <p class="text-[8px] text-slate-500 orbitron">${i.tipo} | QTY: ${i.cantidad}</p>
                    </div>
                    <div class="text-sm font-black text-cyan-400">$${Math.round(i.venta * i.cantidad).toLocaleString()}</div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
